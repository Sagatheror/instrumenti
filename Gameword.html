<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сетевая игра в слова</title>
    <style>
        /* Стили остаются без изменений */
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0f2a44 0%, #1b3a5c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            margin: 0;
        }
        .game-container {
            max-width: 1400px;
            width: 100%;
            background: rgba(10, 25, 40, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 56px;
            padding: 28px 20px;
            box-shadow: 0 30px 40px #00000080, 0 0 0 2px #e9c27c inset;
            border: 1px solid #ffdd9e;
        }
        h1 {
            text-align: center;
            font-weight: 700;
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: #FFE9A7;
            text-shadow: 0 5px 0 #7b5a3b, 0 8px 12px black;
            margin: 0 0 20px;
        }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
        }
        .game-content {
            display: flex;
            flex-direction: column;
        }
        .profile-setup {
            background: #1e3347;
            border-radius: 60px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #e9c27c;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            justify-content: center;
        }
        .avatar-selection {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .avatar-option {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.2s;
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2b3f54;
        }
        .avatar-option:hover {
            transform: scale(1.1);
        }
        .avatar-option.selected {
            border-color: #ffd966;
            box-shadow: 0 0 15px gold;
        }
        .avatar-preview {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #2b3f54;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border: 3px solid #ffd966;
        }
        .name-input {
            padding: 12px 20px;
            border-radius: 40px;
            border: none;
            font-size: 1.1rem;
            width: 200px;
            background: #2b3f54;
            color: white;
            border: 2px solid #a88444;
        }
        .custom-avatar {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .file-input {
            display: none;
        }
        .file-label {
            background: #427a5c;
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            border-bottom: 4px solid #1f4d33;
        }
        .connection-panel {
            background: #1e3347;
            border-radius: 60px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #e9c27c;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }
        .room-control {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            background: #142433;
            padding: 10px 20px;
            border-radius: 50px;
        }
        .room-control input {
            padding: 12px 20px;
            border-radius: 40px;
            border: none;
            font-size: 1.1rem;
            width: 180px;
            background: #2b3f54;
            color: white;
            border: 2px solid #a88444;
        }
        .room-control button {
            background: #fec165;
            border: none;
            border-radius: 40px;
            padding: 12px 25px;
            font-weight: bold;
            cursor: pointer;
            border-bottom: 4px solid #a5712b;
            transition: 0.07s;
            font-size: 1.1rem;
        }
        .room-control button:hover {
            background: #ffd58c;
            transform: translateY(-2px);
        }
        .connection-status {
            color: #ffeeaa;
            font-weight: 500;
            padding: 0 15px;
        }
        .players-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
        }
        .player-card {
            flex: 1 1 180px;
            min-width: 160px;
            background: #f0e5d2;
            border-radius: 40px 40px 30px 30px;
            padding: 18px 8px 12px;
            text-align: center;
            box-shadow: 0 12px 0 #8b653b, 0 20px 18px -8px black;
            border: 2px solid #f5c489;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .player-card.active {
            transform: translateY(-6px);
            box-shadow: 0 8px 0 #b87e3f, 0 25px 25px -8px black;
            border: 3px solid #fbb13c;
            background: #fff6e6;
        }
        .player-card.this-player {
            outline: 4px solid #4caf92;
        }
        .player-avatar {
            font-size: 3rem;
            margin-bottom: 5px;
        }
        .player-name {
            font-size: 1.6rem;
            font-weight: 700;
            color: #2d1d0e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            word-break: break-word;
        }
        .player-score {
            font-size: 2.3rem;
            font-weight: 800;
            background: #2f200e;
            color: #ffd966;
            display: inline-block;
            padding: 0px 22px;
            border-radius: 40px;
            margin: 6px 0 4px;
            border: 2px solid #f5b951;
        }
        .complaint-badge {
            display: inline-block;
            background: #aa4b4b;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            padding: 3px 12px;
            border-radius: 30px;
            margin-top: 5px;
            border: 1px solid #ffaeae;
        }
        .voting-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 5px;
        }
        .vote-btn {
            padding: 5px 15px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .vote-yes {
            background: #4caf50;
            color: white;
        }
        .vote-no {
            background: #f44336;
            color: white;
        }
        .vote-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .turn-indicator {
            background: #1e2f3f;
            border-radius: 60px;
            padding: 12px 22px;
            margin: 10px 0 20px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            justify-content: space-between;
            border: 2px solid #e9c27c;
            box-shadow: 0 6px 0 #514128;
        }
        .turn-text {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ffe392;
            background: #232b33;
            padding: 4px 28px;
            border-radius: 40px;
        }
        .last-word {
            font-size: 1.4rem;
            background: #2f3e52;
            color: #FFEEBB;
            padding: 6px 24px;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
        }
        .game-area {
            background: #26425e;
            border-radius: 70px;
            padding: 28px 20px;
            border: 3px solid #FFD78C;
            box-shadow: inset 0 -8px 0 #0e1e30, 0 20px 25px -5px black;
        }
        .input-section {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .word-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .word-input-wrapper {
            display: flex;
            flex: 3 1 400px;
            background: white;
            border-radius: 100px;
            border: 4px solid #dbb174;
            padding: 4px;
            box-shadow: 0 7px 0 #785f37;
        }
        .word-input-wrapper input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 1.5rem;
            padding: 16px 25px;
            background: transparent;
            font-weight: 500;
            color: #131313;
            min-width: 180px;
        }
        .word-input-wrapper button {
            background: #fec165;
            border: none;
            margin: 6px;
            border-radius: 60px;
            padding: 0 35px;
            font-size: 1.7rem;
            font-weight: 700;
            color: #2e2b1f;
            cursor: pointer;
            border-bottom: 5px solid #b17e3b;
            transition: 0.08s;
            box-shadow: 0 4px 12px black;
            white-space: nowrap;
        }
        .word-input-wrapper button:hover:not(:disabled) {
            background: #ffd894;
            border-bottom-width: 3px;
            transform: scale(0.98);
        }
        .word-input-wrapper button:disabled {
            opacity: 0.4;
            cursor: default;
        }
        .complaint-area {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 25px;
            background: #193045;
            border-radius: 60px;
            padding: 14px 20px;
            border: 1px solid #cfb071;
        }
        .complaint-btn {
            background: #c06c6c;
            border: none;
            border-radius: 50px;
            padding: 12px 35px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffe8c7;
            border-bottom: 5px solid #6f3636;
            cursor: pointer;
            transition: 0.07s;
            box-shadow: 0 4px 12px black;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        .complaint-btn:hover:not(:disabled) {
            background: #d77e7e;
            border-bottom-width: 3px;
            transform: translateY(2px);
        }
        .complaint-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .complaint-count {
            background: #341b1b;
            padding: 5px 18px;
            border-radius: 40px;
            font-size: 1.5rem;
            color: #ffaeae;
            font-weight: 700;
        }
        .vote-status {
            display: flex;
            gap: 20px;
            color: white;
        }
        .vote-yes-count, .vote-no-count {
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        .vote-yes-count {
            background: #2e7d32;
        }
        .vote-no-count {
            background: #c62828;
        }
        .message-area {
            background: #10212e;
            border-radius: 50px;
            padding: 16px 30px;
            color: #ffefa5;
            font-size: 1.3rem;
            font-weight: 600;
            border: 2px solid #cbb26a;
            box-shadow: inset 0 -4px 0 #071118;
            text-align: center;
        }
        .sidebar {
            background: #1e3347;
            border-radius: 60px;
            padding: 20px;
            border: 2px solid #e9c27c;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .history-title {
            font-size: 1.5rem;
            color: #FFE9A7;
            text-align: center;
            margin: 0;
            border-bottom: 2px solid #e9c27c;
            padding-bottom: 10px;
        }
        .words-history {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 400px;
            overflow-y: auto;
        }
        .words-history li {
            background: #2b3f54;
            color: #FFEEBB;
            padding: 12px 20px;
            margin-bottom: 8px;
            border-radius: 40px;
            font-size: 1.3rem;
            font-family: 'Courier New', monospace;
            border: 1px solid #a88444;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .word-number {
            background: #142433;
            color: #e9c27c;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: bold;
        }
        .word-text {
            flex: 1;
        }
        .footer-rules {
            display: flex;
            justify-content: space-between;
            color: #e2d7b8;
            margin-top: 22px;
            font-size: 1rem;
            flex-wrap: wrap;
            gap: 12px;
        }
        .letter-hint {
            background: #182233;
            padding: 5px 18px;
            border-radius: 30px;
            border-left: 6px solid #f6b83e;
        }
        .cleanup-info {
            background: #142433;
            color: #a0c0ff;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            margin-top: 10px;
            text-align: center;
        }
    </style>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
</head>
<body>
<div class="game-container">

    <!-- НАСТРОЙКА ПРОФИЛЯ -->
    <div class="profile-setup">
        <div class="avatar-selection">
            <div class="avatar-preview" id="avatarPreview">😊</div>
            <div class="avatar-option" onclick="selectAvatar('😊')">😊</div>
            <div class="avatar-option" onclick="selectAvatar('😎')">😎</div>
            <div class="avatar-option" onclick="selectAvatar('🤓')">🤓</div>
            <div class="avatar-option" onclick="selectAvatar('🦸')">🦸</div>
            <div class="avatar-option" onclick="selectAvatar('🐉')">🐉</div>
            <div class="avatar-option" onclick="selectAvatar('👾')">👾</div>
        </div>
        <div class="custom-avatar">
            <input type="text" id="playerName" class="name-input" placeholder="Ваше имя" value="Игрок">
            <input type="file" id="avatarFile" class="file-input" accept="image/*">
            <label for="avatarFile" class="file-label">📷 Своё фото</label>
        </div>
    </div>

    <div class="main-grid">
        <div class="game-content">
            <div class="connection-panel">
                <div class="room-control">
                    <input type="text" id="roomInput" placeholder="Код комнаты" value="game123">
                    <button id="createRoomBtn">🔗 Создать комнату</button>
                    <button id="joinRoomBtn">✨ Присоединиться</button>
                </div>
                <div class="connection-status" id="connectionStatus">⚡ Настройка...</div>
            </div>

            <div id="playersPanel" class="players-panel"></div>

            <div class="turn-indicator">
                <span class="turn-text" id="turnDisplay">⏳ Ожидание...</span>
                <span class="last-word" id="lastWordDisplay">⏳ пока нет</span>
            </div>

            <div class="game-area">
                <div class="input-section">
                    <div class="word-row">
                        <div class="word-input-wrapper">
                            <input type="text" id="wordInput" placeholder="существительное..." autocomplete="off" disabled>
                            <button id="submitWordBtn" disabled>➤ Отправить</button>
                        </div>
                    </div>

                    <div class="complaint-area" id="complaintArea">
                        <button class="complaint-btn" id="complaintBtn" disabled>🚫 Пожаловаться</button>
                        <div class="vote-status" id="voteStatus" style="display: none;">
                            <span class="vote-yes-count" id="voteYesCount">0</span>
                            <span class="vote-no-count" id="voteNoCount">0</span>
                        </div>
                        <div class="complaint-count" id="complaintCountDisplay">0 / 0</div>
                    </div>

                    <div class="message-area" id="messageBox">
                        👋 Выберите имя и аватарку, создайте или присоединитесь
                    </div>
                </div>
            </div>
        </div>

        <!-- Сайдбар с историей слов -->
        <div class="sidebar">
            <h3 class="history-title">📜 История слов</h3>
            <ul class="words-history" id="wordsHistory">
                <li style="justify-content: center; color: #999;">Пока нет слов</li>
            </ul>
            <div class="footer-rules">
                <span>📚 Существительные, мин 2 буквы</span>
                <span class="letter-hint" id="requiredLetterHint">нужная буква: ?</span>
            </div>
        </div>
    </div>

    <div class="cleanup-info" id="cleanupInfo">
        ⏱️ Пустые комнаты удаляются через 1 час
    </div>
</div>

<script>
(function() {
    // ==================== НАСТРОЙКА FIREBASE ====================
    const firebaseConfig = {
        apiKey: "AIzaSyDdfezqe41CAyoI_SvP4fnbPmhYVjBkB9E",
        authDomain: "word-game-multiplayer-43c82.firebaseapp.com",
        databaseURL: "https://word-game-multiplayer-43c82-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "word-game-multiplayer-43c82",
        storageBucket: "word-game-multiplayer-43c82.firebasestorage.app",
        messagingSenderId: "966216835290",
        appId: "1:966216835290:web:bfebbf3b1d13cf80f745e3"
    };

    let app;
    let database;
    let storage;
    try {
        app = firebase.initializeApp(firebaseConfig);
        database = firebase.database();
        storage = firebase.storage();
        console.log("Firebase initialized");
        
        startCleanupService();
    } catch (e) {
        console.error("Firebase init error:", e);
    }

    // ==================== СОСТОЯНИЕ ИГРЫ ====================
    let myId = null;
    let myName = 'Игрок';
    let myAvatar = '😊';
    let myAvatarUrl = null;
    let roomId = null;
    let players = [];
    let currentPlayerId = null;
    let lastWord = '';
    let lastWordAuthor = null; // Кто написал последнее слово
    let usedWords = [];
    let complaintActive = false;
    let complainedWord = '';
    let complaintAuthor = null;
    let complaintVotes = {
        yes: new Set(),
        no: new Set()
    };
    let lastWordsHistory = [];

    // DOM элементы
    const playersPanel = document.getElementById('playersPanel');
    const turnDisplay = document.getElementById('turnDisplay');
    const lastWordDisplay = document.getElementById('lastWordDisplay');
    const requiredLetterHint = document.getElementById('requiredLetterHint');
    const wordInput = document.getElementById('wordInput');
    const submitBtn = document.getElementById('submitWordBtn');
    const complaintBtn = document.getElementById('complaintBtn');
    const complaintCountDisplay = document.getElementById('complaintCountDisplay');
    const voteStatus = document.getElementById('voteStatus');
    const voteYesCount = document.getElementById('voteYesCount');
    const voteNoCount = document.getElementById('voteNoCount');
    const messageBox = document.getElementById('messageBox');
    const connectionStatus = document.getElementById('connectionStatus');
    const roomInput = document.getElementById('roomInput');
    const createRoomBtn = document.getElementById('createRoomBtn');
    const joinRoomBtn = document.getElementById('joinRoomBtn');
    const playerNameInput = document.getElementById('playerName');
    const avatarPreview = document.getElementById('avatarPreview');
    const avatarFile = document.getElementById('avatarFile');
    const cleanupInfo = document.getElementById('cleanupInfo');
    const wordsHistory = document.getElementById('wordsHistory');

    // ==================== АВТОМАТИЧЕСКАЯ ЧИСТКА КОМНАТ ====================
    function startCleanupService() {
        setInterval(cleanupOldRooms, 15 * 60 * 1000);
        setTimeout(cleanupOldRooms, 5000);
        setInterval(updateCleanupInfo, 60000);
        updateCleanupInfo();
    }

    function cleanupOldRooms() {
        const roomsRef = database.ref('rooms');
        const oneHourAgo = Date.now() - (60 * 60 * 1000);
        
        roomsRef.once('value', (snapshot) => {
            const rooms = snapshot.val();
            if (!rooms) return;
            
            let cleanedCount = 0;
            
            Object.entries(rooms).forEach(([roomId, roomData]) => {
                const players = roomData.players;
                const playerCount = players ? Object.keys(players).length : 0;
                
                if (playerCount === 0 && roomData.createdAt && roomData.createdAt < oneHourAgo) {
                    roomsRef.child(roomId).remove();
                    cleanedCount++;
                }
            });
            
            if (cleanedCount > 0) {
                cleanupInfo.textContent = `🧹 Удалено ${cleanedCount} пустых комнат`;
                setTimeout(() => updateCleanupInfo(), 3000);
            }
        });
    }

    function updateCleanupInfo() {
        const now = new Date();
        const timeString = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        cleanupInfo.textContent = `⏱️ Пустые комнаты удаляются через 1 час | Последняя проверка: ${timeString}`;
    }

    // ==================== ПРОВЕРКА ПОДКЛЮЧЕНИЯ ====================
    function checkPlayerInRoom(room, playerName) {
        return new Promise((resolve) => {
            const roomRef = database.ref(`rooms/${room}/players`);
            
            roomRef.once('value', (snapshot) => {
                const players = snapshot.val();
                if (!players) {
                    resolve(false);
                    return;
                }
                
                const existingPlayer = Object.values(players).find(
                    p => p.connected && p.name.toLowerCase() === playerName.toLowerCase()
                );
                
                resolve(existingPlayer ? existingPlayer.id : false);
            });
        });
    }

    // Выбор аватара
    window.selectAvatar = function(emoji) {
        myAvatar = emoji;
        myAvatarUrl = null;
        avatarPreview.textContent = emoji;
        
        document.querySelectorAll('.avatar-option').forEach(opt => {
            opt.classList.remove('selected');
            if (opt.textContent === emoji) opt.classList.add('selected');
        });
    };

    // Загрузка фото
    avatarFile.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(event) {
            myAvatarUrl = event.target.result;
            myAvatar = '📷';
            avatarPreview.innerHTML = `<img src="${event.target.result}" style="width:50px;height:50px;border-radius:50%;">`;
        };
        reader.readAsDataURL(file);
    });

    // Генерация ID
    function generatePlayerId() {
        return 'player_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    }

    // ==================== FIREBASE ====================
    async function createRoom() {
        const room = roomInput.value.trim();
        if (!room) {
            messageBox.textContent = 'Введите код комнаты';
            return;
        }

        myName = playerNameInput.value.trim() || 'Игрок';
        
        const existingPlayerId = await checkPlayerInRoom(room, myName);
        if (existingPlayerId) {
            messageBox.textContent = `❌ Игрок с именем "${myName}" уже в комнате!`;
            return;
        }

        myId = generatePlayerId();
        roomId = room;

        const roomRef = database.ref(`rooms/${room}`);
        
        roomRef.once('value', (snapshot) => {
            if (snapshot.exists()) {
                messageBox.textContent = 'Комната уже существует';
                return;
            }

            const gameState = {
                players: {
                    [myId]: {
                        id: myId,
                        name: myName,
                        avatar: myAvatar,
                        avatarUrl: myAvatarUrl,
                        score: 0,
                        connected: true,
                        lastSeen: Date.now()
                    }
                },
                currentPlayerId: myId,
                lastWord: '',
                lastWordAuthor: null,
                usedWords: [],
                complaint: null,
                createdAt: Date.now(),
                lastActivity: Date.now()
            };

            roomRef.set(gameState, (error) => {
                if (error) {
                    messageBox.textContent = 'Ошибка: ' + error.message;
                } else {
                    connectionStatus.textContent = `✅ Создано: ${room}`;
                    messageBox.textContent = 'Комната создана! Ожидайте игроков...';
                    setupListeners(room);
                    startHeartbeat(room);
                }
            });
        });
    }

    async function joinRoom() {
        const room = roomInput.value.trim();
        if (!room) {
            messageBox.textContent = 'Введите код комнаты';
            return;
        }

        myName = playerNameInput.value.trim() || 'Игрок';
        
        const existingPlayerId = await checkPlayerInRoom(room, myName);
        if (existingPlayerId) {
            messageBox.textContent = `❌ Игрок с именем "${myName}" уже в комнате!`;
            return;
        }

        myId = generatePlayerId();
        roomId = room;

        const roomRef = database.ref(`rooms/${room}`);
        
        roomRef.once('value', (snapshot) => {
            if (!snapshot.exists()) {
                messageBox.textContent = 'Комната не найдена';
                return;
            }

            const roomData = snapshot.val();
            const playerIds = roomData.players ? Object.keys(roomData.players) : [];
            
            const updates = {};
            updates[`players/${myId}`] = {
                id: myId,
                name: myName,
                avatar: myAvatar,
                avatarUrl: myAvatarUrl,
                score: 0,
                connected: true,
                lastSeen: Date.now()
            };
            
            // Если это первый игрок после создателя, начинаем игру
            if (playerIds.length === 1 && !roomData.currentPlayerId) {
                updates.currentPlayerId = roomData.players ? Object.keys(roomData.players)[0] : myId;
            }
            
            updates.lastActivity = Date.now();

            roomRef.update(updates, (error) => {
                if (error) {
                    messageBox.textContent = 'Ошибка: ' + error.message;
                } else {
                    connectionStatus.textContent = `✅ Подключён к ${room}`;
                    messageBox.textContent = 'Вы присоединились! Игра начинается...';
                    setupListeners(room);
                    startHeartbeat(room);
                }
            });
        });
    }

    function startHeartbeat(room) {
        const playerRef = database.ref(`rooms/${room}/players/${myId}`);
        
        const interval = setInterval(() => {
            if (roomId && myId) {
                playerRef.update({
                    connected: true,
                    lastSeen: Date.now()
                });
            } else {
                clearInterval(interval);
            }
        }, 10000);

        window.addEventListener('beforeunload', () => {
            if (roomId && myId) {
                playerRef.update({
                    connected: false,
                    lastSeen: Date.now()
                });
            }
        });
    }

    function setupListeners(room) {
        const roomRef = database.ref(`rooms/${room}`);

        roomRef.child('players').on('value', (snapshot) => {
            const playersData = snapshot.val() || {};
            
            const now = Date.now();
            const activePlayers = Object.values(playersData).filter(p => {
                return p.connected || (now - (p.lastSeen || 0)) < 30000;
            });
            
            players = activePlayers;
            
            // Если игроков стало больше 1 и нет текущего игрока, устанавливаем первого
            if (activePlayers.length >= 1 && !currentPlayerId) {
                const firstPlayerId = activePlayers[0].id;
                roomRef.child('currentPlayerId').set(firstPlayerId);
            }
            
            renderAll();
            updateControls();
        });

        roomRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                roomId = null;
                myId = null;
                players = [];
                currentPlayerId = null;
                lastWord = '';
                lastWordAuthor = null;
                usedWords = [];
                complaintActive = false;
                messageBox.textContent = '🏠 Комната была удалена';
                connectionStatus.textContent = '⚡ Отключён';
                renderAll();
                updateControls();
                return;
            }

            currentPlayerId = data.currentPlayerId;
            lastWord = data.lastWord || '';
            lastWordAuthor = data.lastWordAuthor || null;
            usedWords = data.usedWords || [];
            
            if (usedWords.length > 0) {
                lastWordsHistory = usedWords.slice(-10).reverse();
                renderHistory();
            } else {
                lastWordsHistory = [];
                renderHistory();
            }
            
            if (data.complaint) {
                complaintActive = true;
                complainedWord = data.complaint.word;
                complaintAuthor = data.complaint.authorId;
                complaintVotes.yes = new Set(data.complaint.votes?.yes || []);
                complaintVotes.no = new Set(data.complaint.votes?.no || []);
            } else {
                complaintActive = false;
                complainedWord = '';
                complaintAuthor = null;
                complaintVotes.yes.clear();
                complaintVotes.no.clear();
            }

            renderAll();
            updateControls();
        });
    }

    // ==================== ИГРА ====================
    function submitWord() {
        if (!roomId || !myId || complaintActive) return;
        if (myId !== currentPlayerId) {
            messageBox.textContent = 'Сейчас не ваш ход';
            return;
        }

        const word = wordInput.value.trim().toLowerCase();
        if (!word) {
            messageBox.textContent = 'Введите слово';
            return;
        }

        if (!/^[а-яё]+$/i.test(word) || word.length < 2) {
            messageBox.textContent = '❌ Только русские буквы, мин 2';
            wordInput.value = '';
            return;
        }

        if (usedWords.includes(word)) {
            messageBox.textContent = `⚠️ Слово "${word}" уже было`;
            wordInput.value = '';
            return;
        }

        if (lastWord && word[0] !== lastWord.slice(-1)) {
            messageBox.textContent = `🔤 Должно начинаться с «${lastWord.slice(-1)}»`;
            wordInput.value = '';
            return;
        }

        const roomRef = database.ref(`rooms/${roomId}`);
        const playerIds = players.map(p => p.id);
        const currentIndex = playerIds.indexOf(myId);
        const nextIndex = (currentIndex + 1) % playerIds.length;
        const nextPlayerId = playerIds[nextIndex];

        const updates = {};
        updates[`players/${myId}/score`] = (players.find(p => p.id === myId).score || 0) + 1;
        updates.currentPlayerId = nextPlayerId;
        updates.lastWord = word;
        updates.lastWordAuthor = myId; // Запоминаем, кто написал слово
        updates.usedWords = [...usedWords, word];
        updates.lastActivity = Date.now();

        roomRef.update(updates);
        
        wordInput.value = '';
        messageBox.textContent = `✅ Слово "${word}" принято!`;
    }

    function startComplaint() {
        if (!roomId || !myId) return;
        if (!lastWord) {
            messageBox.textContent = 'Не на что жаловаться';
            return;
        }
        
        // Жаловаться может только тот, кто сейчас должен ходить (получил ход) и видит ошибку
        // И жаловаться НЕ может автор слова
        if (myId === lastWordAuthor) {
            messageBox.textContent = 'Вы не можете жаловаться на своё слово';
            return;
        }

        // Жаловаться может текущий игрок (который должен написать следующее слово)
        if (myId !== currentPlayerId) {
            messageBox.textContent = 'Сейчас не ваша очередь жаловаться';
            return;
        }

        const roomRef = database.ref(`rooms/${roomId}`);
        
        const complaint = {
            active: true,
            word: lastWord,
            authorId: lastWordAuthor, // Автор слова, на которое жалуются
            complainantId: myId, // Тот, кто жалуется
            votes: {
                yes: [],
                no: []
            }
        };

        roomRef.child('complaint').set(complaint);
        messageBox.textContent = 'Жалоба отправлена! Голосуйте!';
    }

    function vote(voteType) {
        if (!roomId || !myId || !complaintActive) return;
        
        // Автор слова не может голосовать
        if (myId === complaintAuthor) {
            messageBox.textContent = 'Вы автор слова и не можете голосовать';
            return;
        }

        if (complaintVotes.yes.has(myId) || complaintVotes.no.has(myId)) {
            messageBox.textContent = 'Вы уже проголосовали';
            return;
        }

        const roomRef = database.ref(`rooms/${roomId}`);
        
        const updates = {};
        if (voteType === 'yes') {
            updates[`complaint/votes/yes`] = [...complaintVotes.yes, myId];
        } else {
            updates[`complaint/votes/no`] = [...complaintVotes.no, myId];
        }

        roomRef.update(updates);
    }

    function checkVoteResult() {
        if (!complaintActive) return;
        
        const totalPlayers = players.length;
        const yesVotes = complaintVotes.yes.size;
        const noVotes = complaintVotes.no.size;
        const totalVotes = yesVotes + noVotes;
        
        // Голосовать могут все, кроме автора слова
        if (totalVotes >= totalPlayers - 1) {
            const roomRef = database.ref(`rooms/${roomId}`);
            
            if (yesVotes > noVotes) {
                const updates = {};
                const author = players.find(p => p.id === complaintAuthor);
                if (author) {
                    // Штрафуем автора слова
                    updates[`players/${complaintAuthor}/score`] = Math.max(0, (author.score || 0) - 1);
                }
                
                updates.complaint = null;
                updates.lastWord = '';
                updates.lastWordAuthor = null;
                updates.usedWords = usedWords.filter(w => w !== complainedWord);
                
                roomRef.update(updates);
                messageBox.textContent = '✅ Жалоба подтверждена! Слово отменено, автор оштрафован';
            } else {
                roomRef.child('complaint').set(null);
                messageBox.textContent = '❌ Жалоба отклонена! Слово засчитано';
            }
        }
    }

    // ==================== ОТРИСОВКА ====================
    function renderHistory() {
        if (lastWordsHistory.length === 0) {
            wordsHistory.innerHTML = '<li style="justify-content: center; color: #999;">Пока нет слов</li>';
            return;
        }

        let html = '';
        lastWordsHistory.slice(0, 10).forEach((word, index) => {
            html += `
                <li>
                    <span class="word-number">${index + 1}</span>
                    <span class="word-text">${word}</span>
                </li>
            `;
        });
        wordsHistory.innerHTML = html;
    }

    function renderAll() {
        let html = '';
        players.forEach(p => {
            const isActive = (p.id === currentPlayerId && !complaintActive);
            const isMe = (p.id === myId);
            let complaintBadge = '';
            let votingControls = '';
            let connectionBadge = '';
            
            if (!p.connected) {
                connectionBadge = '<div class="complaint-badge" style="background:#666;">📴 отключён</div>';
            }
            
            if (complaintActive) {
                if (p.id === complaintAuthor) {
                    complaintBadge = '<div class="complaint-badge">⚠️ слово под вопросом (автор)</div>';
                } else {
                    const hasVotedYes = complaintVotes.yes.has(p.id);
                    const hasVotedNo = complaintVotes.no.has(p.id);
                    
                    if (hasVotedYes) {
                        complaintBadge = '<div class="complaint-badge" style="background:#2e7d32;">✅ согласен</div>';
                    } else if (hasVotedNo) {
                        complaintBadge = '<div class="complaint-badge" style="background:#c62828;">❌ не согласен</div>';
                    } else if (isMe && p.connected && myId !== complaintAuthor) {
                        votingControls = `
                            <div class="voting-controls">
                                <button class="vote-btn vote-yes" onclick="voteYes()">✅ Согласен</button>
                                <button class="vote-btn vote-no" onclick="voteNo()">❌ Не согласен</button>
                            </div>
                        `;
                    }
                }
            }
            
            const avatarHtml = p.avatarUrl ? 
                `<img src="${p.avatarUrl}" style="width:40px;height:40px;border-radius:50%;">` : 
                `<div class="player-avatar">${p.avatar || '😊'}</div>`;
            
            html += `
                <div class="player-card ${isActive ? 'active' : ''} ${isMe ? 'this-player' : ''}">
                    ${avatarHtml}
                    <div class="player-name">${p.name || 'Игрок'}</div>
                    <div class="player-score">${p.score || 0}</div>
                    ${connectionBadge}
                    ${complaintBadge}
                    ${votingControls}
                </div>
            `;
        });
        playersPanel.innerHTML = html;

        if (complaintActive) {
            turnDisplay.innerHTML = `⏳ ГОЛОСОВАНИЕ: слово «${complainedWord}»`;
            voteStatus.style.display = 'flex';
            voteYesCount.textContent = complaintVotes.yes.size;
            voteNoCount.textContent = complaintVotes.no.size;
            
            const totalNeeded = players.length - 1;
            complaintCountDisplay.textContent = `${complaintVotes.yes.size + complaintVotes.no.size} / ${totalNeeded}`;
            
            checkVoteResult();
        } else {
            voteStatus.style.display = 'none';
            
            if (currentPlayerId) {
                const currentPlayer = players.find(p => p.id === currentPlayerId);
                if (currentPlayer) {
                    turnDisplay.innerHTML = `🎤 Ходит ${currentPlayer.name}`;
                } else {
                    turnDisplay.innerHTML = '⏳ Ожидание игроков...';
                }
            } else {
                turnDisplay.innerHTML = '⏳ Ожидание игроков...';
            }
            
            complaintCountDisplay.textContent = `0 / 0`;
        }

        if (lastWord) {
            lastWordDisplay.textContent = `« ${lastWord.toUpperCase()} »`;
            requiredLetterHint.textContent = `нужная буква: «${lastWord.slice(-1)}»`;
        } else {
            lastWordDisplay.textContent = '⏳ пока нет';
            requiredLetterHint.textContent = 'нужная буква: ?';
        }
    }

    function updateControls() {
        const isMyTurn = (myId === currentPlayerId && !complaintActive);
        const isInRoom = roomId && myId;
        
        wordInput.disabled = !isMyTurn || !isInRoom;
        submitBtn.disabled = !isMyTurn || !isInRoom;
        
        // Жаловаться может только текущий игрок (который должен написать слово) и только если это не его слово
        const canComplain = isInRoom && lastWord && !complaintActive && 
                           myId === currentPlayerId && myId !== lastWordAuthor;
        
        complaintBtn.disabled = !canComplain;
        
        document.getElementById('complaintArea').style.display = complaintActive ? 'flex' : 'none';
    }

    window.voteYes = function() { vote('yes'); };
    window.voteNo = function() { vote('no'); };

    // Инициализация
    function init() {
        connectionStatus.textContent = '⚡ Готов к подключению';
        
        createRoomBtn.addEventListener('click', createRoom);
        joinRoomBtn.addEventListener('click', joinRoom);
        submitBtn.addEventListener('click', submitWord);
        complaintBtn.addEventListener('click', startComplaint);
        
        wordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitWord();
        });

        selectAvatar('😊');
        
        window.addEventListener('load', () => {
            if (myId) {
                myId = null;
            }
        });
    }

    init();
})();
</script>
</body>
</html>
