<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Monopoly Online - Мультиплеер</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a2f1f, #030c07);
            font-family: 'Segoe UI', 'Poppins', 'Inter', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            display: flex;
            gap: 24px;
            max-width: 1600px;
            margin: 0 auto;
            align-items: flex-start;
        }

        .game-area {
            flex: 3;
            min-width: 0;
        }

        .chat-panel {
            flex: 1;
            min-width: 300px;
            max-width: 360px;
            background: rgba(30, 25, 20, 0.95);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
            border: 1px solid rgba(212, 175, 55, 0.3);
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px);
            max-height: 900px;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 15px;
            border-bottom: 2px solid #d4af37;
            margin-bottom: 15px;
        }

        .chat-header h3 {
            color: #ffcd7e;
            font-size: 1.3rem;
        }

        .emoji-btn {
            background: #2a2418;
            border: 1px solid #d4af37;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            padding: 0;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .emoji-btn:hover {
            background: #d4af37;
            transform: scale(1.05);
        }

        .emoji-panel {
            position: absolute;
            bottom: 70px;
            right: 20px;
            background: #2a2418;
            border: 2px solid #d4af37;
            border-radius: 20px;
            padding: 15px;
            width: 300px;
            max-height: 400px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .emoji-category {
            margin-bottom: 15px;
        }

        .emoji-category-title {
            color: #ffcd7e;
            font-size: 0.9rem;
            margin-bottom: 8px;
            border-bottom: 1px solid #d4af3740;
            padding-bottom: 4px;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
        }

        .emoji-item {
            font-size: 1.5rem;
            cursor: pointer;
            text-align: center;
            padding: 5px;
            border-radius: 10px;
            transition: all 0.1s;
        }

        .emoji-item:hover {
            background: #d4af37;
            transform: scale(1.2);
        }

        .chat-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            padding: 4px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 12px;
            border-radius: 36px;
            font-weight: bold;
            cursor: pointer;
            color: #c9b896;
            transition: 0.15s;
        }

        .tab-btn.active {
            background: #d4af37;
            color: #2c2c2c;
        }

        .chat-messages-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
            margin-bottom: 15px;
            display: none;
        }

        .chat-messages-container.active {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-message {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 0.85rem;
            animation: fadeInUp 0.2s ease;
        }

        .chat-message.system {
            border-left: 3px solid #d4af37;
        }

        .chat-message.trade {
            border-left: 3px solid #4caf50;
            background: rgba(76,175,80,0.2);
        }

        .chat-message .sender {
            color: #ffcd7e;
            font-weight: bold;
        }

        .chat-message .text {
            color: #f0e6d0;
            word-break: break-word;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
            margin-top: auto;
            position: relative;
        }

        .chat-input {
            flex: 1;
            background: #2a2418;
            border: 1px solid #d4af37;
            border-radius: 40px;
            padding: 12px 16px;
            color: white;
            font-family: inherit;
            outline: none;
        }

        .send-btn {
            background: #d4af37;
            border: none;
            border-radius: 40px;
            padding: 0 20px;
            font-weight: bold;
            cursor: pointer;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .room-screen {
            background: linear-gradient(145deg, #fff7ea, #f7ebd2);
            border-radius: 56px;
            padding: 40px;
            text-align: center;
            max-width: 650px;
            margin: 30px auto;
        }

        .room-screen h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #d4af37, #b8860b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 25px;
        }

        .room-input-group {
            margin: 20px 0;
        }

        .room-input {
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            border: 2px solid #d4af37;
            border-radius: 60px;
            text-align: center;
            background: #fffbf0;
        }

        .room-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .room-btn {
            background: #d4af37;
            padding: 12px 28px;
            font-size: 1.1rem;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
        }

        .room-btn:active {
            transform: scale(0.96);
        }

        .player-name-input-room {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            border: 2px solid #e2caa1;
            border-radius: 60px;
            text-align: center;
            margin: 10px 0;
        }

        .waiting-players {
            margin-top: 20px;
            padding: 15px;
            background: #e9dccd;
            border-radius: 32px;
        }

        .start-game-btn-lobby {
            background: #4caf50;
            color: white;
            font-size: 1.2rem;
            padding: 12px 30px;
            margin-top: 15px;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
        }

        .start-game-btn-lobby:disabled {
            background: #888;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .game-wrapper {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 56px;
            padding: 20px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            background: #f3e5c0;
            border-radius: 32px;
            box-shadow: inset 0 0 0 6px #e9d09c;
            width: min(70vw, 70vh);
            height: min(70vw, 70vh);
            margin: 0 auto;
        }

        .cell {
            background: radial-gradient(ellipse at 30% 35%, #fff5e6, #ffefd3);
            border: 1px solid #cfb27c;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            font-weight: bold;
            text-align: center;
            padding: 3px 1px;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cell:hover {
            background: radial-gradient(ellipse at 30% 35%, #ffe8d0, #ffe0c0);
            transform: scale(1.02);
            z-index: 10;
        }

        .color-brown { border-top: 6px solid #9b5e2c; }
        .color-lightblue { border-top: 6px solid #6fcbdf; }
        .color-pink { border-top: 6px solid #f77fbe; }
        .color-orange { border-top: 6px solid #f39c12; }
        .color-red { border-top: 6px solid #e63946; }
        .color-yellow { border-top: 6px solid #ffd966; }
        .color-green { border-top: 6px solid #2ecc71; }
        .color-blue { border-top: 6px solid #5499ff; }
        .railroad { border-top: 6px solid #6c6f6c; }
        .utility { border-top: 6px solid #48c9b0; }

        .owner-token { position: absolute; bottom: 2px; right: 2px; font-size: 0.65rem; background: rgba(0,0,0,0.7); border-radius: 20px; padding: 0px 4px; color: gold; }
        .players-on-cell { position: absolute; top: 2px; left: 2px; display: flex; gap: 2px; font-size: 0.7rem; background: rgba(0,0,0,0.55); border-radius: 20px; padding: 0px 4px; }

        .game-panel {
            background: #25201ab3;
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 20px;
            margin-top: 20px;
            color: #fcf3e0;
        }

        .players-info { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 15px; }
        .player-card {
            background: #322a1ed9;
            border-radius: 28px;
            padding: 8px 12px;
            flex: 1;
            cursor: pointer;
            border: 2px solid #a8864b;
            transition: all 0.2s;
        }
        .player-card:hover { background: #4a3a28d9; transform: translateY(-2px); }
        .player-card.active { background: #6b4e2ad9; border-color: #ffce89; box-shadow: 0 0 0 2px #ffbc60; }
        .controls { display: flex; gap: 12px; flex-wrap: wrap; margin: 15px 0; align-items: center; }
        button {
            background: #ffcd7e;
            border: none;
            padding: 10px 22px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
        }
        button:active { transform: scale(0.96); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .dice-area { background: #1f1a13b3; padding: 6px 18px; border-radius: 60px; display: inline-flex; align-items: center; gap: 12px; }
        .dice { font-size: 1.8rem; background: #fcf3e0; color: #2a2418; width: 55px; text-align: center; border-radius: 20px; }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            animation: fadeIn 0.2s ease;
        }

        .modal-content {
            background: linear-gradient(145deg, #2a2418, #1f1a13);
            border-radius: 48px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 2px solid #d4af37;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease;
            max-height: 80vh;
            overflow-y: auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-title {
            color: #ffcd7e;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 20px;
        }

        .modal-info {
            background: rgba(0,0,0,0.4);
            border-radius: 32px;
            padding: 15px;
            margin: 15px 0;
        }

        .modal-info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #d4af3740;
            color: #f0e6d0;
        }

        .modal-info-row:last-child {
            border-bottom: none;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            justify-content: center;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            font-size: 1rem;
        }

        .modal-btn-primary {
            background: #4caf50;
            color: white;
        }

        .modal-btn-danger {
            background: #e63946;
            color: white;
        }

        .modal-btn-secondary {
            background: #6c6f6c;
            color: white;
        }

        .property-list {
            max-height: 300px;
            overflow-y: auto;
            margin: 15px 0;
        }

        .property-item {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .property-item:hover {
            background: rgba(212,175,55,0.3);
            transform: translateX(5px);
        }

        .property-name {
            color: #ffcd7e;
            font-weight: bold;
        }

        .property-details {
            font-size: 0.85rem;
            color: #c9b896;
        }

        .bid-input {
            width: 100%;
            padding: 10px;
            background: #3a3022;
            border: 1px solid #d4af37;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            text-align: center;
            margin: 10px 0;
        }

        @media (max-width: 900px) {
            .app-container { flex-direction: column; }
            .chat-panel { max-width: 100%; height: 350px; order: 2; }
            .game-area { order: 1; }
            .board { width: min(85vw, 85vh); height: min(85vw, 85vh); }
            .cell-name { font-size: 0.5rem; }
            .emoji-panel { width: 280px; right: 10px; }
        }
    </style>
</head>

        <div class="chat-messages-container" id="playerChatContainer"></div>

</div>

        const existingModal = document.querySelector('.modal-overlay');

        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-content">
                <h2 class="modal-title">${title}</h2>
                ${content}
                <div class="modal-buttons">
                    ${buttons.map(btn => `<button class="modal-btn ${btn.class || ''}" onclick="(${btn.onClick})()">${btn.text}</button>`).join('')}
                </div>
            </div>
        `;
        
        document.body.appendChild(modal);
        
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.remove();
        });

    }

        showModal(`🔨 АУКЦИОН: ${tile.name}`, content, [
            { text: '💰 Сделать ставку', class: 'modal-btn-primary', onClick: 'placeBid' },
            { text: '🚪 Выйти', class: 'modal-btn-secondary', onClick: 'closeModal' }
        ]);
        
        // Инициализируем аукцион в Firebase
        const auctionRef = db.ref(`rooms/${currentRoomId}/auction`);
        auctionRef.set({
            tileId: tile.id,
            currentBid: tile.price,
            currentBidder: null,
            endTime: Date.now() + 30000, // 30 секунд
            active: true
        });
        
        activeAuction = {
            tileId: tile.id,
            tile: tile,
            ref: auctionRef
        };
        
        // Слушаем ставки
        auctionRef.on('value', (snapshot) => {
            const auction = snapshot.val();
            if (auction && auction.active) {
                const bidsDiv = document.getElementById('auctionBids');
                if (bidsDiv) {
                    bidsDiv.innerHTML = `
                        <div class="modal-info-row">
                            <span>💰 Текущая ставка:</span>
                            <span style="color:#ffcd7e;">$${auction.currentBid}</span>
                        </div>
                        <div class="modal-info-row">
                            <span>👤 Лидирует:</span>
                            <span>${auction.currentBidder ? (localGameState?.players.find(p => p.id === auction.currentBidder)?.avatar || 'Игрок') : 'Нет ставок'}</span>
                        </div>
                        <div class="modal-info-row">
                            <span>⏱️ Осталось:</span>
                            <span id="auctionTimer"></span>
                        </div>
                    `;
                }
            } else if (auction && !auction.active && auction.winner) {
                closeModal();
                const winner = localGameState?.players.find(p => p.id === auction.winner);
                if (winner) {
                    addSystemMessageUI(`🏆 Аукцион завершён! ${winner.avatar} выиграл ${TILES_FULL[auction.tileId].name} за $${auction.currentBid}`);
                    completePurchase(auction.tileId, auction.winner, auction.currentBid);
                }
                activeAuction = null;
            }
        });
        
        // Таймер аукциона
        const timerInterval = setInterval(() => {
            const timerSpan = document.getElementById('auctionTimer');
            if (timerSpan && activeAuction) {
                const timeLeft = Math.max(0, Math.floor((activeAuction.endTime - Date.now()) / 1000));
                timerSpan.textContent = `${timeLeft} сек`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                }
            }
        }, 1000);
    }
    
    window.placeBid = async function() {
        const bidInput = document.getElementById('bidAmount');
        const bid = parseInt(bidInput?.value);
        if (!bid || isNaN(bid)) {
            addSystemMessageUI("Введите корректную сумму ставки!");
            return;
        }
        
        const player = localGameState?.players.find(p => p.id === currentPlayerId);
        if (!player || player.money < bid) {
            addSystemMessageUI("У вас недостаточно денег для этой ставки!");
            return;
        }
        
        if (activeAuction) {
            const auctionRef = db.ref(`rooms/${currentRoomId}/auction`);
            const snapshot = await auctionRef.get();
            const auction = snapshot.val();
            
            if (auction && auction.active && bid > auction.currentBid) {
                await auctionRef.update({
                    currentBid: bid,
                    currentBidder: currentPlayerId,
                    lastUpdate: Date.now()
                });
                addSystemMessageUI(`${player.avatar} предложил $${bid}`);
                document.getElementById('bidAmount').value = '';
            } else {
                addSystemMessageUI("Ставка должна быть выше текущей!");
            }
        }
    };

    async function acceptTrade(offerId, offer) {
        const state = {...localGameState};
        const fromPlayer = state.players.find(p => p.id === offer.from);
        const toPlayer = state.players.find(p => p.id === offer.to);
        
        if (!fromPlayer || !toPlayer) return;
        
        const tile = TILES_FULL[offer.propertyId];
        
        if (toPlayer.money >= offer.price) {
            toPlayer.money -= offer.price;
            fromPlayer.money += offer.price;
            
            // Передача собственности
            const propIndex = fromPlayer.properties.indexOf(offer.propertyId);
            if (propIndex !== -1) {
                fromPlayer.properties.splice(propIndex, 1);
                toPlayer.properties.push(offer.propertyId);
                if (fromPlayer.houses) delete fromPlayer.houses[offer.propertyId];
                if (!toPlayer.houses) toPlayer.houses = {};
                toPlayer.houses[offer.propertyId] = 0;
            }
            
            await db.ref(`rooms/${currentRoomId}/gameState`).update({players: state.players});
            await db.ref(`rooms/${currentRoomId}/tradeOffers/${offerId}`).update({status: 'accepted'});
            
            addSystemMessageUI(`✅ Сделка завершена! ${toPlayer.avatar} купил ${tile.name} у ${fromPlayer.avatar} за $${offer.price}`);
        } else {
            addSystemMessageUI(`❌ У ${toPlayer.avatar} недостаточно денег для сделки!`);
            await db.ref(`rooms/${currentRoomId}/tradeOffers/${offerId}`).update({status: 'declined'});
        }
    }

                    <span style="color:#ffcd7e; font-weight:bold;">$${player.money}</span>
                </div>
                <div class="modal-info-row">
                    <span>🏗️ Стоимость улучшения:</span>
                    <span style="color:#e63946;">-$${upgradeCost}</span>
                </div>
                <div class="modal-info-row">
                    <span>💵 Останется после покупки:</span>
                    <span style="color:${remaining >= 0 ? '#4caf50' : '#e63946'}; font-weight:bold;">$${remaining}</span>
                </div>
                <div class="modal-info-row">
                    <span>📈 Новая аренда:</span>
                    <span style="color:#4caf50;">$${nextRent} (было $${tile.rent[currentHouses]})</span>
                </div>
            </div>
        `;
        
        showModal(`🏗️ Улучшение до ${nextHouses === 5 ? 'ОТЕЛЯ' : `${nextHouses} ${getHouseEnding(nextHouses)}`}`, content, [
            { text: '🏠 Улучшить', class: 'modal-btn-primary', onClick: 'confirmUpgrade' },
            { text: '❌ Отмена', class: 'modal-btn-secondary', onClick: 'closeModal' }
        ]);
    }
    
    function showPropertyInfo(tileId) {
        const tile = TILES_FULL[tileId];
        const owner = localGameState?.players.find(p => p.properties?.includes(tileId));
        const houses = owner?.houses?.[tileId] || 0;
        
        let content = `
            <div class="modal-info">
                <div class="modal-info-row">
                    <span>🏷️ ${tile.name}</span>
                    <span>${tile.type === 'property' ? 'Улица' : tile.type === 'railroad' ? 'Ж/д вокзал' : 'Компания'}</span>
                </div>
                <div class="modal-info-row">
                    <span>💰 Стоимость:</span>
                    <span>$${tile.price || 'Не продаётся'}</span>
                </div>
        `;
        
        if (owner) {
            content += `
                <div class="modal-info-row">
                    <span>👑 Владелец:</span>
                    <span>${owner.avatar} ${owner.name}</span>
                </div>
                <div class="modal-info-row">
                    <span>🏠 Уровень застройки:</span>
                    <span>${houses === 0 ? 'Нет домов' : houses === 5 ? '🏨 Отель' : '🏠'.repeat(houses) + ` ${houses} дом(ов)`}</span>
                </div>
            `;
            if (tile.rent) {
                const currentRent = tile.rent[houses];
                content += `<div class="modal-info-row"><span>💰 Текущая аренда:</span><span style="color:#ffcd7e;">$${currentRent}</span></div>`;
            }
        } else if (tile.price) {
            content += `<div class="modal-info-row"><span>📈 Базовая аренда:</span><span>$${tile.rent?.[0] || 'См. условия'}</span></div>`;
            content += `<div class="modal-info-row"><span>🏗️ Стоимость дома:</span><span>$${tile.houseCost || 'Н/Д'}</span></div>`;
        }
        
        content += `</div>`;
        
        showModal(`📋 Информация о клетке`, content, [
            { text: 'Закрыть', class: 'modal-btn-secondary', onClick: 'closeModal' }
        ]);
    }
    
    function getHouseEnding(num) {
        if (num === 1) return 'дом';
        if (num >= 2 && num <= 4) return 'дома';
        return 'домов';
    }
    
    // Глобальные функции для модальных окон
    window.confirmPurchase = async function() {
        await buyProperty();
        closeModal();
    };
    
    window.confirmUpgrade = async function() {
        if (pendingUpgradeTileId) {
            await upgradeProperty(pendingUpgradeTileId);
            pendingUpgradeTileId = null;
        }
        closeModal();
    };
    
    window.closeModal = function() {
        const modal = document.querySelector('.modal-overlay');
        if (modal) modal.remove();
        if (activeAuction && activeAuction.ref) {
            activeAuction.ref.off();
            activeAuction = null;
        }
    };
    
    let pendingUpgradeTileId = null;
    
    // ========== ЭКРАН КОМНАТЫ ==========
    function showRoomScreen() {
        document.getElementById("chatPanel").style.display = "none";
        document.getElementById("gameArea").innerHTML = `
            <div class="room-screen">
                <h1>🎩 MONOPOLY ONLINE</h1>

                    <input type="text" id="playerNameInput" class="player-name-input-room" placeholder="Ваше имя" value="Игрок${Math.floor(Math.random()*100)}">

                <div class="room-input-group">

                </div>
                <div class="room-buttons">
                    <button class="room-btn" id="createRoomBtn">✨ Создать комнату</button>
                    <button class="room-btn" id="joinRoomBtn">🔗 Подключиться</button>

                <input type="text" id="roomIdInput" class="room-input" placeholder="Или введите ID комнаты для подключения">

            div.innerText = av;
            div.onclick = () => {
                document.querySelectorAll("#roomAvatarSelector .avatar-option").forEach(el => el.style.background = "#f2e5d4");
                div.style.background = "#ffcd7e";

            };
            if(idx === 0) div.style.background = "#ffcd7e";
            avatarContainer.appendChild(div);

        document.getElementById("createRoomBtn").onclick = () => createRoom();
        document.getElementById("joinRoomBtn").onclick = () => joinRoom();

    // ========== СОЗДАНИЕ КОМНАТЫ ==========
    async function createRoom() {
        if (!initFirebase()) return;
        
        currentPlayerName = document.getElementById("playerNameInput").value.trim() || "Аноним";
        let customId = document.getElementById("customRoomId").value.trim();
        
        if (customId) {
            customId = customId.toUpperCase().replace(/[^A-Z0-9]/g, "");
            if (customId.length < 3) {
                alert("Название комнаты должно содержать минимум 3 символа");
                return;
            }
            currentRoomId = customId;
        } else {
            currentRoomId = generateRoomId();
        }
        
        currentPlayerId = generatePlayerId();
        isRoomCreator = true;
        gameStartedFlag = false;
        
        const roomRef = db.ref(`rooms/${currentRoomId}`);
        const snapshot = await roomRef.get();
        if (snapshot.exists()) {
            alert(`Комната "${currentRoomId}" уже существует!`);
            return;
        }
        
        const roomData = {
            id: currentRoomId,
            creatorId: currentPlayerId,
            players: {
                [currentPlayerId]: {
                    id: currentPlayerId,
                    name: currentPlayerName,
                    avatar: currentPlayerAvatar,
                    joinedAt: Date.now()
                }
            },
            gameState: null,
            createdAt: Date.now(),
            status: "waiting",
            gameStarted: false
        };
        
        try {
            await roomRef.set(roomData);
            console.log("✅ Комната создана");
            setupGameListeners();
            showGameLobby();
        } catch(e) {
            alert("Ошибка создания: " + e.message);
        }
    }
    
    // ========== ПОДКЛЮЧЕНИЕ ==========
    async function joinRoom() {
        if (!initFirebase()) return;
        
        const roomId = document.getElementById("roomIdInput").value.trim();
        if (!roomId) {
            alert("Введите ID комнаты");
            return;
        }
        
        currentPlayerName = document.getElementById("playerNameInput").value.trim() || "Аноним";
        currentRoomId = roomId.toUpperCase();
        currentPlayerId = generatePlayerId();
        isRoomCreator = false;
        gameStartedFlag = false;
        
        const roomRef = db.ref(`rooms/${currentRoomId}`);
        const snapshot = await roomRef.get();
        
        if (!snapshot.exists()) {
            alert(`Комната "${currentRoomId}" не найдена!`);
            return;
        }
        
        const room = snapshot.val();
        if (room.gameStarted) {
            alert("Игра уже началась!");
            return;
        }
        
        const playerCount = Object.keys(room.players || {}).length;
        if (playerCount >= 4) {
            alert("Комната полна (максимум 4 игрока)");
            return;
        }
        
        try {
            await roomRef.child(`players/${currentPlayerId}`).set({
                id: currentPlayerId,
                name: currentPlayerName,
                avatar: currentPlayerAvatar,
                joinedAt: Date.now()
            });
            console.log("✅ Подключено к комнате");
            setupGameListeners();
            showGameLobby();
        } catch(e) {
            alert("Ошибка подключения: " + e.message);
        }
    }
    
    function generateRoomId() {
        return Math.random().toString(36).substring(2, 8).toUpperCase();
    }
    
    function generatePlayerId() {
        return Date.now() + "-" + Math.random().toString(36).substring(2, 8);
    }
    
    // ========== НАСТРОЙКА СЛУШАТЕЛЕЙ ==========
    function setupGameListeners() {
        const roomRef = db.ref(`rooms/${currentRoomId}`);
        
        roomRef.child("players").on("value", (snapshot) => {
            const players = snapshot.val() || {};
            playersMap.clear();
            const playerList = [];
            for (let id in players) {
                playersMap.set(id, players[id]);
                playerList.push(players[id]);
            }
            if (!gameStartedFlag && !localGameState) {
                updateLobbyPlayers(playerList);
            }
        });
        
        if (gameStateListener) {
            gameStateListener.off();
        }
        
        gameStateListener = roomRef.child("gameState");
        gameStateListener.on("value", (snapshot) => {
            const state = snapshot.val();
            console.log("📡 gameState обновлён:", state ? "есть данные" : "нет данных");
            
            if (!state) return;
            
            if (state.gameStarted === true) {
                if (!state.players || !Array.isArray(state.players) || state.players.length === 0) {
                    console.log("⏳ Ждем загрузки players...");
                    return;
                }
                
                console.log("✅ Игроки загружены:", state.players.length);
                gameStartedFlag = true;
                localGameState = state;
                gameActive = true;
                myTurn = (state.currentPlayer === currentPlayerId);
                renderGameFromState();
            } else if (!state.gameStarted && gameStartedFlag) {
                gameStartedFlag = false;
                localGameState = null;
                showGameLobby();
            }
        });
        
        // Слушаем предложения торговли
        roomRef.child("tradeOffers").on("child_added", (snapshot) => {
            const offer = snapshot.val();
            if (offer.to === currentPlayerId && offer.status === 'pending') {
                const fromPlayer = localGameState?.players.find(p => p.id === offer.from);
                const tile = TILES_FULL[offer.propertyId];
                if (fromPlayer && tile) {
                    addSystemMessageUI(`💰 ${fromPlayer.avatar} предлагает купить ${tile.name} за $${offer.price}. Введите /accept для принятия или /decline для отказа.`);
                    window.pendingOffer = { id: snapshot.key, ...offer };
                }
            }
        });
        
        if (syncInterval) clearInterval(syncInterval);
        syncInterval = setInterval(async () => {
            if (gameStartedFlag) return;
            
            const snapshot = await roomRef.child("gameState").get();
            const state = snapshot.val();
            if (state && state.gameStarted === true && state.players && state.players.length > 0 && !gameStartedFlag) {
                console.log("🔄 Принудительная синхронизация: загружаем игру");
                gameStartedFlag = true;
                localGameState = state;
                gameActive = true;
                myTurn = (state.currentPlayer === currentPlayerId);
                renderGameFromState();
            }
        }, 2000);
        
        roomRef.child("chat").on("child_added", (snapshot) => {
            const msg = snapshot.val();
            if (msg && msg.type === "player") {
                addPlayerMessageUI(msg.sender, msg.text);
            } else if (msg && msg.type === "system") {
                addSystemMessageUI(msg.text);
            }
        });
    }
    
    function updateLobbyPlayers(players) {
        const statusDiv = document.getElementById("roomStatus");
        if (!statusDiv) return;
        
        const canStart = players.length >= 2 && players.length <= 4;
        
        statusDiv.innerHTML = `<div class="waiting-players">
            <h3>👥 В комнате (${players.length}/4):</h3>
            ${players.map(p => `<p>${p.avatar} ${p.name} ${p.id === currentPlayerId ? '(Вы)' : ''}</p>`).join('')}
            <p style="margin-top:10px;">${players.length < 2 ? '⏳ Ожидание игроков... (нужно минимум 2)' : '✅ Достаточно игроков!'}</p>
            ${isRoomCreator ? `<button id="startGameBtn" class="start-game-btn-lobby" ${!canStart ? 'disabled' : ''}>🚀 СТАРТ ИГРЫ</button>` : `<p style="margin-top:10px; color:#d4af37;">🎲 Ожидайте начала игры от создателя комнаты...</p>`}
        </div>`;
        
        if (isRoomCreator) {
            const startBtn = document.getElementById("startGameBtn");
            if (startBtn) {
                startBtn.onclick = () => startGameManually();
            }
        }
    }
    
    function showGameLobby() {
        document.getElementById("chatPanel").style.display = "flex";
        document.getElementById("roomNameDisplay").innerText = currentRoomId;
        document.getElementById("gameArea").innerHTML = `
            <div class="game-wrapper">
                <div style="text-align:center; padding:50px; background:rgba(0,0,0,0.5); border-radius:48px;">
                    <h2 style="color:#ffcd7e;">🎲 ЛОББИ</h2>
                    <p style="color:white;">ID комнаты: <strong style="font-size:1.5rem;">${currentRoomId}</strong></p>
                    <p style="color:white;">Поделитесь этим кодом с друзьями!</p>
                    <div id="roomStatus"></div>
                </div>
            </div>
        `;
        
        db.ref(`rooms/${currentRoomId}/players`).get().then(snapshot => {
            const players = snapshot.val() || {};
            updateLobbyPlayers(Object.values(players));
        });
    }
    
    // ========== ЗАПУСК ИГРЫ ==========
    async function startGameManually() {
        if (!isRoomCreator) {
            addSystemMessageUI("Только создатель комнаты может начать игру!");
            return;
        }
        
        const players = Array.from(playersMap.values());
        if (players.length < 2) {
            alert("Нужно минимум 2 игрока для начала игры!");
            return;
        }
        
        addSystemMessageUI("🎮 Создатель комнаты начинает игру!");
        
        const gamePlayers = players.map((p, idx) => ({
            id: p.id,
            name: p.name,
            avatar: p.avatar,
            money: 1500,
            position: 0,
            properties: [],
            houses: {},
            inJail: false,
            jailTurns: 0,
            order: idx
        }));
        
        const initialState = {
            gameStarted: true,
            players: gamePlayers,
            currentPlayer: gamePlayers[0].id,
            diceRolled: false,
            currentDiceSum: 0,
            doublesCount: 0,
            waitingForPurchase: false,
            purchaseTileId: null,
            lastUpdate: Date.now()
        };
        
        const roomRef = db.ref(`rooms/${currentRoomId}`);
        
        try {
            await roomRef.update({
                gameStarted: true,
                gameState: initialState
            });
            
            addSystemMessageUI("🎉 Игра началась! Ход первого игрока!");
            
            gameStartedFlag = true;
            localGameState = initialState;
            gameActive = true;
            myTurn = (initialState.currentPlayer === currentPlayerId);
            renderGameFromState();
        } catch(e) {
            console.error("Ошибка при старте игры:", e);
            addSystemMessageUI("❌ Ошибка при старте игры!");
        }
    }
    
    // ========== ОТРИСОВКА ИГРЫ ==========
    function renderGameFromState() {
        if (!localGameState) {
            console.log("Нет состояния игры для отображения");
            return;
        }
        
        if (!localGameState.players || !Array.isArray(localGameState.players)) {
            console.log("Нет players в состоянии игры, ждем загрузки...", localGameState);
            return;
        }
        
        if (localGameState.players.length === 0) {
            console.log("players пустой, ждем загрузки...");
            return;
        }
        
        console.log("🎨 Рендеринг игры...", localGameState.players.length, "игроков");
        const players = localGameState.players;
        const currentPlayerIdGame = localGameState.currentPlayer;
        
        let boardHtml = `<div class="board" id="board">`;
        for(let i = 0; i < 40; i++) {
            const tile = TILES_FULL[i];
            const [row, col] = positionsMap[i];
            let colorClass = "";
            if (tile.color) colorClass = `color-${tile.color}`;
            if (tile.type === "railroad") colorClass = "railroad";
            if (tile.type === "utility") colorClass = "utility";
            
            const playersOnCell = players.filter(p => p && p.position === i);
            const playersAvatars = playersOnCell.map(p => p.avatar || "?").join('');
            
            const owner = players.find(p => p.properties && p.properties.includes(i));
            const housesCount = owner?.houses?.[i] || 0;
            const housesDisplay = housesCount > 0 ? (housesCount === 5 ? '🏨' : '🏠'.repeat(housesCount)) : '';
            
            boardHtml += `<div class="cell ${colorClass}" onclick="showPropertyInfo(${i})" style="grid-row:${row+1};grid-column:${col+1}">
                <div class="cell-name">${tile.name.length > 12 ? tile.name.substring(0,10)+".." : tile.name}</div>
                ${tile.price ? `<div class="cell-price">$${tile.price}</div>` : ''}
                ${owner ? `<div class="owner-token">👑 ${owner.avatar} ${housesDisplay}</div>` : ''}
                <div class="players-on-cell">${playersAvatars}</div>
            </div>`;
        }
        boardHtml += `</div>`;
        
        const playersHtml = players.map(p => {
            if (!p) return '';
            return `
                <div class="player-card ${currentPlayerIdGame === p.id ? 'active' : ''}" onclick="showPlayerActions('${p.id}')">
                    <div class="player-name">${p.avatar || '?'} ${p.name || '???'}</div>
                    <div class="player-money">💰 $${p.money || 0}</div>
                    <div>🏠 ${(p.properties && p.properties.length) || 0}</div>
                    ${p.id === currentPlayerId && myTurn ? '<span style="font-size:0.7rem;">🎲 ВАШ ХОД</span>' : ''}
                </div>
            `;
        }).join('');
        
        const chatPanel = document.getElementById("chatPanel");
        if (chatPanel && chatPanel.style.display === "none") {
            chatPanel.style.display = "flex";
        }
        
        document.getElementById("gameArea").innerHTML = `
            <div class="game-wrapper">
                ${boardHtml}
                <div class="game-panel">
                    <div class="players-info">${playersHtml}</div>
                    <div class="controls">
                        <button id="rollBtn" ${!myTurn || localGameState.diceRolled ? 'disabled' : ''}>🎲 Бросить кубики</button>
                        <button id="endTurnBtn" ${!myTurn || !localGameState.diceRolled ? 'disabled' : ''}>➡️ Закончить ход</button>
                        <button id="tradeBtn" ${!myTurn ? 'disabled' : ''}>🤝 Торговля</button>
                        <div class="dice-area"><span>🎲 Кубики:</span><span class="dice">${localGameState.currentDiceSum || '⚀⚀'}</span></div>
                    </div>
                </div>
            </div>
        `;
        
        const rollBtn = document.getElementById("rollBtn");
        const endTurnBtn = document.getElementById("endTurnBtn");
        const tradeBtn = document.getElementById("tradeBtn");
        
        if (rollBtn) {
            rollBtn.addEventListener("click", () => rollDice());
        }
        if (endTurnBtn) {
            endTurnBtn.addEventListener("click", () => endTurn());
        }
        if (tradeBtn) {
            tradeBtn.addEventListener("click", () => showTradeModal());
        }
    }
    
    function showPlayerActions(playerId) {
        if (playerId !== currentPlayerId || !myTurn || localGameState?.diceRolled) return;
        
        const player = localGameState?.players.find(p => p.id === currentPlayerId);
        if (!player) return;
        
        const ownProperties = player.properties || [];
        const upgradableProperties = ownProperties.filter(propId => {
            const tile = TILES_FULL[propId];
            return tile.type === "property" && (player.houses?.[propId] || 0) < 5;
        });
        
        if (upgradableProperties.length === 0) {
            addSystemMessageUI("У вас нет недвижимости для улучшения!");
            return;
        }
        
        let content = `
            <div class="modal-info">
                <div class="modal-info-row">
                    <span>💰 Ваш баланс:</span>
                    <span style="color:#ffcd7e;">$${player.money}</span>
                </div>
                <div class="modal-info-row">
                    <span>🏠 Доступно для улучшения:</span>
                    <span>${upgradableProperties.length} объектов</span>
                </div>
            </div>
            <div class="property-list">
                ${upgradableProperties.map(propId => {
                    const tile = TILES_FULL[propId];
                    const currentHouses = player.houses?.[propId] || 0;
                    const upgradeCost = tile.houseCost;
                    const canAfford = player.money >= upgradeCost;
                    return `
                        <div class="property-item" onclick="selectUpgradeProperty(${propId})">
                            <div class="property-name">${tile.name}</div>
                            <div class="property-details">
                                Уровень: ${currentHouses === 0 ? 'Без домов' : currentHouses === 5 ? 'Отель' : `${currentHouses} дом(ов)`} | 
                                Стоимость улучшения: $${upgradeCost} ${!canAfford ? '(не хватает)' : ''}
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;
        
        showModal('🏗️ Улучшение недвижимости', content, [
            { text: 'Закрыть', class: 'modal-btn-secondary', onClick: 'closeModal' }
        ]);
    }
    
    window.selectUpgradeProperty = function(tileId) {
        const tile = TILES_FULL[tileId];
        const player = localGameState?.players.find(p => p.id === currentPlayerId);
        if (player) {
            pendingUpgradeTileId = tileId;
            closeModal();
            showUpgradeModal(tile, player);
        }
    };
    
    // ========== ИГРОВЫЕ ДЕЙСТВИЯ ==========
    async function rollDice() {
        if (!myTurn || localGameState.diceRolled) return;
        
        const d1 = Math.floor(Math.random() * 6) + 1;
        const d2 = Math.floor(Math.random() * 6) + 1;
        const sum = d1 + d2;
        const isDouble = (d1 === d2);
        
        const newState = {...localGameState};
        newState.diceRolled = true;
        newState.currentDiceSum = sum;
        newState.lastUpdate = Date.now();
        
        await db.ref(`rooms/${currentRoomId}/gameState`).update(newState);
        addSystemMessageUI(`${getCurrentPlayer()?.avatar || "Игрок"} бросил ${d1}+${d2}=${sum} ${isDouble ? '(ДУБЛЬ!)' : ''}`);
        
        setTimeout(() => movePlayerAfterRoll(sum, isDouble), 500);
    }
    
    async function movePlayerAfterRoll(steps, isDouble) {
        if (!localGameState) return;
        
        const state = {...localGameState};
        const playerIndex = state.players.findIndex(p => p.id === currentPlayerId);
        if (playerIndex === -1) return;
        
        const player = state.players[playerIndex];
        let oldPos = player.position;
        let newPos = (player.position + steps) % 40;
        let passedGo = newPos < oldPos;
        
        if (passedGo) {
            player.money += 200;
            addSystemMessageUI(`${player.avatar} прошёл СТАРТ +$200`);
        }
        
        player.position = newPos;
        
        await db.ref(`rooms/${currentRoomId}/gameState`).update({players: state.players});
        addSystemMessageUI(`${player.avatar} переместился на клетку ${TILES_FULL[newPos].name}`);
        
        setTimeout(() => handleTileEffect(newPos, isDouble), 300);
    }
    
    async function handleTileEffect(tileId, isDouble) {
        if (!localGameState) return;
        
        const state = {...localGameState};
        const playerIndex = state.players.findIndex(p => p.id === currentPlayerId);
        if (playerIndex === -1) return;
        
        const player = state.players[playerIndex];
        const tile = TILES_FULL[tileId];
        
        const owner = state.players.find(p => p.properties && p.properties.includes(tileId));
        
        switch(tile.type) {
            case "property":
            case "railroad":
            case "utility":
                if (owner && owner.id !== currentPlayerId) {
                    let rent = 0;
                    if (tile.type === "property") {
                        const houses = owner.houses?.[tileId] || 0;
                        rent = tile.rent[houses] || tile.rent[0];
                    } else if (tile.type === "railroad") {
                        const railroadsOwned = owner.properties.filter(id => TILES_FULL[id].type === "railroad").length;
                        rent = tile.rent[railroadsOwned - 1] || 25;
                    } else if (tile.type === "utility") {
                        const utilitiesOwned = owner.properties.filter(id => TILES_FULL[id].type === "utility").length;
                        const diceSum = state.currentDiceSum || 4;
                        rent = tile.rent[utilitiesOwned - 1] * diceSum;
                    }
                    
                    if (player.money >= rent) {
                        player.money -= rent;
                        const ownerIndex = state.players.findIndex(p => p.id === owner.id);
                        state.players[ownerIndex].money += rent;
                        addSystemMessageUI(`${player.avatar} заплатил аренду ${owner.avatar} $${rent}`);
                    } else {
                        addSystemMessageUI(`${player.avatar} БАНКРОТ! Не хватает денег на аренду!`);
                        player.money = 0;
                    }
                    await db.ref(`rooms/${currentRoomId}/gameState`).update({players: state.players});
                } else if (!owner && player.money >= tile.price) {
                    showPurchaseModal(tile, player.money);
                    await db.ref(`rooms/${currentRoomId}/gameState`).update({
                        waitingForPurchase: true,
                        purchaseTileId: tileId
                    });
                    return;
                }
                break;
                
            case "tax":
                const tax = tile.tax || 100;
                player.money -= tax;
                addSystemMessageUI(`${player.avatar} заплатил налог $${tax}`);
                await db.ref(`rooms/${currentRoomId}/gameState`).update({players: state.players});
                break;
                
            case "chance":
                const chanceCard = CHANCE_CARDS[Math.floor(Math.random() * CHANCE_CARDS.length)];
                addSystemMessageUI(`🎲 Шанс: ${chanceCard.text}`);
                await processCardEffect(state, player, chanceCard);
                break;
                
            case "chest":
                const chestCard = CHEST_CARDS[Math.floor(Math.random() * CHEST_CARDS.length)];
                addSystemMessageUI(`📦 Общественная казна: ${chestCard.text}`);
                await processCardEffect(state, player, chestCard);
                break;
                
            case "goToJail":
                player.position = 10;
                player.inJail = true;
                player.jailTurns = 0;
                addSystemMessageUI(`${player.avatar} отправляется в тюрьму!`);
                await db.ref(`rooms/${currentRoomId}/gameState`).update({
                    players: state.players,
                    diceRolled: true
                });
                break;
        }
        
        if (!isDouble) {
            await endTurnAfterMove();
        } else {
            await db.ref(`rooms/${currentRoomId}/gameState`).update({
                diceRolled: false,
                waitingForPurchase: false,
                purchaseTileId: null
            });
        }
    }
    
    async function processCardEffect(state, player, card) {
        switch(card.type) {
            case "money":
                player.money += card.value;
                addSystemMessageUI(`${player.avatar} ${card.value >= 0 ? 'получил' : 'потерял'} $${Math.abs(card.value)}`);
                await db.ref(`rooms/${currentRoomId}/gameState`).update({players: state.players});
                break;
            case "move":
                player.position = 0;
                await db.ref(`rooms/${currentRoomId}/gameState`).update({players: state.players});
                addSystemMessageUI(`${player.avatar} перемещается на СТАРТ`);
                break;
            case "moveForward":
                const newPos = (player.position + card.value) % 40;
                player.position = newPos;
                await db.ref(`rooms/${currentRoomId}/gameState`).update({players: state.players});
                addSystemMessageUI(`${player.avatar} перемещается вперёд на ${card.value} клеток`);
                break;
        }
    }
    
    async function completePurchase(tileId, buyerId, price) {
        const state = {...localGameState};
        const buyerIndex = state.players.findIndex(p => p.id === buyerId);
        
        if (buyerIndex !== -1 && state.players[buyerIndex].money >= price) {
            state.players[buyerIndex].money -= price;
            if (!state.players[buyerIndex].properties) state.players[buyerIndex].properties = [];
            state.players[buyerIndex].properties.push(tileId);
            if (!state.players[buyerIndex].houses) state.players[buyerIndex].houses = {};
            state.players[buyerIndex].houses[tileId] = 0;
        }
        
        await db.ref(`rooms/${currentRoomId}/gameState`).update({players: state.players});
        renderGameFromState();
    }
    
    async function buyProperty() {
        if (!localGameState.waitingForPurchase) return;
        
        const state = {...localGameState};
        const playerIndex = state.players.findIndex(p => p.id === currentPlayerId);
        const tileId = state.purchaseTileId;
        const tile = TILES_FULL[tileId];
        
        if (playerIndex !== -1 && state.players[playerIndex].money >= tile.price) {
            state.players[playerIndex].money -= tile.price;
            if (!state.players[playerIndex].properties) state.players[playerIndex].properties = [];
            state.players[playerIndex].properties.push(tileId);
            if (!state.players[playerIndex].houses) state.players[playerIndex].houses = {};
            state.players[playerIndex].houses[tileId] = 0;
            addSystemMessageUI(`${state.players[playerIndex].avatar} купил ${tile.name} за $${tile.price}`);
        }
        
        state.waitingForPurchase = false;
        state.purchaseTileId = null;
        
        await db.ref(`rooms/${currentRoomId}/gameState`).update({
            players: state.players,
            waitingForPurchase: false,
            purchaseTileId: null
        });
        
        renderGameFromState();
    }
    
    async function upgradeProperty(tileId) {
        if (!myTurn || localGameState.diceRolled) return;
        
        const state = {...localGameState};
        const playerIndex = state.players.findIndex(p => p.id === currentPlayerId);
        if (playerIndex === -1) return;
        
        const player = state.players[playerIndex];
        const tile = TILES_FULL[tileId];
        const currentHouses = player.houses?.[tileId] || 0;
        
        if (currentHouses >= 5) {
            addSystemMessageUI("Уже максимальный уровень!");
            return;
        }
        
        const upgradeCost = tile.houseCost;
        
        if (player.money < upgradeCost) {
            addSystemMessageUI(`Не хватает денег! Нужно $${upgradeCost}`);
            return;
        }
        
        const colorGroup = tile.color;
        const sameColorProperties = TILES_FULL.filter(t => t.color === colorGroup && t.type === "property").map(t => t.id);
        const ownsAllGroup = sameColorProperties.every(propId => player.properties.includes(propId));
        
        if (!ownsAllGroup) {
            addSystemMessageUI(`Нужно владеть всеми улицами цвета ${colorGroup} для улучшения!`);
            return;
        }
        
        for (let propId of sameColorProperties) {
            const housesOnProp = player.houses?.[propId] || 0;
            if (housesOnProp < currentHouses) {
                addSystemMessageUI("Улицы в цветовой группе должны быть застроены равномерно!");
                return;
            }
        }
        
        player.money -= upgradeCost;
        if (!player.houses) player.houses = {};
        player.houses[tileId] = currentHouses + 1;
        
        await db.ref(`rooms/${currentRoomId}/gameState`).update({
            players: state.players
        });
        
        addSystemMessageUI(`${player.avatar} улучшил ${tile.name} до уровня ${player.houses[tileId]} ${player.houses[tileId] === 5 ? '🏨' : '🏠'}`);
        
        renderGameFromState();
    }
    
    async function endTurn() {
        if (!myTurn) return;
        await endTurnAfterMove();
    }
    
    async function endTurnAfterMove() {
        const state = {...localGameState};
        const players = state.players;
        const currentIdx = players.findIndex(p => p.id === currentPlayerId);
        const nextIdx = (currentIdx + 1) % players.length;
        
        await db.ref(`rooms/${currentRoomId}/gameState`).update({
            currentPlayer: players[nextIdx].id,
            diceRolled: false,
            currentDiceSum: 0,
            waitingForPurchase: false,
            purchaseTileId: null
        });
        addSystemMessageUI(`➡️ Ход переходит к ${players[nextIdx].avatar}`);
    }
    
    function getCurrentPlayer() {
        return localGameState?.players.find(p => p.id === currentPlayerId);
    }
    
    // ========== ЧАТ ==========
    function addPlayerMessageUI(sender, text) {
        const container = document.getElementById("playerChatContainer");
        if (container) {
            container.innerHTML += `<div class="chat-message"><span class="sender">${sender}:</span> <span class="text">${text}</span></div>`;
            container.scrollTop = container.scrollHeight;
        }
    }
    
    function addSystemMessageUI(text) {
        const container = document.getElementById("systemChatContainer");
        if (container) {
            container.innerHTML += `<div class="chat-message system"><span class="sender">📢 События:</span> <span class="text">${text}</span></div>`;
            container.scrollTop = container.scrollHeight;
        }
    }
    
    async function sendChatMessage() {
        const input = document.getElementById("chatInput");
        if (!input.value.trim() || !currentRoomId) return;
        
        const message = input.value.trim();
        
        // Обработка команд торговли
        if (message === '/accept' && window.pendingOffer) {
            await acceptTrade(window.pendingOffer.id, window.pendingOffer);
            window.pendingOffer = null;
            input.value = "";
            return;
        }
        
        if (message === '/decline' && window.pendingOffer) {
            await db.ref(`rooms/${currentRoomId}/tradeOffers/${window.pendingOffer.id}`).update({status: 'declined'});
            addSystemMessageUI("❌ Вы отклонили предложение о торговле");
            window.pendingOffer = null;
            input.value = "";
            return;
        }
        
        const player = getCurrentPlayer();
        const senderName = player ? `${player.avatar} ${player.name}` : currentPlayerName;
        
        await db.ref(`rooms/${currentRoomId}/chat`).push({
            type: "player",
            sender: senderName,
            text: message,
            timestamp: Date.now()
        });
        input.value = "";
    }
    
    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    function initUI() {
        showRoomScreen();
        
        document.addEventListener("click", (e) => {
            if (e.target.id === "sendChatBtn") sendChatMessage();
            if (e.target.id === "emojiBtn") toggleEmojiPanel();
        });
        document.addEventListener("keypress", (e) => {
            if (e.target.id === "chatInput" && e.key === "Enter") sendChatMessage();
        });
        
        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                document.querySelectorAll(".chat-messages-container").forEach(c => c.classList.remove("active"));
                document.getElementById(`${btn.dataset.tab}ChatContainer`).classList.add("active");
            });
        });
        
        if(document.getElementById("playerChatContainer")) {
            document.getElementById("playerChatContainer").classList.add("active");
        }
        
        // Глобальные функции
        window.showPropertyInfo = showPropertyInfo;
        window.showPlayerActions = showPlayerActions;
        window.selectUpgradeProperty = selectUpgradeProperty;
        window.closeModal = closeModal;
        window.confirmPurchase = confirmPurchase;
        window.confirmUpgrade = confirmUpgrade;
        window.startAuction = startAuction;
        window.placeBid = placeBid;
        window.selectTradePlayer = selectTradePlayer;
        window.offerProperty = offerProperty;
        window.sendTradeOffer = sendTradeOffer;
    }
    
    initUI();
</script>
