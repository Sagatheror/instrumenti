<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Наша Монополия</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a2f1f, #030c07);
            font-family: 'Segoe UI', 'Poppins', 'Inter', sans-serif;
            min-height: 100vh;
            padding: 15px;
        }

        .app-container {
            display: flex;
            gap: 20px;
            max-width: 2000px;
            margin: 0 auto;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .game-area {
            flex: 4;
            min-width: 380px;
        }

        .chat-panel {
            flex: 1.5;
            min-width: 320px;
            max-width: 420px;
            background: rgba(30, 25, 20, 0.95);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
            border: 1px solid rgba(212, 175, 55, 0.3);
            display: flex;
            flex-direction: column;
            height: calc(100vh - 30px);
            max-height: 1000px;
        }

        .chat-header {
            display: flex;

            padding-bottom: 15px;

        .emoji-panel {
    position: absolute;

}

.emoji-category {

<body>
<div class="app-container" id="appContainer">
    <div class="game-area" id="gameArea"></div>
    <div class="chat-panel" id="chatPanel" style="display: none;">
        <div class="chat-header">
            <span style="font-size: 1.6rem;">💬</span>
            <h3>Чат комнаты <span id="roomNameDisplay"></span></h3>
            <button class="emoji-btn" id="emojiBtn">😊</button>
        </div>
        <div class="chat-tabs">
            <button class="tab-btn active" data-tab="player">👥 Игровой чат</button>
            <button class="tab-btn" data-tab="system">🎲 Лог событий</button>
        </div>
        <div class="chat-messages-container" id="playerChatContainer"></div>
        <div class="chat-messages-container" id="systemChatContainer"></div>
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chatInput" placeholder="Написать сообщение...">
            <button class="send-btn" id="sendChatBtn">➤</button>
        </div>
    </div>
</div>

<script>
    // ========== КОНФИГУРАЦИЯ FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyCPV9-uUkRa-siCKpKYwLDEjV_kd83tHwc",
        authDomain: "monopoly-multiplayer.firebaseapp.com",
        projectId: "monopoly-multiplayer",
        storageBucket: "monopoly-multiplayer.firebasestorage.app",
        messagingSenderId: "49002223534",
        appId: "1:49002223534:web:2e1266b6e4450a8923da3f",
        measurementId: "G-BM5PJ238N2",
        databaseURL: "https://monopoly-multiplayer-default-rtdb.europe-west1.firebasedatabase.app"
    };
    
    let db = null;
    
    function initFirebase() {
        try {
            if (firebase.apps.length === 0) {
                firebase.initializeApp(firebaseConfig);
            }
            db = firebase.database();
            console.log("✅ Firebase подключён");
            return true;
        } catch(e) {
            console.error("❌ Ошибка Firebase:", e);
            return false;
        }
    }
    
    // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
    let currentRoomId = null;
    let currentPlayerId = null;
    let currentPlayerName = "";
    let currentPlayerAvatar = "🐧";
    let isRoomCreator = false;
    let gameActive = false;
    let myTurn = false;
    let playersMap = new Map();
    let localGameState = null;
    let gameStateListener = null;
    let syncInterval = null;
    let gameStartedFlag = false;
    let activeAuction = null;
    let auctionListener = null;
    let pendingTradeOffer = null;
    
    function savePlayerSession() {
        if (currentRoomId && currentPlayerId) {
            localStorage.setItem('monopoly_session', JSON.stringify({
                roomId: currentRoomId,
                playerId: currentPlayerId,
                playerName: currentPlayerName,
                playerAvatar: currentPlayerAvatar,
                isCreator: isRoomCreator
            }));
        }
    }
    
    function loadPlayerSession() {
        const saved = localStorage.getItem('monopoly_session');
        if (saved) {
            try {
                return JSON.parse(saved);
            } catch(e) { return null; }
        }
        return null;
    }
    
    function clearPlayerSession() {
        localStorage.removeItem('monopoly_session');
    }
    
    async function tryReconnect() {
        const session = loadPlayerSession();
        if (!session || !session.roomId) return false;
        
        if (!initFirebase()) return false;
        
        currentRoomId = session.roomId;
        currentPlayerId = session.playerId;
        currentPlayerName = session.playerName;
        currentPlayerAvatar = session.playerAvatar;
        isRoomCreator = session.isCreator;
        
        const roomRef = db.ref(`rooms/${currentRoomId}`);
        const snapshot = await roomRef.get();
        
        if (!snapshot.exists()) {
            clearPlayerSession();
            return false;
        }
        
        const room = snapshot.val();
        
        if (!room.players || !room.players[currentPlayerId]) {
            await roomRef.child(`players/${currentPlayerId}`).set({
                id: currentPlayerId,
                name: currentPlayerName,
                avatar: currentPlayerAvatar,
                joinedAt: Date.now()
            });
        }
        
        setupGameListeners();
        
        if (room.gameStarted && room.gameState) {
            gameStartedFlag = true;
            localGameState = room.gameState;
            gameActive = true;
            myTurn = (room.gameState.currentPlayer === currentPlayerId);
            renderGameFromState();
        } else {
            showGameLobby();
        }
        
        addSystemMessageUI("🔌 Переподключение выполнено успешно!");
        return true;
    }
    
    // ========== ПОЛНЫЕ ДАННЫЕ КЛЕТОК ОРИГИНАЛЬНОЙ МОНОПОЛИИ ==========
    const TILES_FULL = [
        { id: 0, name: "СТАРТ", type: "start", price: 0, color: null, rent: null, houseCost: null },
        { id: 1, name: "Медитеррания", type: "property", price: 60, rent: [2,10,30,90,160,250], color: "brown", houseCost: 50, mortgage: 30 },
        { id: 2, name: "Общественная казна", type: "chest", price: 0, color: null },

    // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
    function getHouseEnding(num) {
        if (num === 1) return 'дом';
        if (num >= 2 && num <= 4) return 'дома';
        return 'домов';
    }
    
    function canBuildHouses(player, tileId) {
        const tile = TILES_FULL[tileId];
        if (tile.type !== "property") return false;
        
        const currentHouses = player.houses?.[tileId] || 0;
        if (currentHouses >= 5) return false;
        
        const colorGroup = tile.color;
        const groupTiles = COLOR_GROUPS[colorGroup];
        if (!groupTiles) return false;
        
        // Проверка владения всей группой
        for (let propId of groupTiles) {
            if (!player.properties.includes(propId)) return false;
        }
        
        // Проверка равномерности застройки
        const currentLevel = currentHouses;
        for (let propId of groupTiles) {
            const houses = player.houses?.[propId] || 0;
            if (houses < currentLevel) return false;
        }
        
        return true;
    }
    
    function canSellHouses(player, tileId) {
        const tile = TILES_FULL[tileId];
        if (tile.type !== "property") return false;
        
        const currentHouses = player.houses?.[tileId] || 0;
        if (currentHouses === 0) return false;
        
        const colorGroup = tile.color;
        const groupTiles = COLOR_GROUPS[colorGroup];
        
        // Проверка равномерности (нельзя продать, если в группе есть более высокий уровень)
        for (let propId of groupTiles) {
            const houses = player.houses?.[propId] || 0;
            if (houses > currentHouses) return false;
        }
        
        return true;
    }
    
    function calculateRent(tile, player, owner, diceSum) {
        if (tile.type === "property") {
            const houses = owner.houses?.[tile.id] || 0;
            return tile.rent[houses];
        }
        if (tile.type === "railroad") {
            const railroadsOwned = owner.properties.filter(id => TILES_FULL[id].type === "railroad").length;
            return tile.rent[railroadsOwned - 1];
        }
        if (tile.type === "utility") {
            const utilitiesOwned = owner.properties.filter(id => TILES_FULL[id].type === "utility").length;
            if (utilitiesOwned === 1) return diceSum * 4;
            return diceSum * 10;
        }
        return 0;
    }

                    const currentBidderName = auction.currentBidder ? 
                        (localGameState?.players.find(p => p.id === auction.currentBidder)?.avatar || 'Игрок') : 'Нет ставок';
                    
                    const existingModal = document.querySelector('.modal-overlay');

    async function acceptTrade(offerId, offer) {
        const state = {...localGameState};
        const fromPlayer = state.players.find(p => p.id === offer.from);
        const toPlayer = state.players.find(p => p.id === offer.to);
        
        if (!fromPlayer || !toPlayer) return;
        
        const tile = TILES_FULL[offer.propertyId];
        
        if (toPlayer.money >= offer.price) {
            toPlayer.money -= offer.price;
            fromPlayer.money += offer.price;
            
            const propIndex = fromPlayer.properties.indexOf(offer.propertyId);
            if (propIndex !== -1) {
                fromPlayer.properties.splice(propIndex, 1);
                toPlayer.properties.push(offer.propertyId);
                const housesLevel = fromPlayer.houses?.[offer.propertyId] || 0;
                if (fromPlayer.houses) delete fromPlayer.houses[offer.propertyId];
                if (!toPlayer.houses) toPlayer.houses = {};
                toPlayer.houses[offer.propertyId] = housesLevel;
            }
            
            await db.ref(`rooms/${currentRoomId}/gameState`).update({players: state.players});
            await db.ref(`rooms/${currentRoomId}/tradeOffers/${offerId}`).update({status: 'accepted'});
            
            addSystemMessageUI(`✅ Сделка завершена! ${toPlayer.avatar} купил ${tile.name} у ${fromPlayer.avatar} за $${offer.price}`);
        } else {
            addSystemMessageUI(`❌ У ${toPlayer.avatar} недостаточно денег для сделки!`);
            await db.ref(`rooms/${currentRoomId}/tradeOffers/${offerId}`).update({status: 'declined'});
        }
    }

    // ========== СОЗДАНИЕ КОМНАТЫ ==========
    async function createRoom() {
        if (!initFirebase()) return;
        
        currentPlayerName = document.getElementById("playerNameInput").value.trim() || "Аноним";
        let customId = document.getElementById("customRoomId").value.trim();
        
        if (customId) {
            customId = customId.toUpperCase().replace(/[^A-Z0-9]/g, "");
            if (customId.length < 3) {
                alert("Название комнаты должно содержать минимум 3 символа");
                return;
            }
            currentRoomId = customId;
        } else {
            currentRoomId = generateRoomId();
        }
        
        currentPlayerId = generatePlayerId();
        isRoomCreator = true;
        gameStartedFlag = false;
        
        const roomRef = db.ref(`rooms/${currentRoomId}`);
        const snapshot = await roomRef.get();
        if (snapshot.exists()) {
            alert(`Комната "${currentRoomId}" уже существует!`);
            return;
        }
        
        const roomData = {
            id: currentRoomId,
            creatorId: currentPlayerId,
            players: {
                [currentPlayerId]: {
                    id: currentPlayerId,
                    name: currentPlayerName,
                    avatar: currentPlayerAvatar,
                    joinedAt: Date.now()
                }
            },
            gameState: null,
            createdAt: Date.now(),
            status: "waiting",
            gameStarted: false
        };
        
        try {
            await roomRef.set(roomData);
            console.log("✅ Комната создана");
            savePlayerSession();
            setupGameListeners();
            showGameLobby();
        } catch(e) {
            alert("Ошибка создания: " + e.message);
        }
    }
    
    // ========== ПОДКЛЮЧЕНИЕ ==========
    async function joinRoom() {
        if (!initFirebase()) return;
        
        const roomId = document.getElementById("roomIdInput").value.trim();
        if (!roomId) {
            alert("Введите ID комнаты");
            return;
        }
        
        currentPlayerName = document.getElementById("playerNameInput").value.trim() || "Аноним";
        currentRoomId = roomId.toUpperCase();
        currentPlayerId = generatePlayerId();
        isRoomCreator = false;
        gameStartedFlag = false;
        
        const roomRef = db.ref(`rooms/${currentRoomId}`);
        const snapshot = await roomRef.get();
        
        if (!snapshot.exists()) {
            alert(`Комната "${currentRoomId}" не найдена!`);
            return;
        }
        
        const room = snapshot.val();
        if (room.gameStarted) {
            alert("Игра уже началась!");
            return;
        }
        
        const playerCount = Object.keys(room.players || {}).length;
        if (playerCount >= 6) {
            alert("Комната полна (максимум 6 игроков)");
            return;
        }
        
        try {
            await roomRef.child(`players/${currentPlayerId}`).set({
                id: currentPlayerId,
                name: currentPlayerName,
                avatar: currentPlayerAvatar,
                joinedAt: Date.now()
            });
            console.log("✅ Подключено к комнате");
            savePlayerSession();
            setupGameListeners();
            showGameLobby();
        } catch(e) {
            alert("Ошибка подключения: " + e.message);
        }
    }
    
    function generateRoomId() {
        return Math.random().toString(36).substring(2, 8).toUpperCase();
    }
    
    function generatePlayerId() {
        return Date.now() + "-" + Math.random().toString(36).substring(2, 8);
    }
    
    // ========== НАСТРОЙКА СЛУШАТЕЛЕЙ ==========
    function setupGameListeners() {
        const roomRef = db.ref(`rooms/${currentRoomId}`);
        
        roomRef.child("players").on("value", (snapshot) => {
            const players = snapshot.val() || {};
            playersMap.clear();
            const playerList = [];
            for (let id in players) {
                playersMap.set(id, players[id]);
                playerList.push(players[id]);
            }
            if (!gameStartedFlag && !localGameState) {
                updateLobbyPlayers(playerList);
            }
        });
        
        if (gameStateListener) gameStateListener.off();
        
        gameStateListener = roomRef.child("gameState");
        gameStateListener.on("value", (snapshot) => {
            const state = snapshot.val();
            if (!state) return;
            
            if (state.gameStarted === true) {
                if (!state.players || !Array.isArray(state.players) || state.players.length === 0) return;
                
                gameStartedFlag = true;
                localGameState = state;
                gameActive = true;
                myTurn = (state.currentPlayer === currentPlayerId);
                renderGameFromState();
            } else if (!state.gameStarted && gameStartedFlag) {
                gameStartedFlag = false;
                localGameState = null;
                showGameLobby();
            }
        });
        
        roomRef.child("tradeOffers").on("child_added", (snapshot) => {
            const offer = snapshot.val();
            if (offer.to === currentPlayerId && offer.status === 'pending') {
                const fromPlayer = localGameState?.players.find(p => p.id === offer.from);
                if (fromPlayer) {
                    showTradeRequestModal({ id: snapshot.key, ...offer });
                }
            }
        });
        
        setupAuctionListener();
        
        if (syncInterval) clearInterval(syncInterval);
        syncInterval = setInterval(async () => {
            if (gameStartedFlag) return;
            const snapshot = await roomRef.child("gameState").get();
            const state = snapshot.val();
            if (state && state.gameStarted === true && state.players && state.players.length > 0 && !gameStartedFlag) {
                gameStartedFlag = true;
                localGameState = state;
                gameActive = true;
                myTurn = (state.currentPlayer === currentPlayerId);
                renderGameFromState();
            }
        }, 2000);
        
        roomRef.child("chat").on("child_added", (snapshot) => {
            const msg = snapshot.val();
            if (msg && msg.type === "player") {
                addPlayerMessageUI(msg.sender, msg.text);
            } else if (msg && msg.type === "system") {
                addSystemMessageUI(msg.text);
            }
        });
    }
    
    function updateLobbyPlayers(players) {
        const statusDiv = document.getElementById("roomStatus");
        if (!statusDiv) return;
        
        const canStart = players.length >= 2 && players.length <= 6;
        
        statusDiv.innerHTML = `<div class="waiting-players">
            <h3>👥 В комнате (${players.length}/6):</h3>
            ${players.map(p => `<p>${p.avatar} ${p.name} ${p.id === currentPlayerId ? '(Вы)' : ''}</p>`).join('')}
            <p style="margin-top:8px;">${players.length < 2 ? '⏳ Ожидание игроков... (нужно минимум 2)' : '✅ Достаточно игроков!'}</p>
            ${isRoomCreator ? `<button id="startGameBtn" class="start-game-btn-lobby" ${!canStart ? 'disabled' : ''}>🚀 СТАРТ ИГРЫ</button>` : `<p style="margin-top:8px; color:#d4af37;">🎲 Ожидайте начала игры от создателя комнаты...</p>`}
        </div>`;
        
        if (isRoomCreator) {
            const startBtn = document.getElementById("startGameBtn");
            if (startBtn) startBtn.onclick = () => startGameManually();
        }
    }
    
    function showGameLobby() {
        document.getElementById("chatPanel").style.display = "flex";
        document.getElementById("roomNameDisplay").innerText = currentRoomId;
        document.getElementById("gameArea").innerHTML = `
            <div class="game-wrapper">
                <div style="text-align:center; padding:40px 20px; background:rgba(0,0,0,0.5); border-radius:40px;">
                    <h2 style="color:#ffcd7e;">🎲 ЛОББИ</h2>
                    <p style="color:white;">ID комнаты: <strong style="font-size:1.3rem;">${currentRoomId}</strong></p>
                    <p style="color:white;">Поделитесь этим кодом с друзьями!</p>
                    <div id="roomStatus"></div>
                </div>
            </div>
        `;
        
        db.ref(`rooms/${currentRoomId}/players`).get().then(snapshot => {
            const players = snapshot.val() || {};
            updateLobbyPlayers(Object.values(players));
        });
    }
    
    // ========== ЗАПУСК ИГРЫ ==========
    async function startGameManually() {
        if (!isRoomCreator) {
            addSystemMessageUI("Только создатель комнаты может начать игру!");
            return;
        }
        
        const players = Array.from(playersMap.values());
        if (players.length < 2) {
            alert("Нужно минимум 2 игрока для начала игры!");
            return;
        }
        
        addSystemMessageUI("🎮 Создатель комнаты начинает игру!");
        
        const gamePlayers = players.map((p, idx) => ({
            id: p.id,
            name: p.name,
            avatar: p.avatar,
            money: 1500,
            position: 0,
            properties: [],
            houses: {},
            inJail: false,
            jailTurns: 0,
            getOutOfJailCards: 0,
            order: idx
        }));
        
        const initialState = {
            gameStarted: true,
            players: gamePlayers,
            currentPlayer: gamePlayers[0].id,
            diceRolled: false,
            currentDiceSum: 0,
            doublesCount: 0,
            waitingForPurchase: false,
            purchaseTileId: null,
            lastUpdate: Date.now()
        };
        
        const roomRef = db.ref(`rooms/${currentRoomId}`);
        
        try {
            await roomRef.update({
                gameStarted: true,
                gameState: initialState
            });
            
            addSystemMessageUI("🎉 Игра началась! Ход первого игрока!");
            
            gameStartedFlag = true;
            localGameState = initialState;
            gameActive = true;
            myTurn = (initialState.currentPlayer === currentPlayerId);
            renderGameFromState();
        } catch(e) {
            console.error("Ошибка при старте игры:", e);
            addSystemMessageUI("❌ Ошибка при старте игры!");
        }
    }
    
    // ========== ОТРИСОВКА ИГРЫ ==========
    function renderGameFromState() {
        if (!localGameState || !localGameState.players || !Array.isArray(localGameState.players) || localGameState.players.length === 0) return;
        
        const players = localGameState.players;
        const currentPlayerIdGame = localGameState.currentPlayer;
        
        let boardHtml = `<div class="board" id="board">`;
        for(let i = 0; i < 40; i++) {
            const tile = TILES_FULL[i];
            const [row, col] = positionsMap[i];
            let colorClass = "";
            if (tile.color) colorClass = `color-${tile.color}`;
            if (tile.type === "railroad") colorClass = "railroad";
            if (tile.type === "utility") colorClass = "utility";
            
            const playersOnCell = players.filter(p => p && p.position === i);
            const playersAvatars = playersOnCell.map(p => p.avatar || "?").join('');
            
            const owner = players.find(p => p.properties && p.properties.includes(i));
            const housesCount = owner?.houses?.[i] || 0;
            let housesDisplay = '';
            if (housesCount > 0) {
                if (housesCount === 5) housesDisplay = '🏨';
                else if (housesCount === 4) housesDisplay = '🏠🏠🏠🏠';
                else if (housesCount === 3) housesDisplay = '🏠🏠🏠';
                else if (housesCount === 2) housesDisplay = '🏠🏠';
                else if (housesCount === 1) housesDisplay = '🏠';
            }
            
            boardHtml += `<div class="cell ${colorClass}" onclick="showPropertyInfo(${i})" style="grid-row:${row+1};grid-column:${col+1}">
                <div class="cell-name">${tile.name.length > 10 ? tile.name.substring(0,8)+".." : tile.name}</div>
                ${tile.price ? `<div class="cell-price" style="font-size:0.4rem;">$${tile.price}</div>` : ''}
                ${owner ? `<div class="owner-token">👑 ${owner.avatar} ${housesDisplay}</div>` : ''}
                <div class="players-on-cell">${playersAvatars}</div>
            </div>`;
        }
        boardHtml += `</div>`;
        
        const playersHtml = players.map(p => {
            if (!p) return '';
            const canBuild = p.properties ? p.properties.some(pid => canBuildHouses(p, pid)) : false;
            return `
                <div class="player-card ${currentPlayerIdGame === p.id ? 'active' : ''}" onclick="showPlayerActions('${p.id}')">
                    <div class="player-name">${p.avatar || '?'} ${p.name || '???'}</div>
                    <div class="player-money">💰 $${p.money || 0}</div>
                    <div>🏠 ${(p.properties && p.properties.length) || 0}</div>
                    ${p.id === currentPlayerId && myTurn ? '<span style="font-size:0.6rem;">🎲 ВАШ ХОД</span>' : ''}
                    ${canBuild && p.id === currentPlayerId && myTurn && !localGameState.diceRolled ? '<span style="font-size:0.6rem; color:#4caf50;">🏗️</span>' : ''}
                </div>
            `;
        }).join('');
        
        const chatPanel = document.getElementById("chatPanel");
        if (chatPanel && chatPanel.style.display === "none") chatPanel.style.display = "flex";
        
        document.getElementById("gameArea").innerHTML = `
            <div class="game-wrapper">
                ${boardHtml}
                <div class="game-panel">
                    <div class="players-info">${playersHtml}</div>
                    <div class="controls">
                        <button id="rollBtn" ${!myTurn || localGameState.diceRolled ? 'disabled' : ''}>🎲 Бросить кубики</button>
                        <button id="endTurnBtn" ${!myTurn || !localGameState.diceRolled ? 'disabled' : ''}>➡️ Закончить ход</button>
                        <button id="tradeBtn" ${!myTurn ? 'disabled' : ''}>🤝 Торговля</button>
                        <button id="upgradeBtn" ${!myTurn || localGameState.diceRolled ? 'disabled' : ''}>🏗️ Улучшить</button>
                        <div class="dice-area"><span>🎲 Кубики:</span><span class="dice">${localGameState.currentDiceSum || '⚀⚀'}</span></div>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById("rollBtn")?.addEventListener("click", () => rollDice());
        document.getElementById("endTurnBtn")?.addEventListener("click", () => endTurn());
        document.getElementById("tradeBtn")?.addEventListener("click", () => showTradeModal());
        document.getElementById("upgradeBtn")?.addEventListener("click", () => showUpgradeProperties());
    }
    
    function showUpgradeProperties() {
        if (!myTurn || localGameState?.diceRolled) return;
        
        const player = localGameState?.players.find(p => p.id === currentPlayerId);
        if (!player) return;
        
        const upgradableProperties = (player.properties || []).filter(propId => canBuildHouses(player, propId));
        
        if (upgradableProperties.length === 0) {
            addSystemMessageUI("Нет доступных для улучшения улиц! Нужно:\n- Владеть всей цветовой группой\n- Равномерная застройка\n- Достаточно денег");
            return;
        }
        
        let content = `
            <div class="modal-info">
                <div class="modal-info-row">
                    <span>💰 Ваш баланс:</span>
                    <span style="color:#ffcd7e;">$${player.money}</span>
                </div>
                <div class="modal-info-row">
                    <span>🏠 Доступно для улучшения:</span>
                    <span>${upgradableProperties.length} объектов</span>
                </div>
            </div>
            <div class="property-list">
                ${upgradableProperties.map(propId => {
                    const tile = TILES_FULL[propId];
                    const currentHouses = player.houses?.[propId] || 0;
                    const upgradeCost = tile.houseCost;
                    const nextLevel = currentHouses + 1;
                    return `
                        <div class="property-item" onclick="selectUpgradeProperty(${propId})">
                            <div class="property-name">${tile.name}</div>
                            <div class="property-details">
                                🏠 Уровень: ${currentHouses === 0 ? '0' : currentHouses === 5 ? 'Отель' : currentHouses} → ${nextLevel === 5 ? 'Отель' : nextLevel} | 
                                💰 Стоимость: $${upgradeCost} | 
                                📈 Новая аренда: $${tile.rent[nextLevel]}
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;
        
        showModal('🏗️ Улучшение недвижимости', content, [
            { text: 'Закрыть', class: 'modal-btn-secondary', onClick: 'closeModal' }
        ]);
    }
    
    window.selectUpgradeProperty = function(tileId) {
        const tile = TILES_FULL[tileId];
        const player = localGameState?.players.find(p => p.id === currentPlayerId);
        if (player) {
            pendingUpgradeTileId = tileId;
            closeModal();
            showUpgradeModal(tile, player);
        }
    };
    
    function showPlayerActions(playerId) {
        if (playerId !== currentPlayerId || !myTurn || localGameState?.diceRolled) return;
        showUpgradeProperties();
    }
    
    // ========== ИГРОВЫЕ ДЕЙСТВИЯ ==========
    async function rollDice() {
        if (!myTurn || localGameState.diceRolled) return;
        
        const d1 = Math.floor(Math.random() * 6) + 1;
        const d2 = Math.floor(Math.random() * 6) + 1;
        const sum = d1 + d2;
        const isDouble = (d1 === d2);
        
        const newState = {...localGameState};
        newState.diceRolled = true;
        newState.currentDiceSum = sum;
        newState.lastUpdate = Date.now();
        
        if (isDouble) {
            newState.doublesCount = (newState.doublesCount || 0) + 1;
            if (newState.doublesCount >= 3) {
                addSystemMessageUI(`${getCurrentPlayer()?.avatar} выбросил дубль в третий раз! Отправляется в тюрьму!`);
                const player = newState.players.find(p => p.id === currentPlayerId);
                player.position = 10;
                player.inJail = true;
                player.jailTurns = 0;
                newState.diceRolled = true;
                newState.doublesCount = 0;
                await db.ref(`rooms/${currentRoomId}/gameState`).update(newState);
                await endTurnAfterMove();
                return;
            }
        } else {
            newState.doublesCount = 0;
        }
        
        await db.ref(`rooms/${currentRoomId}/gameState`).update(newState);
        addSystemMessageUI(`${getCurrentPlayer()?.avatar || "Игрок"} бросил ${d1}+${d2}=${sum} ${isDouble ? '(ДУБЛЬ! Ещё ход)' : ''}`);
        
        setTimeout(() => movePlayerAfterRoll(sum, isDouble), 500);
    }
    
    async function movePlayerAfterRoll(steps, isDouble) {
        if (!localGameState) return;
        
        const state = {...localGameState};
        const playerIndex = state.players.findIndex(p => p.id === currentPlayerId);
        if (playerIndex === -1) return;
        
        const player = state.players[playerIndex];
        
        if (player.inJail) {
            addSystemMessageUI(`${player.avatar} в тюрьме! Ход пропущен.`);
            player.jailTurns++;
            if (player.jailTurns >= 3) {
                player.inJail = false;
                player.money -= 50;
                addSystemMessageUI(`${player.avatar} заплатил $50 и вышел из тюрьмы!`);
            }
            await db.ref(`rooms/${currentRoomId}/gameState`).update({players: state.players});
            await endTurnAfterMove();
            return;
        }
        
        let oldPos = player.position;
        let newPos = (player.position + steps) % 40;
        let passedGo = newPos < oldPos;
        
        if (passedGo) {
            player.money += 200;
            addSystemMessageUI(`${player.avatar} прошёл СТАРТ +$200`);
        }
        
        player.position = newPos;
        
        await db.ref(`rooms/${currentRoomId}/gameState`).update({players: state.players});
        addSystemMessageUI(`${player.avatar} переместился на клетку ${TILES_FULL[newPos].name}`);
        
        setTimeout(() => handleTileEffect(newPos, isDouble), 300);
    }
    
    async function handleTileEffect(tileId, isDouble) {
        if (!localGameState) return;
        
        const state = {...localGameState};
        const playerIndex = state.players.findIndex(p => p.id === currentPlayerId);
        if (playerIndex === -1) return;
        
        const player = state.players[playerIndex];
        const tile = TILES_FULL[tileId];
        const owner = state.players.find(p => p.properties && p.properties.includes(tileId));
        
        // Своя клетка
        if (owner && owner.id === currentPlayerId) {
            addSystemMessageUI(`${player.avatar} на своей клетке ${tile.name}`);
            if (!isDouble) {
                await endTurnAfterMove();
            } else {
                await db.ref(`rooms/${currentRoomId}/gameState`).update({
                    diceRolled: false,
                    waitingForPurchase: false,
                    purchaseTileId: null
                });
            }
            return;
        }
        
        switch(tile.type) {
            case "property":
            case "railroad":
            case "utility":
                if (owner && owner.id !== currentPlayerId) {
                    const diceSum = state.currentDiceSum || 4;
                    const rent = calculateRent(tile, player, owner, diceSum);
                    
                    if (player.money >= rent) {
                        player.money -= rent;
                        const ownerIndex = state.players.findIndex(p => p.id === owner.id);
                        state.players[ownerIndex].money += rent;
                        addSystemMessageUI(`${player.avatar} заплатил аренду ${owner.avatar} $${rent}`);
                        await db.ref(`rooms/${currentRoomId}/gameState`).update({players: state.players});
                    } else {
                        addSystemMessageUI(`${player.avatar} БАНКРОТ! Не хватает денег на аренду!`);
                        player.money = 0;
                        await db.ref(`rooms/${currentRoomId}/gameState`).update({players: state.players});
                    }
                } else if (!owner && player.money >= tile.price) {
                    showPurchaseModal(tile, player.money);
                    await db.ref(`rooms/${currentRoomId}/gameState`).update({
                        waitingForPurchase: true,
                        purchaseTileId: tileId
                    });
                    return;
                }
                break;
                
            case "tax":
                const tax = tile.tax || 100;
                player.money -= tax;
                addSystemMessageUI(`${player.avatar} заплатил налог $${tax}`);
                await db.ref(`rooms/${currentRoomId}/gameState`).update({players: state.players});
                break;
                
            case "chance":
                const chanceCard = CHANCE_CARDS[Math.floor(Math.random() * CHANCE_CARDS.length)];
                addSystemMessageUI(`🎲 Шанс: ${chanceCard.text}`);
                await processCardEffect(state, player, chanceCard);
                break;
                
            case "chest":
                const chestCard = CHEST_CARDS[Math.floor(Math.random() * CHEST_CARDS.length)];
                addSystemMessageUI(`📦 Общественная казна: ${chestCard.text}`);
                await processCardEffect(state, player, chestCard);
                break;
                
            case "goToJail":
                player.position = 10;
                player.inJail = true;
                player.jailTurns = 0;
                addSystemMessageUI(`${player.avatar} отправляется в тюрьму!`);
                await db.ref(`rooms/${currentRoomId}/gameState`).update({
                    players: state.players,
                    diceRolled: true
                });
                break;
        }
        
        if (!isDouble) {
            await endTurnAfterMove();
        } else {
            await db.ref(`rooms/${currentRoomId}/gameState`).update({
                diceRolled: false,
                waitingForPurchase: false,
                purchaseTileId: null
            });
        }
    }
    
    async function processCardEffect(state, player, card) {
        if (card.type === "goToJail") {
            player.position = 10;
            player.inJail = true;
            player.jailTurns = 0;
            addSystemMessageUI(`${player.avatar} отправляется в тюрьму!`);
            await db.ref(`rooms/${currentRoomId}/gameState`).update({players: state.players});
            return;
        }
        
        if (card.type === "getOutOfJail") {
            player.getOutOfJailCards = (player.getOutOfJailCards || 0) + 1;
            addSystemMessageUI(`${player.avatar} получил карту 'Освобождение из тюрьмы'!`);
            await db.ref(`rooms/${currentRoomId}/gameState`).update({players: state.players});
            return;
        }
        
        if (card.type === "moveToRailroad") {
            const railroads = [5, 15, 25, 39];
            let nearest = railroads.find(r => r > player.position) || railroads[0];
            player.position = nearest;
            addSystemMessageUI(`${player.avatar} перемещается на ${TILES_FULL[nearest].name}`);
            await db.ref(`rooms/${currentRoomId}/gameState`).update({players: state.players});
            return;
        }
        
        if (card.type === "moveToUtility") {
            const utilities = [12, 28];
            let nearest = utilities.find(u => u > player.position) || utilities[0];
            player.position = nearest;
            addSystemMessageUI(`${player.avatar} перемещается на ${TILES_FULL[nearest].name}`);
            await db.ref(`rooms/${currentRoomId}/gameState`).update({players: state.players});
            return;
        }
        
        if (card.type === "moveTo") {
            player.position = card.value;
            addSystemMessageUI(`${player.avatar} перемещается на ${TILES_FULL[card.value].name}`);
            await db.ref(`rooms/${currentRoomId}/gameState`).update({players: state.players});
            return;
        }
        
        if (card.type === "repairs") {
            let totalCost = 0;
            for (let propId of player.properties) {
                const tile = TILES_FULL[propId];
                if (tile.type === "property") {
                    const houses = player.houses?.[propId] || 0;
                    if (houses > 0) {
                        totalCost += houses * card.value;
                    }
                }
            }
            if (totalCost > 0) {
                player.money = Math.max(0, player.money - totalCost);
                addSystemMessageUI(`${player.avatar} заплатил $${totalCost} за ремонт!`);
                await db.ref(`rooms/${currentRoomId}/gameState`).update({players: state.players});
            }
            return;
        }
        
        if (card.type === "money") {
            player.money += card.value;
            addSystemMessageUI(`${player.avatar} ${card.value >= 0 ? 'получил' : 'потерял'} $${Math.abs(card.value)}`);
            await db.ref(`rooms/${currentRoomId}/gameState`).update({players: state.players});
            return;
        }
        
        if (card.type === "move") {
            player.position = 0;
            await db.ref(`rooms/${currentRoomId}/gameState`).update({players: state.players});
            addSystemMessageUI(`${player.avatar} перемещается на СТАРТ`);
            return;
        }
        
        if (card.type === "moveForward") {
            const newPos = (player.position + card.value) % 40;
            player.position = newPos;
            await db.ref(`rooms/${currentRoomId}/gameState`).update({players: state.players});
            addSystemMessageUI(`${player.avatar} перемещается вперёд на ${card.value} клеток`);
        }
    }
    
    async function completePurchase(tileId, buyerId, price) {
        const state = {...localGameState};
        const buyerIndex = state.players.findIndex(p => p.id === buyerId);
        
        if (buyerIndex !== -1 && state.players[buyerIndex].money >= price) {
            state.players[buyerIndex].money -= price;
            if (!state.players[buyerIndex].properties) state.players[buyerIndex].properties = [];
            state.players[buyerIndex].properties.push(tileId);
            if (!state.players[buyerIndex].houses) state.players[buyerIndex].houses = {};
            state.players[buyerIndex].houses[tileId] = 0;
        }
        
        await db.ref(`rooms/${currentRoomId}/gameState`).update({players: state.players});
        renderGameFromState();
    }
    
    async function buyProperty() {
        if (!localGameState.waitingForPurchase) return;
        
        const state = {...localGameState};
        const playerIndex = state.players.findIndex(p => p.id === currentPlayerId);
        const tileId = state.purchaseTileId;
        const tile = TILES_FULL[tileId];
        
        if (playerIndex !== -1 && state.players[playerIndex].money >= tile.price) {
            state.players[playerIndex].money -= tile.price;
            if (!state.players[playerIndex].properties) state.players[playerIndex].properties = [];
            state.players[playerIndex].properties.push(tileId);
            if (!state.players[playerIndex].houses) state.players[playerIndex].houses = {};
            state.players[playerIndex].houses[tileId] = 0;
            addSystemMessageUI(`${state.players[playerIndex].avatar} купил ${tile.name} за $${tile.price}`);
        }
        
        state.waitingForPurchase = false;
        state.purchaseTileId = null;
        
        await db.ref(`rooms/${currentRoomId}/gameState`).update({
            players: state.players,
            waitingForPurchase: false,
            purchaseTileId: null
        });
        
        renderGameFromState();
    }
    
    async function upgradeProperty(tileId) {
        if (!myTurn || localGameState.diceRolled) return;
        
        const state = {...localGameState};
        const playerIndex = state.players.findIndex(p => p.id === currentPlayerId);
        if (playerIndex === -1) return;
        
        const player = state.players[playerIndex];
        const tile = TILES_FULL[tileId];
        const currentHouses = player.houses?.[tileId] || 0;
        
        if (currentHouses >= 5) {
            addSystemMessageUI("Уже максимальный уровень (Отель)!");
            return;
        }
        
        if (!canBuildHouses(player, tileId)) {
            addSystemMessageUI("Нельзя улучшить! Нужно:\n- Владеть всеми улицами цвета\n- Равномерная застройка");
            return;
        }
        
        const upgradeCost = tile.houseCost;
        
        if (player.money < upgradeCost) {
            addSystemMessageUI(`Не хватает денег! Нужно $${upgradeCost}`);
            return;
        }
        
        player.money -= upgradeCost;
        if (!player.houses) player.houses = {};
        player.houses[tileId] = currentHouses + 1;
        
        await db.ref(`rooms/${currentRoomId}/gameState`).update({
            players: state.players
        });
        
        const newLevel = player.houses[tileId];
        addSystemMessageUI(`${player.avatar} улучшил ${tile.name} до ${newLevel === 5 ? 'ОТЕЛЯ' : `${newLevel} ${getHouseEnding(newLevel)}`}! 🏗️`);
        
        renderGameFromState();
    }
    
    async function endTurn() {
        if (!myTurn) return;
        await endTurnAfterMove();
    }
    
    async function endTurnAfterMove() {
        const state = {...localGameState};
        const players = state.players;
        const currentIdx = players.findIndex(p => p.id === currentPlayerId);
        const nextIdx = (currentIdx + 1) % players.length;
        
        await db.ref(`rooms/${currentRoomId}/gameState`).update({
            currentPlayer: players[nextIdx].id,
            diceRolled: false,
            currentDiceSum: 0,
            waitingForPurchase: false,
            purchaseTileId: null,
            doublesCount: 0
        });
        addSystemMessageUI(`➡️ Ход переходит к ${players[nextIdx].avatar}`);
    }
    
    function getCurrentPlayer() {
        return localGameState?.players.find(p => p.id === currentPlayerId);
    }
    
    // ========== ЧАТ ==========
    function addPlayerMessageUI(sender, text) {
        const container = document.getElementById("playerChatContainer");
        if (container) {
            container.innerHTML += `<div class="chat-message"><span class="sender">${sender}:</span> <span class="text">${text}</span></div>`;
            container.scrollTop = container.scrollHeight;
        }
    }
    
    function addSystemMessageUI(text) {
        const container = document.getElementById("systemChatContainer");
        if (container) {
            container.innerHTML += `<div class="chat-message system"><span class="sender">📢 События:</span> <span class="text">${text}</span></div>`;
            container.scrollTop = container.scrollHeight;
        }
    }
    
    async function sendChatMessage() {
        const input = document.getElementById("chatInput");
        if (!input.value.trim() || !currentRoomId) return;
        
        const message = input.value.trim();
        const player = getCurrentPlayer();
        const senderName = player ? `${player.avatar} ${player.name}` : currentPlayerName;
        
        await db.ref(`rooms/${currentRoomId}/chat`).push({
            type: "player",
            sender: senderName,
            text: message,
            timestamp: Date.now()
        });
        input.value = "";
    }
    
    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    async function initUI() {
        const reconnected = await tryReconnect();
        if (!reconnected) showRoomScreen();
        
        document.addEventListener("click", (e) => {
            if (e.target.id === "sendChatBtn") sendChatMessage();
            if (e.target.id === "emojiBtn") toggleEmojiPanel();
        });
        document.addEventListener("keypress", (e) => {
            if (e.target.id === "chatInput" && e.key === "Enter") sendChatMessage();
        });
        
        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                document.querySelectorAll(".chat-messages-container").forEach(c => c.classList.remove("active"));
                document.getElementById(`${btn.dataset.tab}ChatContainer`).classList.add("active");
            });
        });
        
        if(document.getElementById("playerChatContainer")) {
            document.getElementById("playerChatContainer").classList.add("active");
        }
        
        window.showPropertyInfo = showPropertyInfo;
        window.showPlayerActions = showPlayerActions;
        window.selectUpgradeProperty = selectUpgradeProperty;
        window.closeModal = closeModal;
        window.confirmPurchase = confirmPurchase;
        window.confirmUpgrade = confirmUpgrade;
        window.startAuction = startAuction;
        window.placeBid = placeBid;
        window.selectTradePlayer = selectTradePlayer;
        window.offerProperty = offerProperty;
        window.sendTradeOffer = sendTradeOffer;
        window.acceptTradeOffer = acceptTradeOffer;
        window.declineTradeOffer = declineTradeOffer;
        window.placeGlobalBid = placeGlobalBid;
        window.showUpgradeProperties = showUpgradeProperties;
    }
    
    initUI();
</script>
</body>
