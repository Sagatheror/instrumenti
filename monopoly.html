    let scene, camera, renderer, controls;
    let boardGroup, cellMeshes = [], playerMeshes = [];
    
    function initThreeJS() {
        const container = document.getElementById('board3d-container');
        if (!container) return;
        
        // Scene
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a2f1a);
        
        // Camera
        camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 25, 20);
        
        // Renderer
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.innerHTML = '';
        container.appendChild(renderer.domElement);
        
        // Controls
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 15;
        controls.maxDistance = 40;
        controls.maxPolarAngle = Math.PI / 2.2;
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffdf90, 0.8);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);
        
        // Board Group
        boardGroup = new THREE.Group();
        scene.add(boardGroup);
        
        create3DBoard();
        
        // Handle resize
        window.addEventListener('resize', onWindowResize, false);
        
        animate();
    }
    
    function onWindowResize() {
        const container = document.getElementById('board3d-container');
        if (!container || !camera || !renderer) return;
        
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    }
    
    function animate() {
        requestAnimationFrame(animate);
        if (controls) controls.update();
        if (renderer && scene && camera) renderer.render(scene, camera);
    }
    
    function create3DBoard() {
        // Clear existing
        while(boardGroup.children.length > 0) { 
            boardGroup.remove(boardGroup.children[0]); 
        }
        cellMeshes = [];
        
        const cellSize = 1.2;
        const gap = 0.05;
        const totalSize = (cellSize + gap) * 11;
        const offset = totalSize / 2;
        
        // Base platform
        const baseGeometry = new THREE.BoxGeometry(totalSize + 1, 0.3, totalSize + 1);
        const baseMaterial = new THREE.MeshStandardMaterial({ color: 0x2a4a28, roughness: 0.8 });
        const base = new THREE.Mesh(baseGeometry, baseMaterial);
        base.position.y = -0.4;
        base.receiveShadow = true;
        boardGroup.add(base);
        
        // Create cells
        for(let i = 0; i < 40; i++) {
            const tile = TILES_FULL[i];
            const [row, col] = positionsMap[i];
            
            const x = (col - 5) * (cellSize + gap);
            const z = (row - 5) * (cellSize + gap);
            
            // Create texture for cell
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            // Background
            ctx.fillStyle = '#ffefd3';
            ctx.fillRect(0, 0, 256, 256);
            
            // Color bar at top for properties
            let barColor = '#ffffff';
            if (tile.color) {
                const colorMap = {
                    'brown': '#8B4513',
                    'lightblue': '#87CEEB',
                    'pink': '#FF69B4',
                    'orange': '#FF8C00',
                    'red': '#DC143C',
                    'yellow': '#FFD700',
                    'green': '#228B22',
                    'blue': '#1E90FF'
                };
                barColor = colorMap[tile.color] || '#ffffff';
            } else if (tile.type === 'railroad') {
                barColor = '#2F4F4F';
            } else if (tile.type === 'utility') {
                barColor = '#20B2AA';
            }
            
            if (barColor !== '#ffffff') {
                ctx.fillStyle = barColor;
                ctx.fillRect(0, 0, 256, 60);
                
                // Border for color bar
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 3;
                ctx.strokeRect(0, 0, 256, 60);
            }
            
            // Cell name text
            ctx.fillStyle = '#000000';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            let displayName = tile.name || '';
            if (displayName.length > 12) {
                displayName = displayName.substring(0, 11) + '...';
            }
            
            // Wrap text if needed
            const words = displayName.split(' ');
            let yText = 100;
            if (words.length > 1 && words.length <= 3) {
                ctx.fillText(words.slice(0, Math.ceil(words.length/2)).join(' '), 128, yText);
                ctx.fillText(words.slice(Math.ceil(words.length/2)).join(' '), 128, yText + 25);
            } else {
                ctx.fillText(displayName, 128, 110);
            }
            
            // Price text
            if (tile.price) {
                ctx.font = '16px Arial';
                ctx.fillStyle = '#333333';
                ctx.fillText(`$${tile.price}`, 128, 160);
            }
            
            // Special icons
            ctx.font = '40px Arial';
            if (tile.type === 'start') {
                ctx.fillText('🏁', 128, 100);
                ctx.font = '18px Arial';
                ctx.fillStyle = '#000000';
                ctx.fillText('СТАРТ', 128, 140);
                ctx.fillText('$200', 128, 165);
            } else if (tile.type === 'jail') {
                ctx.fillText('👮', 128, 100);
                ctx.font = '18px Arial';
                ctx.fillText('Тюрьма', 128, 140);
            } else if (tile.type === 'goToJail') {
                ctx.fillText('➡️👮', 128, 100);
                ctx.font = '18px Arial';
                ctx.fillText('В тюрьму', 128, 140);
            } else if (tile.type === 'parking') {
                ctx.fillText('🅿️', 128, 100);
                ctx.font = '18px Arial';
                ctx.fillText('Парковка', 128, 140);
            } else if (tile.type === 'chest') {
                ctx.fillText('📦', 128, 100);
                ctx.font = '18px Arial';
                ctx.fillText('Казна', 128, 140);
            } else if (tile.type === 'chance') {
                ctx.fillText('❓', 128, 100);
                ctx.font = '18px Arial';
                ctx.fillText('Шанс', 128, 140);
            } else if (tile.type === 'tax') {
                ctx.fillText('💰', 128, 100);
                ctx.font = '18px Arial';
                ctx.fillText('Налог', 128, 140);
                if (tile.price) {
                    ctx.fillText(`$${tile.price}`, 128, 165);
                }
            } else if (tile.type === 'railroad') {
                ctx.font = '50px Arial';
                ctx.fillText('🚂', 128, 100);
                ctx.font = '18px Arial';
                ctx.fillText(tile.name, 128, 145);
                if (tile.price) {
                    ctx.fillText(`$${tile.price}`, 128, 170);
                }
            } else if (tile.type === 'utility') {
                ctx.font = '45px Arial';
                if (tile.name.includes('Electric')) {
                    ctx.fillText('⚡', 128, 100);
                } else {
                    ctx.fillText('💧', 128, 100);
                }
                ctx.font = '18px Arial';
                ctx.fillText(tile.name, 128, 145);
                if (tile.price) {
                    ctx.fillText(`$${tile.price}`, 128, 170);
                }
            }
            
            // Create texture from canvas
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            
            // Cell geometry with multiple materials for different faces
            const cellGeometry = new THREE.BoxGeometry(cellSize, 0.5, cellSize);
            
            // Materials: right, left, top, bottom, front, back
            const sideMaterial = new THREE.MeshStandardMaterial({ color: 0x8b7355, roughness: 0.7 });
            const topMaterial = new THREE.MeshStandardMaterial({ 
                map: texture,
                roughness: 0.6,
                metalness: 0.1
            });
            const bottomMaterial = new THREE.MeshStandardMaterial({ color: 0x6b5345, roughness: 0.7 });
            
            const materials = [
                sideMaterial, // right
                sideMaterial, // left
                topMaterial,  // top
                bottomMaterial, // bottom
                sideMaterial, // front
                sideMaterial  // back
            ];
            
            const cell = new THREE.Mesh(cellGeometry, materials);
            cell.position.set(x, 0.25, z);
            cell.castShadow = true;
            cell.receiveShadow = true;
            cell.userData = { tileId: i, tile: tile };
            
            // Add colored border for properties
            if (tile.color || tile.type === 'railroad' || tile.type === 'utility') {
                const borderHeight = 0.15;
                const borderGeometry = new THREE.BoxGeometry(cellSize + 0.05, borderHeight, cellSize + 0.05);
                const borderMaterial = new THREE.MeshStandardMaterial({ color: barColor });
                const border = new THREE.Mesh(borderGeometry, borderMaterial);
                border.position.set(x, 0.5 + borderHeight/2, z);
                border.castShadow = true;
                boardGroup.add(border);
            }
            
            boardGroup.add(cell);
            cellMeshes.push(cell);
        }
        
        // Center decoration
        const centerGeometry = new THREE.CylinderGeometry(3, 3, 0.2, 32);
        const centerMaterial = new THREE.MeshStandardMaterial({ color: 0xd4af37, roughness: 0.4, metalness: 0.3 });
        const center = new THREE.Mesh(centerGeometry, centerMaterial);
        center.position.y = -0.1;
        center.receiveShadow = true;
        boardGroup.add(center);
        
        // Logo text placeholder (using a simple plane)
        const logoGeometry = new THREE.PlaneGeometry(4, 1);
        const canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#d4af37';
        ctx.font = 'bold 32px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('🏆 Монополия', 128, 45);
        const logoTexture = new THREE.CanvasTexture(canvas);
        const logoMaterial = new THREE.MeshBasicMaterial({ map: logoTexture, transparent: true });
        const logo = new THREE.Mesh(logoGeometry, logoMaterial);
        logo.rotation.x = -Math.PI / 2;
        logo.position.y = 0.15;
        boardGroup.add(logo);
    }
    
    function updatePlayerPositions3D() {
        if (!boardGroup || !localGameState || !localGameState.players) return;
        
        // Remove old player meshes
        playerMeshes.forEach(mesh => boardGroup.remove(mesh));
        playerMeshes = [];
        
        const players = localGameState.players;
        const cellSize = 1.2;
        const gap = 0.05;
        
        players.forEach((player, index) => {
            if (!player || player.position === undefined) return;
            
            const [row, col] = positionsMap[player.position];
            const x = (col - 5) * (cellSize + gap);
            const z = (row - 5) * (cellSize + gap);
            
            // Player sphere
            const playerGeometry = new THREE.SphereGeometry(0.25, 16, 16);
            const playerColors = [0xff0000, 0x00ff00, 0x0000ff, 0xffff00, 0xff00ff, 0x00ffff];
            const playerColor = playerColors[index % playerColors.length];
            const playerMaterial = new THREE.MeshStandardMaterial({ 
                color: playerColor,
                roughness: 0.3,
                metalness: 0.5,
                emissive: playerColor,
                emissiveIntensity: 0.3
            });
            
            const playerMesh = new THREE.Mesh(playerGeometry, playerMaterial);
            
            // Offset for multiple players on same cell
            const playerCountOnCell = players.filter(p => p.position === player.position).length;
            const offsetAngle = (index % playerCountOnCell) * (Math.PI * 2 / playerCountOnCell);
            const offsetRadius = 0.3;
            
            playerMesh.position.set(
                x + Math.cos(offsetAngle) * offsetRadius,
                0.8,
                z + Math.sin(offsetAngle) * offsetRadius
            );
            playerMesh.castShadow = true;
            playerMesh.userData = { playerId: player.id, player: player };
            
            boardGroup.add(playerMesh);
            playerMeshes.push(playerMesh);
        });
    }
    
    function renderGameFromState() {
        if (!localGameState || !localGameState.players || !Array.isArray(localGameState.players) || localGameState.players.length === 0) return;
        
        const players = localGameState.players;
        const currentPlayerIdGame = localGameState.currentPlayer;
        
        // Update 3D board
        if (typeof THREE !== 'undefined') {
            updatePlayerPositions3D();
        }
        
        let boardHtml = `<div class="board" id="board">`;
        for(let i = 0; i < 40; i++) {
            const tile = TILES_FULL[i];
            const [row, col] = positionsMap[i];
            let colorClass = "";
            if (tile.color) colorClass = `color-${tile.color}`;
            if (tile.type === "railroad") colorClass = "railroad";
            if (tile.type === "utility") colorClass = "utility";
            
            const playersOnCell = players.filter(p => p && p.position === i);
            const playersAvatars = playersOnCell.map(p => p.avatar || "?").join('');
            
            const owner = players.find(p => p.properties && p.properties.includes(i));
            const housesCount = owner?.houses?.[i] || 0;
            let housesDisplay = '';
            if (housesCount > 0) {
                if (housesCount === 5) housesDisplay = '🏨';
                else if (housesCount === 4) housesDisplay = '🏠🏠🏠🏠';
                else if (housesCount === 3) housesDisplay = '🏠🏠🏠';
                else if (housesCount === 2) housesDisplay = '🏠🏠';
                else if (housesCount === 1) housesDisplay = '🏠';
            }
            
            boardHtml += `<div class="cell ${colorClass}" onclick="showPropertyInfo(${i})" style="grid-row:${row+1};grid-column:${col+1}">
                <div class="cell-name">${tile.icon || ''} ${tile.name.length > 10 ? tile.name.substring(0,8)+".." : tile.name}</div>
                ${tile.price ? `<div class="cell-price" style="font-size:0.4rem;">$${tile.price}</div>` : ''}
                ${owner ? `<div class="owner-token">👑 ${owner.avatar} ${housesDisplay}</div>` : ''}
                <div class="players-on-cell">${playersAvatars}</div>
            </div>`;
        }
        boardHtml += `</div>`;
        
        const playersHtml = players.map(p => {
            if (!p) return '';
            const canBuild = p.properties ? p.properties.some(pid => canBuildHouses(p, pid)) : false;
            return `
                <div class="player-card ${currentPlayerIdGame === p.id ? 'active' : ''}" onclick="showPlayerActions('${p.id}')">
                    <div class="player-name">${p.avatar || '?'} ${p.name || '???'}</div>
                    <div class="player-money">💰 $${p.money || 0}</div>
                    <div>🏠 ${(p.properties && p.properties.length) || 0}</div>
                    ${p.inJail ? '<span style="font-size:0.6rem;">🔒 В тюрьме</span>' : ''}
                    ${p.id === currentPlayerId && myTurn ? '<span style="font-size:0.6rem;">🎲 ВАШ ХОД</span>' : ''}
                    ${canBuild && p.id === currentPlayerId && myTurn && !localGameState.diceRolled ? '<span style="font-size:0.6rem; color:#4caf50;">🏗️</span>' : ''}
                </div>
            `;
        }).join('');
        
        const chatPanel = document.getElementById("chatPanel");
        if (chatPanel && chatPanel.style.display === "none") chatPanel.style.display = "flex";
        
        document.getElementById("gameArea").innerHTML = `
            <div class="game-wrapper">
                <div id="board3d-container"></div>
                ${boardHtml}
                <div class="game-panel">
                    <div class="players-info">${playersHtml}</div>
                    <div class="unsold-properties-info" style="margin: 15px 0; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 20px; cursor: pointer;" onclick="showUnsoldProperties()">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <span>🏠 Непродано клеток:</span>
        <span id="unsoldCount" style="color: #ffcd7e; font-weight: bold; font-size: 1.2rem;">0</span>
    </div>
    <div style="font-size: 0.7rem; color: #c9b896;">Нажмите для списка</div>
</div>
                    <div class="controls">
                        <button id="rollBtn" ${!myTurn || localGameState.diceRolled ? 'disabled' : ''}>🎲 Бросить кубики</button>
                        <button id="endTurnBtn" ${!myTurn || !localGameState.diceRolled ? 'disabled' : ''}>➡️ Закончить ход</button>
                        <button id="tradeBtn" ${!myTurn ? 'disabled' : ''}>🤝 Торговля</button>
                        <button id="upgradeBtn" ${!myTurn || localGameState.diceRolled ? 'disabled' : ''}>🏗️ Улучшить</button>
                        <div class="dice-area"><span>🎲 Кубики:</span><span class="dice">${localGameState.currentDiceSum || '⚀⚀'}</span></div>
                    </div>
                </div>
            </div>
        `;
        
        // Initialize Three.js after DOM is ready
        setTimeout(() => {
            if (typeof THREE !== 'undefined') {
                initThreeJS();
            }
        }, 100);
        
        document.getElementById("rollBtn")?.addEventListener("click", () => rollDice());
        document.getElementById("endTurnBtn")?.addEventListener("click", () => endTurn());
        document.getElementById("tradeBtn")?.addEventListener("click", () => showTradeModal());
        document.getElementById("upgradeBtn")?.addEventListener("click", () => showUpgradeProperties());
        updateUnsoldPropertiesCount();
    }

    initUI();
</script>
</body>
</html>
