<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мотивацию надо поднять</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #F5F1E8 0%, #FFE5D9 100%);
            font-family: 'Georgia', serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            cursor: none;
            transition: background 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark {
            background: linear-gradient(135deg, #0C1929 0%, #1A2D3D 100%);
            color: #E8DCC4;
        }

        /* Floating blobs with interactive movement */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: floatBlob 20s infinite ease-in-out;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1), all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
            will-change: transform;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: #FF6F61;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 350px;
            height: 350px;
            background: #40E0D0;
            bottom: -80px;
            right: -80px;
            animation-delay: -5s;
        }

        .blob-3 {
            width: 300px;
            height: 300px;
            background: #F4A460;
            top: 50%;
            left: 50%;
            animation-delay: -10s;
        }

        body.dark .blob-1 { background: #40E0D0; }
        body.dark .blob-2 { background: #FF6F61; }
        body.dark .blob-3 { background: #9B7EDE; }

        @keyframes floatBlob {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -30px) scale(1.1); }
            50% { transform: translate(-30px, 50px) scale(0.95); }
            75% { transform: translate(30px, 30px) scale(1.05); }
        }

        /* Ripple effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            transform: scale(0);
            animation: rippleEffect 0.6s linear;
            pointer-events: none;
            z-index: 5;
        }

        body.dark .ripple {
            background: rgba(255, 255, 255, 0.3);
        }

        @keyframes rippleEffect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .organic-container {
            position: relative;
            z-index: 10;
            max-width: 900px;
            width: 90%;
        }

        .organic-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            padding: 60px 50px;
            text-align: center;
            box-shadow: 
                0 20px 60px rgba(255, 111, 97, 0.15),
                inset 0 0 100px rgba(255, 255, 255, 0.3);
            animation: morphBlob 8s ease-in-out infinite;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid rgba(255, 255, 255, 0.4);
        }

        body.dark .organic-card {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 20px 60px rgba(64, 224, 208, 0.15),
                inset 0 0 100px rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        @keyframes morphBlob {
            0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            25% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
            50% { border-radius: 50% 60% 30% 60% / 30% 60% 70% 40%; }
            75% { border-radius: 60% 40% 60% 30% / 70% 30% 50% 60%; }
        }

        /* Tabs with SVG icons */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .tab {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 12px 30px;
            border-radius: 30px;
            cursor: none;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.4s;
            color: #2C1810;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        body.dark .tab {
            color: #E8DCC4;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .tab.active {
            background: rgba(255, 111, 97, 0.3);
            border-color: #FF6F61;
            transform: scale(1.05);
        }

        body.dark .tab.active {
            background: rgba(64, 224, 208, 0.3);
            border-color: #40E0D0;
        }

        .tab:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        /* Animated SVG Icons in tabs */
        .tab-icon {
            width: 24px;
            height: 24px;
            display: inline-block;
        }

        .tab-icon svg {
            width: 100%;
            height: 100%;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .tab-icon svg path,
        .tab-icon svg circle,
        .tab-icon svg polyline {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: drawIcon 1.5s ease forwards;
        }

        @keyframes drawIcon {
            to {
                stroke-dashoffset: 0;
            }
        }

        .tab:hover .tab-icon svg path,
        .tab:hover .tab-icon svg circle,
        .tab:hover .tab-icon svg polyline {
            animation: drawIcon 0.8s ease forwards;
        }

        /* Content sections */
        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .quote-display {
            font-size: 2rem;
            line-height: 1.6;
            color: #2C1810;
            margin-bottom: 40px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-style: italic;
            transition: all 0.5s ease;
            position: relative;
        }

        body.dark .quote-display {
            color: #E8DCC4;
        }

        /* Typewriter cursor */
        .typewriter-cursor {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background: currentColor;
            margin-left: 4px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Meditation Timer Styles */
        .meditation-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .breathing-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Circular progress */
        .breathing-progress {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .breathing-progress circle {
            fill: none;
            stroke-width: 4;
        }

        .progress-bg {
            stroke: rgba(255, 255, 255, 0.2);
        }

        .progress-fill {
            stroke: #FF6F61;
            stroke-linecap: round;
            stroke-dasharray: 565; /* 2 * PI * 90 */
            stroke-dashoffset: 565;
            transition: stroke-dashoffset 0.1s linear;
        }

        body.dark .progress-fill {
            stroke: #40E0D0;
        }

        .breathing-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 111, 97, 0.3), transparent);
            animation: breathe 4s infinite ease-in-out;
            display: none;
            position: relative;
            z-index: 2;
        }

        body.dark .breathing-circle {
            background: radial-gradient(circle, rgba(64, 224, 208, 0.3), transparent);
        }

        .breathing-circle.active {
            display: block;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        .breathing-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            font-weight: 600;
            color: #2C1810;
            z-index: 3;
            font-family: 'Inter', sans-serif;
            opacity: 0;
            transition: opacity 0.3s;
        }

        body.dark .breathing-text {
            color: #E8DCC4;
        }

        .breathing-text.active {
            opacity: 1;
        }

        .timer-display {
            font-size: 3rem;
            font-weight: 300;
            color: #2C1810;
            font-family: 'Inter', sans-serif;
            letter-spacing: 4px;
        }

        body.dark .timer-display {
            color: #E8DCC4;
        }

        .breathing-pattern-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 10px;
        }

        .pattern-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: none;
            font-size: 0.85rem;
            transition: all 0.3s;
            color: #2C1810;
            font-family: 'Inter', sans-serif;
        }

        body.dark .pattern-btn {
            color: #E8DCC4;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .pattern-btn.active {
            background: rgba(255, 111, 97, 0.3);
            border-color: #FF6F61;
        }

        body.dark .pattern-btn.active {
            background: rgba(64, 224, 208, 0.3);
            border-color: #40E0D0;
        }

        .pattern-btn:hover {
            transform: scale(1.05);
        }

        .timer-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .timer-btn {
            background: linear-gradient(135deg, #FF6F61, #F4A460);
            border: none;
            color: white;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: none;
            transition: all 0.4s;
            box-shadow: 0 8px 25px rgba(255, 111, 97, 0.3);
            font-family: 'Inter', sans-serif;
        }

        body.dark .timer-btn {
            background: linear-gradient(135deg, #40E0D0, #20B2AA);
            box-shadow: 0 8px 25px rgba(64, 224, 208, 0.3);
        }

        .timer-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 35px rgba(255, 111, 97, 0.4);
        }

        body.dark .timer-btn:hover {
            box-shadow: 0 12px 35px rgba(64, 224, 208, 0.4);
        }

        .timer-presets {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .preset-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: none;
            font-size: 0.9rem;
            transition: all 0.3s;
            color: #2C1810;
            font-family: 'Inter', sans-serif;
        }

        body.dark .preset-btn {
            color: #E8DCC4;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .preset-btn:hover {
            background: rgba(255, 111, 97, 0.3);
            border-color: #FF6F61;
            transform: scale(1.05);
        }

        body.dark .preset-btn:hover {
            background: rgba(64, 224, 208, 0.3);
            border-color: #40E0D0;
        }

        .organic-btn {
            background: linear-gradient(135deg, #FF6F61, #F4A460);
            border: none;
            color: white;
            padding: 18px 45px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: none;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1);
            box-shadow: 0 10px 30px rgba(255, 111, 97, 0.3);
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        body.dark .organic-btn {
            background: linear-gradient(135deg, #40E0D0, #20B2AA);
            box-shadow: 0 10px 30px rgba(64, 224, 208, 0.3);
        }

        .organic-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 111, 97, 0.4);
        }

        body.dark .organic-btn:hover {
            box-shadow: 0 15px 40px rgba(64, 224, 208, 0.4);
        }

        .brush-cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, rgba(255, 111, 97, 0.4), transparent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            filter: blur(8px);
            mix-blend-mode: multiply;
            transition: width 0.3s, height 0.3s;
        }

        body.dark .brush-cursor {
            background: radial-gradient(circle, rgba(64, 224, 208, 0.4), transparent);
            mix-blend-mode: screen;
        }

        .brush-cursor.active {
            width: 80px;
            height: 80px;
        }

        .theme-switch {
            position: fixed;
            top: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            padding: 12px 24px;
            border-radius: 30px;
            cursor: none;
            font-size: 1.2rem;
            transition: all 0.3s;
            z-index: 100;
        }

        .theme-switch:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.5);
        }

        /* SVG Particles */
        .svg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }

        .svg-particle {
            position: absolute;
            top: -50px;
            animation: floatSVG linear infinite;
            opacity: 0;
        }

        @keyframes floatSVG {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% { 
                opacity: 0.7; 
            }
            90% { 
                opacity: 0.7; 
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .organic-card {
                padding: 40px 25px;
            }
            
            .quote-display {
                font-size: 1.5rem;
            }
            
            .organic-btn {
                padding: 16px 36px;
                font-size: 1rem;
            }

            .timer-display {
                font-size: 2.5rem;
            }

            .tabs {
                gap: 10px;
            }

            .tab {
                padding: 10px 20px;
                font-size: 0.9rem;
            }

            .breathing-wrapper {
                width: 160px;
                height: 160px;
            }

            .breathing-circle {
                width: 120px;
                height: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="brush-cursor" id="brushCursor"></div>
    
    <div class="blob blob-1" id="blob1"></div>
    <div class="blob blob-2" id="blob2"></div>
    <div class="blob blob-3" id="blob3"></div>
    
    <div class="svg-particles" id="svgParticles"></div>
    
    <button class="theme-switch" onclick="toggleTheme()">🌙/☀️</button>
    
    <div class="organic-container">
        <div class="organic-card">
            <!-- Tabs with SVG icons -->
            <div class="tabs">
                <button class="tab active" onclick="switchTab('motivation')">
                    <span class="tab-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
                        </svg>
                    </span>
                    Вдохновение
                </button>
                <button class="tab" onclick="switchTab('meditation')">
                    <span class="tab-icon">
                        <svg viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 6v6l4 2"/>
                        </svg>
                    </span>
                    Медитация
                </button>
            </div>

            <!-- Motivation Section -->
            <div class="content-section active" id="motivationSection">
                <div class="quote-display" id="quoteDisplay">
                    Нажми кнопку, чтобы получить случайную мысль...
                </div>
                <button class="organic-btn" id="getQuoteBtn" onmouseenter="brushActive(true)" onmouseleave="brushActive(false)">
                    Получить вдохновение
                </button>
            </div>

            <!-- Meditation Section -->
            <div class="content-section" id="meditationSection">
                <div class="meditation-container">
                    <div class="breathing-wrapper">
                        <svg class="breathing-progress" viewBox="0 0 200 200">
                            <circle class="progress-bg" cx="100" cy="100" r="90"/>
                            <circle class="progress-fill" id="progressCircle" cx="100" cy="100" r="90"/>
                        </svg>
                        <div class="breathing-circle" id="breathingCircle"></div>
                        <div class="breathing-text" id="breathingText">Вдох...</div>
                    </div>
                    
                    <div class="breathing-pattern-selector">
                        <button class="pattern-btn active" onclick="setBreathingPattern('relax')" data-pattern="relax">Расслабление (4-4)</button>
                        <button class="pattern-btn" onclick="setBreathingPattern('balance')" data-pattern="balance">Баланс (4-7-8)</button>
                        <button class="pattern-btn" onclick="setBreathingPattern('box')" data-pattern="box">Box Breathing (4-4-4-4)</button>
                    </div>

                    <div class="timer-display" id="timerDisplay">05:00</div>
                    
                    <div class="timer-presets">
                        <button class="preset-btn" onclick="setTimer(3)">3 мин</button>
                        <button class="preset-btn" onclick="setTimer(5)">5 мин</button>
                        <button class="preset-btn" onclick="setTimer(10)">10 мин</button>
                        <button class="preset-btn" onclick="setTimer(15)">15 мин</button>
                        <button class="preset-btn" onclick="setTimer(20)">20 мин</button>
                    </div>
                    
                    <div class="timer-controls">
                        <button class="timer-btn" id="startBtn" onclick="startTimer()">▶ Старт</button>
                        <button class="timer-btn" id="pauseBtn" onclick="pauseTimer()" style="display:none;">⏸ Пауза</button>
                        <button class="timer-btn" onclick="resetTimer()">↺ Сброс</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>

            "Верь в силу своих желаний",
            "Мечты становятся реальностью через действие",
            "Твоё вдохновение заражает других"
        ];

        // Timer and breathing variables
        let timerInterval = null;
        let breathingInterval = null;
        let timeLeft = 300;
        let isRunning = false;
        let lastQuoteIndex = -1;
        let currentPattern = 'relax';
        let breathingPhase = 0;

        // Blob interaction variables
        const blobs = [
            { element: document.getElementById('blob1'), x: 0, y: 0, vx: 0, vy: 0 },
            { element: document.getElementById('blob2'), x: 0, y: 0, vx: 0, vy: 0 },
            { element: document.getElementById('blob3'), x: 0, y: 0, vx: 0, vy: 0 }
        ];

        // Breathing patterns
        const breathingPatterns = {
            relax: {
                name: 'Расслабление',
                phases: [
                    { text: 'Вдох...', duration: 4000, scale: 1.3 },
                    { text: 'Выдох...', duration: 4000, scale: 1 }
                ]
            },
            balance: {
                name: 'Баланс 4-7-8',
                phases: [
                    { text: 'Вдох...', duration: 4000, scale: 1.3 },
                    { text: 'Задержи...', duration: 7000, scale: 1.3 },
                    { text: 'Выдох...', duration: 8000, scale: 1 }
                ]
            },
            box: {
                name: 'Box Breathing',
                phases: [
                    { text: 'Вдох...', duration: 4000, scale: 1.3 },
                    { text: 'Задержи...', duration: 4000, scale: 1.3 },
                    { text: 'Выдох...', duration: 4000, scale: 1 },
                    { text: 'Задержи...', duration: 4000, scale: 1 }
                ]
            }
        };

        const brushCursor = document.getElementById('brushCursor');
        const svgParticlesContainer = document.getElementById('svgParticles');
        const quoteDisplay = document.getElementById('quoteDisplay');
        const breathingCircle = document.getElementById('breathingCircle');
        const breathingText = document.getElementById('breathingText');
        const progressCircle = document.getElementById('progressCircle');

        // Load saved theme
        const savedTheme = localStorage.getItem('organicFlowTheme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
        }

        document.addEventListener('mousemove', (e) => {
            brushCursor.style.left = e.clientX + 'px';
            brushCursor.style.top = e.clientY + 'px';
        });

        function brushActive(isActive) {
            brushCursor.classList.toggle('active', isActive);
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('organicFlowTheme', isDark ? 'dark' : 'light');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.closest('.tab').classList.add('active');

            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            
            if (tab === 'motivation') {
                document.getElementById('motivationSection').classList.add('active');
            } else {
                document.getElementById('meditationSection').classList.add('active');
            }
        }

        // Create SVG particles
        function createSVGParticles() {
            const svgs = [
                `<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C12 2 8 6 8 12C8 18 12 22 12 22C12 22 16 18 16 12C16 6 12 2 12 2Z"/></svg>`,
                `<svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/></svg>`,
                `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>`,
                `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`,
                `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M12 2C12 2 14 6 12 8C10 6 12 2 12 2Z"/><path d="M22 12C22 12 18 14 16 12C18 10 22 12 22 12Z"/><path d="M12 22C12 22 10 18 12 16C14 18 12 22 12 22Z"/><path d="M2 12C2 12 6 10 8 12C6 14 2 12 2 12Z"/></svg>`
            ];

            for (let i = 0; i < 25; i++) {
                const particle = document.createElement('div');
                particle.className = 'svg-particle';
                particle.innerHTML = svgs[Math.floor(Math.random() * svgs.length)];
                particle.style.left = Math.random() * 100 + '%';
                
                const duration = 15 + Math.random() * 20;
                const delay = Math.random() * 20;
                
                particle.style.animationDuration = duration + 's';
                particle.style.animationDelay = '-' + delay + 's';
                
                const colors = ['#FF6F61', '#40E0D0', '#F4A460', '#9B7EDE'];
                particle.style.color = colors[Math.floor(Math.random() * colors.length)];
                
                svgParticlesContainer.appendChild(particle);
            }
        }

        // Typewriter effect
        function typeWriter(text, element, speed = 50) {
            element.innerHTML = '';
            let i = 0;
            
            // Add cursor
            const cursor = document.createElement('span');
            cursor.className = 'typewriter-cursor';
            element.appendChild(cursor);
            
            function type() {
                if (i < text.length) {
                    // Insert character before cursor
                    const char = document.createTextNode(text.charAt(i));
                    element.insertBefore(char, cursor);
                    i++;
                    setTimeout(type, speed);
                } else {
                    // Remove cursor after typing is done
                    setTimeout(() => {
                        cursor.remove();
                    }, 2000);
                }
            }
            
            type();
        }

        // Random quote generator
        function getRandomQuote() {
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * quotes.length);
            } while (newIndex === lastQuoteIndex && quotes.length > 1);
            
            lastQuoteIndex = newIndex;
            return quotes[newIndex];
        }

        document.getElementById('getQuoteBtn').addEventListener('click', () => {
            const randomQuote = getRandomQuote();
            typeWriter(randomQuote, quoteDisplay, 60);
        });

        // Ripple effect on click
        document.addEventListener('click', (e) => {
            // Create ripple
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            
            // Position at click coordinates
            const size = 100;
            ripple.style.width = size + 'px';
            ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - size/2) + 'px';
            ripple.style.top = (e.clientY - size/2) + 'px';
            
            document.body.appendChild(ripple);
            
            // Remove after animation
            setTimeout(() => {
                ripple.remove();
            }, 600);
            
            // Repel blobs from click point
            repelBlobs(e.clientX, e.clientY);
        });

        // Blob repulsion logic
        function repelBlobs(clickX, clickY) {
            blobs.forEach(blob => {
                const rect = blob.element.getBoundingClientRect();
                const blobCenterX = rect.left + rect.width / 2;
                const blobCenterY = rect.top + rect.height / 2;
                
                // Calculate distance and direction
                const dx = blobCenterX - clickX;
                const dy = blobCenterY - clickY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                // Only affect blobs within reasonable distance
                if (distance < 500) {
                    // Calculate repulsion force (stronger when closer)
                    const force = 100 / (distance + 1);
                    
                    // Apply velocity to blob
                    blob.vx += (dx / distance) * force;
                    blob.vy += (dy / distance) * force;
                }
            });
        }

        // Animate blobs with physics
        function animateBlobs() {
            blobs.forEach(blob => {
                // Apply velocity to position
                blob.x += blob.vx;
                blob.y += blob.vy;
                
                // Apply damping (friction)
                blob.vx *= 0.95;
                blob.vy *= 0.95;
                
                // Return to original position gradually
                blob.vx -= blob.x * 0.01;
                blob.vy -= blob.y * 0.01;
                
                // Apply transform
                blob.element.style.transform = `translate(${blob.x}px, ${blob.y}px)`;
            });
            
            requestAnimationFrame(animateBlobs);
        }

        // Breathing functions
        function setBreathingPattern(pattern) {
            currentPattern = pattern;
            
            // Update active button
            document.querySelectorAll('.pattern-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.pattern === pattern) {
                    btn.classList.add('active');
                }
            });
            
            // Restart breathing if running
            if (isRunning) {
                stopBreathing();
                startBreathing();
            }
        }

        function startBreathing() {
            const pattern = breathingPatterns[currentPattern];
            let phaseIndex = 0;
            let phaseStartTime = Date.now();
            
            function updateBreathing() {
                const phase = pattern.phases[phaseIndex];
                const elapsed = Date.now() - phaseStartTime;
                const progress = Math.min(elapsed / phase.duration, 1);
                
                // Update text
                breathingText.textContent = phase.text;
                
                // Update circle scale
                const scale = 1 + (phase.scale - 1) * progress;
                breathingCircle.style.transform = `scale(${scale})`;
                
                // Update circular progress
                const circumference = 2 * Math.PI * 90;
                const offset = circumference * (1 - progress);
                progressCircle.style.strokeDashoffset = offset;
                
                if (elapsed >= phase.duration) {
                    phaseIndex = (phaseIndex + 1) % pattern.phases.length;
                    phaseStartTime = Date.now();
                }
                
                if (isRunning) {
                    breathingInterval = requestAnimationFrame(updateBreathing);
                }
            }
            
            breathingInterval = requestAnimationFrame(updateBreathing);
        }

        function stopBreathing() {
            if (breathingInterval) {
                cancelAnimationFrame(breathingInterval);
                breathingInterval = null;
            }
            breathingCircle.style.transform = 'scale(1)';
            progressCircle.style.strokeDashoffset = 565;
        }

        // Timer functions
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateTimerDisplay() {
            document.getElementById('timerDisplay').textContent = formatTime(timeLeft);
        }

        function setTimer(minutes) {
            pauseTimer();
            timeLeft = minutes * 60;
            updateTimerDisplay();
        }

        function startTimer() {
            if (!isRunning) {
                isRunning = true;
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('pauseBtn').style.display = 'inline-block';
                breathingCircle.classList.add('active');
                breathingText.classList.add('active');
                
                startBreathing();
                
                timerInterval = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateTimerDisplay();
                    } else {
                        pauseTimer();
                        alert('Медитация завершена! 🧘‍♀️');
                    }
                }, 1000);
            }
        }

        function pauseTimer() {
            isRunning = false;
            clearInterval(timerInterval);
            stopBreathing();
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('pauseBtn').style.display = 'none';
            breathingCircle.classList.remove('active');
            breathingText.classList.remove('active');
        }

        function resetTimer() {
            pauseTimer();
            timeLeft = 300;
            updateTimerDisplay();
        }

        // Initialize
        createSVGParticles();
        updateTimerDisplay();
        animateBlobs();
        
        // Initial quote
        setTimeout(() => {
            typeWriter("Нажми кнопку, чтобы получить случайную мысль...", quoteDisplay, 40);
        }, 500);
    </script>
</body>
</html>
