<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мотивацию надо поднять</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Quicksand:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Montserrat:wght@300;400;600;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Декоративные элементы фона */
        .bg-gradient {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 60%, rgba(255,255,255,0.1) 0%, transparent 40%);
    z-index: 0;
    transition: opacity 0.5s ease;
    opacity: 0.3;
    pointer-events: none;
    mix-blend-mode: overlay;
}

.bg-grid {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
    pointer-events: none;
    opacity: 0.3;
    transition: opacity 0.5s ease;
    animation: gridFloat 20s linear infinite;
}

@keyframes gridFloat {
    0% { transform: translate(0, 0); }
    25% { transform: translate(5px, 5px); }
    50% { transform: translate(10px, 0); }
    75% { transform: translate(5px, -5px); }
    100% { transform: translate(0, 0); }
}
.bg-orb {
    position: fixed;
    width: 80vmax;
    height: 80vmax;
    border-radius: 50%;
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    filter: blur(100px) brightness(0.8);
    z-index: 0;
    opacity: 0.5;
    mix-blend-mode: screen;
}

.bg-orb-2 {
    position: fixed;
    width: 60vmax;
    height: 60vmax;
    border-radius: 50%;
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    bottom: -10%;
    right: -10%;
    filter: blur(100px) brightness(0.8);
    z-index: 0;
    opacity: 0.5;
    mix-blend-mode: screen;
}

      .particle {
    position: fixed;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    transition: all 0.5s ease;
    background: rgba(255, 255, 255, 0.5);
    box-shadow: 0 0 10px currentColor;
    --duration: 10s;
}

.particle:nth-child(3n) {
    width: 6px;
    height: 6px;
    background: rgba(255, 200, 200, 0.6);
}

.particle:nth-child(5n+2) {
    width: 3px;
    height: 3px;
    background: rgba(200, 255, 200, 0.6);
}
@keyframes cyberpunkOrb1 {
    0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 0.5; filter: blur(100px) hue-rotate(0deg); }
    25% { transform: translate(-45%, -55%) scale(1.3) rotate(90deg); opacity: 0.7; filter: blur(100px) hue-rotate(30deg); }
    50% { transform: translate(-55%, -45%) scale(1.1) rotate(180deg); opacity: 0.6; filter: blur(100px) hue-rotate(60deg); }
    75% { transform: translate(-40%, -60%) scale(1.4) rotate(270deg); opacity: 0.8; filter: blur(100px) hue-rotate(30deg); }
    100% { transform: translate(-50%, -50%) scale(1) rotate(360deg); opacity: 0.5; filter: blur(100px) hue-rotate(0deg); }
}

@keyframes cyberpunkOrb2 {
    0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 0.4; filter: blur(100px) hue-rotate(0deg); }
    33% { transform: translate(-10%, -10%) scale(1.4) rotate(-120deg); opacity: 0.6; filter: blur(100px) hue-rotate(-30deg); }
    66% { transform: translate(5%, 5%) scale(0.9) rotate(-240deg); opacity: 0.5; filter: blur(100px) hue-rotate(-60deg); }
    100% { transform: translate(0, 0) scale(1) rotate(-360deg); opacity: 0.4; filter: blur(100px) hue-rotate(0deg); }
}

@keyframes oceanOrb1 {
    0% { transform: translate(-50%, -50%) scale(1) translateY(0) translateX(0); opacity: 0.4; filter: blur(100px) brightness(1); }
    20% { transform: translate(-45%, -55%) scale(1.2) translateY(-20px) translateX(-10px); opacity: 0.6; filter: blur(100px) brightness(1.1); }
    40% { transform: translate(-55%, -45%) scale(1.1) translateY(20px) translateX(10px); opacity: 0.5; filter: blur(100px) brightness(0.9); }
    60% { transform: translate(-48%, -52%) scale(1.3) translateY(-10px) translateX(-15px); opacity: 0.7; filter: blur(100px) brightness(1.2); }
    80% { transform: translate(-52%, -48%) scale(1.2) translateY(10px) translateX(15px); opacity: 0.6; filter: blur(100px) brightness(0.95); }
    100% { transform: translate(-50%, -50%) scale(1) translateY(0) translateX(0); opacity: 0.4; filter: blur(100px) brightness(1); }
}

@keyframes oceanOrb2 {
    0% { transform: translate(0, 0) scale(1) translateY(0); opacity: 0.3; filter: blur(100px) brightness(1); }
    20% { transform: translate(-8%, -12%) scale(1.3) translateY(-15px); opacity: 0.5; filter: blur(100px) brightness(1.2); }
    40% { transform: translate(6%, 4%) scale(1.2) translateY(15px); opacity: 0.4; filter: blur(100px) brightness(0.9); }
    60% { transform: translate(-12%, 2%) scale(1.4) translateY(-8px); opacity: 0.6; filter: blur(100px) brightness(1.3); }
    80% { transform: translate(4%, -6%) scale(1.2) translateY(10px); opacity: 0.5; filter: blur(100px) brightness(0.95); }
    100% { transform: translate(0, 0) scale(1) translateY(0); opacity: 0.3; filter: blur(100px) brightness(1); }
}
        /* Основной контейнер */
        .oracle {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 700px;
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: 56px;
            padding: 36px;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: translateY(0);
            animation: containerAppear 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.5);
        }

        @keyframes containerAppear {
            0% { opacity: 0; transform: translateY(50px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Темы (сокращено для читаемости, но сохранены все стили) */
        .oracle.theme-cyberpunk {
            background: linear-gradient(135deg, rgba(5, 10, 20, 0.7), rgba(10, 5, 25, 0.7));
            border: 2px solid rgba(0, 255, 255, 0.4);
            box-shadow: 0 30px 60px -15px rgba(0, 255, 255, 0.3), 0 0 50px rgba(255, 0, 255, 0.2);
            font-family: 'Orbitron', sans-serif;
        }

        body.theme-cyberpunk-bg {
            background: linear-gradient(145deg, #03050f, #0a0515);
        }
        
        body.theme-cyberpunk-bg .bg-orb {
            background: radial-gradient(circle at 30% 30%, #00ffff, #ff00ff, transparent 80%);
            animation: cyberpunkOrb1 15s infinite linear;
        }
        
        body.theme-cyberpunk-bg .bg-orb-2 {
            background: radial-gradient(circle at 70% 70%, #ff00ff, #00ffff, transparent 80%);
            animation: cyberpunkOrb2 18s infinite linear;
        }

        .oracle.theme-picmi {
            background: linear-gradient(135deg, rgba(45, 25, 35, 0.7), rgba(55, 30, 40, 0.7));
            border: 2px solid rgba(255, 200, 210, 0.5);
            box-shadow: 0 30px 60px -15px rgba(255, 180, 190, 0.3), 0 0 50px rgba(255, 220, 180, 0.2);
            font-family: 'Quicksand', sans-serif;
        }

        body.theme-picmi-bg {
            background: linear-gradient(145deg, #2a1a24, #35222e);
        }

        .oracle.theme-dark {
            background: linear-gradient(135deg, rgba(10, 10, 15, 0.8), rgba(15, 15, 20, 0.8));
            border: 2px solid rgba(180, 180, 200, 0.15);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8);
            font-family: 'Montserrat', sans-serif;
        }

        body.theme-dark-bg {
            background: linear-gradient(145deg, #0a0a0f, #12121a);
        }

        .oracle.theme-ocean {
            background: linear-gradient(135deg, rgba(20, 45, 65, 0.7), rgba(25, 50, 70, 0.7));
            border: 2px solid rgba(135, 206, 235, 0.5);
            box-shadow: 0 30px 60px -15px rgba(135, 206, 235, 0.3), 0 0 50px rgba(173, 216, 230, 0.2);
            font-family: 'Playfair Display', serif;
        }

        body.theme-ocean-bg {
            background: linear-gradient(145deg, #112a36, #1a3340);
        }

        /* Верхняя панель */
        .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 45px;
    padding: 0 15px;
    position: relative;
}

.date {
    color: rgba(255, 255, 255, 0.98);
    font-size: 1.1rem;
    letter-spacing: 1px;
    background: rgba(255, 255, 255, 0.08);
    padding: 12px 25px;
    border-radius: 60px;
    border: 2px solid rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
    transition: all 0.3s ease;
    font-weight: 600;
    box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.4);
    position: relative;
    overflow: hidden;
}

.date::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transition: left 0.5s ease;
}

.date:hover::before {
    left: 100%;
}

.date:hover {
    transform: translateY(-2px);
    border-color: rgba(255, 255, 255, 0.3);
    box-shadow: 0 12px 25px -8px rgba(0, 0, 0, 0.5);
}

        .oracle.theme-cyberpunk .date,
        .oracle.theme-cyberpunk .stat-badge,
        .oracle.theme-cyberpunk .mood-detector {
            background: rgba(0, 255, 255, 0.15);
            border-color: rgba(0, 255, 255, 0.4);
            color: #a0ffff;
        }

        .oracle.theme-picmi .date,
        .oracle.theme-picmi .stat-badge,
        .oracle.theme-picmi .mood-detector {
            background: rgba(255, 200, 210, 0.2);
            border-color: rgba(255, 220, 180, 0.5);
            color: #fff0f0;
        }

        .oracle.theme-dark .date,
        .oracle.theme-dark .stat-badge,
        .oracle.theme-dark .mood-detector {
            background: rgba(200, 200, 220, 0.08);
            border-color: rgba(200, 200, 220, 0.15);
            color: #e0e0f0;
        }

        .oracle.theme-ocean .date,
        .oracle.theme-ocean .stat-badge,
        .oracle.theme-ocean .mood-detector {
            background: rgba(135, 206, 235, 0.2);
            border-color: rgba(173, 216, 230, 0.5);
            color: #d0f0ff;
        }

        .stats {
            display: flex;
            gap: 12px;
        }

        .stat-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 50px;
            color: rgba(255, 255, 255, 0.95);
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        /* Прогресс */
        .progress-container {
            width: 100%;
            margin-bottom: 40px;
            padding: 0 12px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-bottom: 12px;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            backdrop-filter: blur(5px);
        }

        .progress-fill {
            height: 100%;
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.5s ease;
            position: relative;
            border-radius: 10px;
        }

        .oracle.theme-cyberpunk .progress-fill {
            background: linear-gradient(90deg, #00ffff, #ff00ff, #00ffff);
            background-size: 200% 100%;
            animation: gradientShift 3s infinite;
        }

        .oracle.theme-picmi .progress-fill {
            background: linear-gradient(90deg, #ffb6c1, #ffdab9, #ffb6c1);
            background-size: 200% 100%;
            animation: gradientShift 3s infinite;
        }

        .oracle.theme-dark .progress-fill {
            background: linear-gradient(90deg, #6a6a80, #4a4a60, #6a6a80);
            background-size: 200% 100%;
            animation: gradientShift 4s infinite;
        }

        .oracle.theme-ocean .progress-fill {
            background: linear-gradient(90deg, #87ceeb, #add8e6, #87ceeb);
            background-size: 200% 100%;
            animation: gradientShift 3s infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
            animation: shimmer 1.8s infinite;
        }

        /* Карточка */
        .card-wrapper {
    perspective: 3000px;
    margin-bottom: 40px;
    cursor: pointer;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
}

.card-wrapper::before {
    content: '';
    position: absolute;
    top: -10px;
    left: -10px;
    right: -10px;
    bottom: -10px;
    background: inherit;
    filter: blur(30px);
    opacity: 0;
    transition: opacity 0.4s ease;
    border-radius: 60px;
    z-index: -1;
}

.card-wrapper:hover::before {
    opacity: 0.3;
}

.card-wrapper:hover {
    transform: scale(1.03) translateY(-8px);
}

        .card {
    position: relative;
    width: 100%;
    min-height: 420px;
    transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    transform-style: preserve-3d;
    border-radius: 60px;
}

.card.flipped {
    transform: rotateY(180deg) scale(1.05);
}
.card-front, .card-back {
    position: absolute;
    width: 100%;
    min-height: 420px;
    backface-visibility: hidden;
    border-radius: 60px;
    padding: 50px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    transition: all 0.5s ease;
    backdrop-filter: blur(15px);
    box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.5), inset 0 0 30px rgba(255, 255, 255, 0.1);
}

        .oracle.theme-cyberpunk .card-front,
        .oracle.theme-cyberpunk .card-back {
            background: rgba(5, 10, 20, 0.8);
            border: 2px solid rgba(0, 255, 255, 0.4);
        }

        .oracle.theme-picmi .card-front,
        .oracle.theme-picmi .card-back {
            background: rgba(45, 25, 35, 0.7);
            border: 2px solid rgba(255, 200, 210, 0.5);
        }

        .oracle.theme-dark .card-front,
        .oracle.theme-dark .card-back {
            background: rgba(10, 10, 15, 0.85);
            border: 2px solid rgba(180, 180, 200, 0.15);
        }

        .oracle.theme-ocean .card-front,
        .oracle.theme-ocean .card-back {
            background: rgba(20, 45, 65, 0.7);
            border: 2px solid rgba(135, 206, 235, 0.5);
        }

        .card-front {
    transform: rotateY(0deg);
    color: white;
    align-items: center;
    text-align: center;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
}

.card-front .icon {
    font-size: 8rem;
    margin-bottom: 30px;
    animation: floatAdvanced 4s ease-in-out infinite;
    filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.5));
    text-shadow: 0 0 30px currentColor;
}

@keyframes floatAdvanced {
    0%, 100% { 
        transform: translateY(0) scale(1) rotate(0deg); 
        filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.5));
    }
    25% { 
        transform: translateY(-15px) scale(1.08) rotate(-3deg); 
        filter: drop-shadow(0 25px 35px rgba(0, 0, 0, 0.7));
    }
    50% { 
        transform: translateY(-25px) scale(1.15) rotate(0deg); 
        filter: drop-shadow(0 35px 45px rgba(0, 0, 0, 0.8));
    }
    75% { 
        transform: translateY(-15px) scale(1.08) rotate(3deg); 
        filter: drop-shadow(0 25px 35px rgba(0, 0, 0, 0.7));
    }
}
        .card-front .hint {
            font-size: 1.3rem;
    opacity: 0.9;
    margin-top: 30px;
    letter-spacing: 3px;
    position: relative;
    font-weight: 500;
    background: rgba(0, 0, 0, 0.2);
    padding: 15px 30px;
    border-radius: 50px;
    border: 1px solid rgba(255, 255, 255, 0.2);
        }
.card-front .hint::after {
    content: '👆';
    position: absolute;
    bottom: -40px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 2.5rem;
    animation: bounce 1.2s infinite;
    filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
}

@keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-12px); }
}

        .card-back {
            transform: rotateY(180deg);
    color: white;
    overflow-y: auto;
    background: linear-gradient(135deg, rgba(0,0,0,0.3), rgba(0,0,0,0.2));
    position: relative;
        }
.card-back p {
    font-size: 1.8rem;
    line-height: 1.7;
    font-weight: 500;
    text-align: center;
    word-break: break-word;
    animation: textAppear 0.6s ease-out;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    padding: 20px 0;
    letter-spacing: 0.5px;
}

@keyframes textAppear {
    0% { opacity: 0; transform: scale(0.9) translateY(20px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
}

        .rarity-badge {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 1.5rem;
            opacity: 0.8;
            transition: all 0.4s ease;
            animation: rotateSlow 12s infinite linear;
            filter: drop-shadow(0 0 10px currentColor);
        }

        @keyframes rotateSlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .rarity-badge:hover {
            opacity: 1;
            transform: scale(1.3) rotate(180deg);
            cursor: pointer;
        }

        /* Кнопка */
        .get-button {
    width: 100%;
    background: rgba(255, 255, 255, 0.08);
    border: 2px solid rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(15px);
    color: white;
    padding: 26px;
    font-size: 1.5rem;
    font-weight: 700;
    border-radius: 80px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    letter-spacing: 4px;
    position: relative;
    overflow: hidden;
    margin-bottom: 30px;
    text-transform: uppercase;
    box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.6);
    z-index: 2;
}

        .oracle.theme-cyberpunk .get-button {
            background: rgba(0, 255, 255, 0.15);
            border-color: rgba(0, 255, 255, 0.5);
            color: #a0ffff;
            letter-spacing: 5px;
            text-shadow: 0 0 15px #00ffff;
        }

        .oracle.theme-picmi .get-button {
            background: rgba(255, 200, 210, 0.2);
            border-color: rgba(255, 220, 180, 0.6);
            color: #fff0f0;
            text-shadow: 0 0 15px #ffb6c1;
        }

        .oracle.theme-dark .get-button {
            background: rgba(200, 200, 220, 0.08);
            border-color: rgba(200, 200, 220, 0.2);
            color: #e0e0f0;
            text-shadow: 0 0 15px #8080a0;
        }

        .oracle.theme-ocean .get-button {
            background: rgba(135, 206, 235, 0.2);
            border-color: rgba(173, 216, 230, 0.6);
            color: #d0f0ff;
            text-shadow: 0 0 15px #87ceeb;
            font-style: italic;
        }

        .get-button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transition: left 0.7s ease;
    z-index: 1;
}
.get-button::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, transparent, currentColor, transparent);
    transform: scaleX(0);
    transition: transform 0.4s ease;
}

.get-button:hover::after {
    transform: scaleX(1);
}
        .get-button:hover::before {
            left: 100%;
        }

        .get-button:hover:not(:disabled) {
    transform: translateY(-8px) scale(1.03);
    box-shadow: 0 30px 50px -10px rgba(0, 0, 0, 0.8);
    letter-spacing: 6px;
}
.get-button:active:not(:disabled) {
    transform: translateY(-3px) scale(1.01);
}
        .get-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: scale(0.98);
        }

        /* НОВЫЙ ЭЛЕМЕНТ: Детектор настроения */
        .mood-detector {
    margin-top: 30px;
    margin-bottom: 30px;

        .theme-switcher {
    display: flex;

.theme-switcher::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 350px;
    height: 2px;
    background: linear-gradient(90deg, 
        transparent, 
        rgba(255, 255, 255, 0.2), 
        rgba(255, 255, 255, 0.4), 
        rgba(255, 255, 255, 0.2), 
        transparent);
    z-index: 0;
}
.theme-option {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.3));
}

.theme-option:hover {
    transform: translateY(-12px) scale(1.05);
}
.theme-dot {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 3px solid rgba(255, 255, 255, 0.5);
    transition: all 0.4s ease;
    position: relative;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
}

.theme-dot::before {
    content: '';
    position: absolute;
    top: -5px;
    left: -5px;
    right: -5px;
    bottom: -5px;
    border-radius: 50%;
    border: 2px solid transparent;
    transition: all 0.4s ease;
}

.theme-dot::after {
    content: '';
    position: absolute;
    top: -2px;
    left: -2px;
    right: -2px;
    bottom: -2px;
    border-radius: 50%;
    background: inherit;
    filter: blur(8px);
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: -1;
}
.theme-option:hover .theme-dot::after {
    opacity: 0.7;
}

.theme-option.active .theme-dot {
    transform: scale(1.25);
    border-color: white;
    box-shadow: 0 0 40px currentColor;
    animation: pulseGlow 2s infinite;
}

.theme-option.active .theme-dot::before {
    border-color: rgba(255, 255, 255, 0.8);
    animation: ringPulse 2s infinite;
}

@keyframes ringPulse {
    0% {
        transform: scale(1);
        opacity: 1;
        border-color: rgba(255, 255, 255, 0.8);
    }
    50% {
        transform: scale(1.3);
        opacity: 0.5;
        border-color: rgba(255, 255, 255, 0.4);
    }
    100% {
        transform: scale(1.6);
        opacity: 0;
        border-color: rgba(255, 255, 255, 0);
    }
}

@keyframes pulseGlow {
    0%, 100% {
        box-shadow: 0 0 40px currentColor;
    }
    50% {
        box-shadow: 0 0 70px currentColor;
    }
}

        // Смена темы с сохранением
        window.setTheme = function(theme) {
    // Анимация переключения
    const oldTheme = document.querySelector('.theme-option.active')?.getAttribute('data-theme');
    
    document.querySelectorAll('.theme-option').forEach(option => {
        option.classList.remove('active');
    });
    
    const activeOption = document.querySelector(`.theme-option[data-theme="${theme}"]`);
    if (activeOption) {
        activeOption.classList.add('active');
        
        // Добавляем эффект пульсации при клике
        activeOption.style.transform = 'scale(0.9)';
        setTimeout(() => {
            activeOption.style.transform = '';
        }, 200);
    }
    
    // Плавное переключение классов с задержкой для анимации фона
    oracle.style.transition = 'all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
    body.style.transition = 'background 0.8s ease';
    
    oracle.classList.remove('theme-cyberpunk', 'theme-picmi', 'theme-dark', 'theme-ocean');
    oracle.classList.add(`theme-${theme}`);
    
    body.classList.remove('theme-cyberpunk-bg', 'theme-picmi-bg', 'theme-dark-bg', 'theme-ocean-bg');
    body.classList.add(`theme-${theme}-bg`);
    
    // Анимируем сферы при смене темы
    if (bgOrb1 && bgOrb2) {
        bgOrb1.style.animation = 'none';
        bgOrb2.style.animation = 'none';
        
        // Принудительный рефлоу
        void bgOrb1.offsetHeight;
        
        // Возвращаем анимацию в зависимости от темы
        switch(theme) {
            case 'cyberpunk':
                bgOrb1.style.animation = 'cyberpunkOrb1 15s infinite linear';
                bgOrb2.style.animation = 'cyberpunkOrb2 18s infinite linear';
                break;
            case 'picmi':
                bgOrb1.style.animation = 'picmiOrb1 16s infinite ease-in-out';
                bgOrb2.style.animation = 'picmiOrb2 20s infinite ease-in-out';
                break;
            case 'dark':
                bgOrb1.style.animation = 'darkOrb1 20s infinite alternate';
                bgOrb2.style.animation = 'darkOrb2 22s infinite alternate';
                break;
            case 'ocean':
                bgOrb1.style.animation = 'oceanOrb1 18s infinite ease-in-out';
                bgOrb2.style.animation = 'oceanOrb2 21s infinite ease-in-out';
                break;
        }
    }
    
    // Обновляем цвета частиц
    updateParticleColors(theme);
    
    localStorage.setItem('selectedTheme', theme);
    
    // Показываем уведомление о смене темы
    showToast(`✨ Тема изменена на ${getThemeName(theme)}`);
}

        'cyberpunk': 'КИБЕРПАНК',
        'picmi': 'ПИКМИ',
        'dark': 'ТЁМНЫЙ',
        'ocean': 'ОКЕАН'
    };
    return names[theme] || theme;
}
function updateParticleColors(theme) {
    const particles = document.querySelectorAll('.particle');
    const colors = {
        'cyberpunk': ['#00ffff', '#ff00ff', '#ffff00'],
        'picmi': ['#ffb6c1', '#ffdab9', '#ffe4e1'],
        'dark': ['#6a6a80', '#4a4a60', '#8a8aa0'],
        'ocean': ['#87ceeb', '#add8e6', '#b0e0e6']
    };
    
    const themeColors = colors[theme] || colors['cyberpunk'];
    
    particles.forEach((particle, index) => {
        particle.style.background = themeColors[index % themeColors.length];
        particle.style.boxShadow = `0 0 15px ${themeColors[index % themeColors.length]}`;
    });
}
        // Создание частиц
        function createParticles() {
    const particlesCount = 60; // Увеличили количество
    const container = document.body;
    
    // Удаляем старые частицы если есть
    const oldParticles = document.querySelectorAll('.particle');
    oldParticles.forEach(p => p.remove());
    
    for (let i = 0; i < particlesCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        
        // Случайное начальное положение
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        
        // Разные размеры
        const size = 2 + Math.random() * 5;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        
        // Разная прозрачность
        particle.style.opacity = 0.2 + Math.random() * 0.6;
        
        // Разная скорость анимации
        const duration = 5 + Math.random() * 15;
        particle.style.setProperty('--duration', duration + 's');
        
        // Задержка анимации
        particle.style.animationDelay = Math.random() * 5 + 's';
        
        // Разное направление движения
        const xMove = (Math.random() - 0.5) * 200;
        const yMove = (Math.random() - 0.5) * 200;
        
        // Создаем уникальную анимацию для каждой частицы
        const animName = `floatParticle_${i}`;
        const keyframes = `
            @keyframes ${animName} {
                0% { transform: translate(0, 0) scale(1); }
                25% { transform: translate(${xMove * 0.25}px, ${yMove * 0.25}px) scale(${1 + Math.random() * 0.3}); }
                50% { transform: translate(${xMove * 0.5}px, ${yMove * 0.5}px) scale(${1 - Math.random() * 0.2}); }
                75% { transform: translate(${xMove * 0.75}px, ${yMove * 0.75}px) scale(${1 + Math.random() * 0.4}); }
                100% { transform: translate(${xMove}px, ${yMove}px) scale(1); }
            }
        `;
        
        const styleSheet = document.createElement('style');
        styleSheet.textContent = keyframes;
        document.head.appendChild(styleSheet);
        
        particle.style.animation = `${animName} ${duration}s infinite alternate ease-in-out`;
        
        container.appendChild(particle);
    }
    
    // Обновляем цвета частиц после создания
    const savedTheme = localStorage.getItem('selectedTheme') || 'cyberpunk';
    updateParticleColors(savedTheme);
}

        // Добавляем стиль для частиц
        const style = document.createElement('style');
        style.textContent = `
            @keyframes floatParticle {
                0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
                25% { transform: translate(30px, -30px) scale(1.2); opacity: 0.6; }
                50% { transform: translate(-20px, 20px) scale(0.8); opacity: 0.4; }
                75% { transform: translate(20px, 20px) scale(1.1); opacity: 0.5; }
                100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            }
            .particle {
                animation: floatParticle var(--duration) infinite alternate;
            }
        `;
        document.head.appendChild(style);

        // Инициализация
        function init() {
            if (!canShowToday() && lastMessageDate && viewedMessages.length > 0) {
                messageText.textContent = viewedMessages[viewedMessages.length - 1];
                currentMessage = viewedMessages[viewedMessages.length - 1];
                getMessageBtn.disabled = true;
                showToast('📅 Сегодня уже смотрели');
            }
            updateStats();
            loadSavedTheme();
            createParticles();
        }
        
        init();
    </script>
