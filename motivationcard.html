<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мотивацию надо поднять</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Quicksand:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Montserrat:wght@300;400;600;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Декоративные элементы фона */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255,255,255,0.1) 0%, transparent 50%);
            z-index: 0;
            transition: opacity 0.5s ease;
            opacity: 0;
            pointer-events: none;
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .bg-orb {
            position: fixed;
            width: 80vmax;
            height: 80vmax;
            border-radius: 50%;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
        }

        .bg-orb-2 {
            position: fixed;
            width: 60vmax;
            height: 60vmax;
            border-radius: 50%;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            bottom: 0;
            right: 0;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
        }

        /* Частицы */
        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            transition: all 0.5s ease;
        }

        /* Анимации (сохранены из предыдущей версии) */
        @keyframes cyberpunkOrb1 {
            0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 0.5; }
            25% { transform: translate(-45%, -55%) scale(1.3) rotate(90deg); opacity: 0.7; }
            50% { transform: translate(-55%, -45%) scale(1.1) rotate(180deg); opacity: 0.6; }
            75% { transform: translate(-40%, -60%) scale(1.4) rotate(270deg); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(360deg); opacity: 0.5; }
        }

        @keyframes cyberpunkOrb2 {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 0.4; }
            33% { transform: translate(-10%, -10%) scale(1.4) rotate(-120deg); opacity: 0.6; }
            66% { transform: translate(5%, 5%) scale(0.9) rotate(-240deg); opacity: 0.5; }
            100% { transform: translate(0, 0) scale(1) rotate(-360deg); opacity: 0.4; }
        }

        @keyframes picmiOrb1 {
            0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 0.4; }
            20% { transform: translate(-40%, -60%) scale(1.2) rotate(72deg); opacity: 0.6; }
            40% { transform: translate(-60%, -40%) scale(1.1) rotate(144deg); opacity: 0.7; }
            60% { transform: translate(-45%, -55%) scale(1.3) rotate(216deg); opacity: 0.5; }
            80% { transform: translate(-55%, -45%) scale(1.2) rotate(288deg); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(360deg); opacity: 0.4; }
        }

        @keyframes picmiOrb2 {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 0.3; }
            25% { transform: translate(15%, -10%) scale(1.3) rotate(-90deg); opacity: 0.5; }
            50% { transform: translate(-10%, 15%) scale(1.2) rotate(-180deg); opacity: 0.6; }
            75% { transform: translate(5%, 5%) scale(1.4) rotate(-270deg); opacity: 0.4; }
            100% { transform: translate(0, 0) scale(1) rotate(-360deg); opacity: 0.3; }
        }

        @keyframes darkOrb1 {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.2; filter: blur(80px); }
            33% { transform: translate(-48%, -52%) scale(1.3); opacity: 0.3; filter: blur(90px); }
            66% { transform: translate(-52%, -48%) scale(0.9); opacity: 0.25; filter: blur(70px); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0.2; filter: blur(80px); }
        }

        @keyframes darkOrb2 {
            0% { transform: translate(0, 0) scale(1); opacity: 0.15; filter: blur(80px); }
            33% { transform: translate(-5%, -5%) scale(1.3); opacity: 0.25; filter: blur(90px); }
            66% { transform: translate(5%, 5%) scale(0.9); opacity: 0.2; filter: blur(70px); }
            100% { transform: translate(0, 0) scale(1); opacity: 0.15; filter: blur(80px); }
        }

        @keyframes oceanOrb1 {
            0% { transform: translate(-50%, -50%) scale(1) translateY(0); opacity: 0.4; }
            20% { transform: translate(-50%, -55%) scale(1.2) translateY(-20px); opacity: 0.6; }
            40% { transform: translate(-50%, -45%) scale(1.1) translateY(20px); opacity: 0.5; }
            60% { transform: translate(-50%, -52%) scale(1.3) translateY(-10px); opacity: 0.7; }
            80% { transform: translate(-50%, -48%) scale(1.2) translateY(10px); opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(1) translateY(0); opacity: 0.4; }
        }

        @keyframes oceanOrb2 {
            0% { transform: translate(0, 0) scale(1) translateY(0); opacity: 0.3; }
            20% { transform: translate(-8%, -12%) scale(1.3) translateY(-15px); opacity: 0.5; }
            40% { transform: translate(6%, 4%) scale(1.2) translateY(15px); opacity: 0.4; }
            60% { transform: translate(-12%, 2%) scale(1.4) translateY(-8px); opacity: 0.6; }
            80% { transform: translate(4%, -6%) scale(1.2) translateY(10px); opacity: 0.5; }
            100% { transform: translate(0, 0) scale(1) translateY(0); opacity: 0.3; }
        }

        /* Основной контейнер */
        .oracle {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 700px;
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: 56px;
            padding: 36px;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: translateY(0);
            animation: containerAppear 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.5);
        }

        @keyframes containerAppear {
            0% { opacity: 0; transform: translateY(50px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Темы (сокращено для читаемости, но сохранены все стили) */
        .oracle.theme-cyberpunk {
            background: linear-gradient(135deg, rgba(5, 10, 20, 0.7), rgba(10, 5, 25, 0.7));
            border: 2px solid rgba(0, 255, 255, 0.4);
            box-shadow: 0 30px 60px -15px rgba(0, 255, 255, 0.3), 0 0 50px rgba(255, 0, 255, 0.2);
            font-family: 'Orbitron', sans-serif;
        }

        body.theme-cyberpunk-bg {
            background: linear-gradient(145deg, #03050f, #0a0515);
        }
        
        body.theme-cyberpunk-bg .bg-orb {
            background: radial-gradient(circle at 30% 30%, #00ffff, #ff00ff, transparent 80%);
            animation: cyberpunkOrb1 15s infinite linear;
        }
        
        body.theme-cyberpunk-bg .bg-orb-2 {
            background: radial-gradient(circle at 70% 70%, #ff00ff, #00ffff, transparent 80%);
            animation: cyberpunkOrb2 18s infinite linear;
        }

        .oracle.theme-picmi {
            background: linear-gradient(135deg, rgba(45, 25, 35, 0.7), rgba(55, 30, 40, 0.7));
            border: 2px solid rgba(255, 200, 210, 0.5);
            box-shadow: 0 30px 60px -15px rgba(255, 180, 190, 0.3), 0 0 50px rgba(255, 220, 180, 0.2);
            font-family: 'Quicksand', sans-serif;
        }

        body.theme-picmi-bg {
            background: linear-gradient(145deg, #2a1a24, #35222e);
        }

        .oracle.theme-dark {
            background: linear-gradient(135deg, rgba(10, 10, 15, 0.8), rgba(15, 15, 20, 0.8));
            border: 2px solid rgba(180, 180, 200, 0.15);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8);
            font-family: 'Montserrat', sans-serif;
        }

        body.theme-dark-bg {
            background: linear-gradient(145deg, #0a0a0f, #12121a);
        }

        .oracle.theme-ocean {
            background: linear-gradient(135deg, rgba(20, 45, 65, 0.7), rgba(25, 50, 70, 0.7));
            border: 2px solid rgba(135, 206, 235, 0.5);
            box-shadow: 0 30px 60px -15px rgba(135, 206, 235, 0.3), 0 0 50px rgba(173, 216, 230, 0.2);
            font-family: 'Playfair Display', serif;
        }

        body.theme-ocean-bg {
            background: linear-gradient(145deg, #112a36, #1a3340);
        }

        /* Верхняя панель */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 0 12px;
        }

        .date {
            color: rgba(255, 255, 255, 0.95);
            font-size: 1rem;
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .oracle.theme-cyberpunk .date,
        .oracle.theme-cyberpunk .stat-badge,
        .oracle.theme-cyberpunk .mood-detector {
            background: rgba(0, 255, 255, 0.15);
            border-color: rgba(0, 255, 255, 0.4);
            color: #a0ffff;
        }

        .oracle.theme-picmi .date,
        .oracle.theme-picmi .stat-badge,
        .oracle.theme-picmi .mood-detector {
            background: rgba(255, 200, 210, 0.2);
            border-color: rgba(255, 220, 180, 0.5);
            color: #fff0f0;
        }

        .oracle.theme-dark .date,
        .oracle.theme-dark .stat-badge,
        .oracle.theme-dark .mood-detector {
            background: rgba(200, 200, 220, 0.08);
            border-color: rgba(200, 200, 220, 0.15);
            color: #e0e0f0;
        }

        .oracle.theme-ocean .date,
        .oracle.theme-ocean .stat-badge,
        .oracle.theme-ocean .mood-detector {
            background: rgba(135, 206, 235, 0.2);
            border-color: rgba(173, 216, 230, 0.5);
            color: #d0f0ff;
        }

        .stats {
            display: flex;
            gap: 12px;
        }

        .stat-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 50px;
            color: rgba(255, 255, 255, 0.95);
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        /* Прогресс */
        .progress-container {
            width: 100%;
            margin-bottom: 40px;
            padding: 0 12px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-bottom: 12px;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            backdrop-filter: blur(5px);
        }

        .progress-fill {
            height: 100%;
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.5s ease;
            position: relative;
            border-radius: 10px;
        }

        .oracle.theme-cyberpunk .progress-fill {
            background: linear-gradient(90deg, #00ffff, #ff00ff, #00ffff);
            background-size: 200% 100%;
            animation: gradientShift 3s infinite;
        }

        .oracle.theme-picmi .progress-fill {
            background: linear-gradient(90deg, #ffb6c1, #ffdab9, #ffb6c1);
            background-size: 200% 100%;
            animation: gradientShift 3s infinite;
        }

        .oracle.theme-dark .progress-fill {
            background: linear-gradient(90deg, #6a6a80, #4a4a60, #6a6a80);
            background-size: 200% 100%;
            animation: gradientShift 4s infinite;
        }

        .oracle.theme-ocean .progress-fill {
            background: linear-gradient(90deg, #87ceeb, #add8e6, #87ceeb);
            background-size: 200% 100%;
            animation: gradientShift 3s infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
            animation: shimmer 1.8s infinite;
        }

        /* Карточка */
        .card-wrapper {
            perspective: 3000px;
            margin-bottom: 30px;
            cursor: pointer;
            transition: transform 0.4s ease;
        }

        .card-wrapper:hover {
            transform: scale(1.02);
        }

        .card {
            position: relative;
            width: 100%;
            min-height: 380px;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d;
            border-radius: 48px;
        }

        .card.flipped {
            transform: rotateY(180deg) scale(1.02);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            min-height: 380px;
            backface-visibility: hidden;
            border-radius: 48px;
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.5s ease;
            backdrop-filter: blur(12px);
        }

        .oracle.theme-cyberpunk .card-front,
        .oracle.theme-cyberpunk .card-back {
            background: rgba(5, 10, 20, 0.8);
            border: 2px solid rgba(0, 255, 255, 0.4);
        }

        .oracle.theme-picmi .card-front,
        .oracle.theme-picmi .card-back {
            background: rgba(45, 25, 35, 0.7);
            border: 2px solid rgba(255, 200, 210, 0.5);
        }

        .oracle.theme-dark .card-front,
        .oracle.theme-dark .card-back {
            background: rgba(10, 10, 15, 0.85);
            border: 2px solid rgba(180, 180, 200, 0.15);
        }

        .oracle.theme-ocean .card-front,
        .oracle.theme-ocean .card-back {
            background: rgba(20, 45, 65, 0.7);
            border: 2px solid rgba(135, 206, 235, 0.5);
        }

        .card-front {
            transform: rotateY(0deg);
            color: white;
            align-items: center;
            text-align: center;
        }

        .card-front .icon {
            font-size: 7rem;
            margin-bottom: 24px;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.5));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        .card-front .hint {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-top: 24px;
            letter-spacing: 2px;
            position: relative;
            font-weight: 500;
        }

        .card-front .hint::after {
            content: '👆';
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-8px); }
        }

        .card-back {
            transform: rotateY(180deg);
            color: white;
            overflow-y: auto;
        }

        .card-back p {
            font-size: 1.6rem;
            line-height: 1.7;
            font-weight: 400;
            text-align: center;
            word-break: break-word;
            animation: textAppear 0.6s ease-out;
        }

        @keyframes textAppear {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .rarity-badge {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 1.5rem;
            opacity: 0.8;
            transition: all 0.4s ease;
            animation: rotateSlow 12s infinite linear;
            filter: drop-shadow(0 0 10px currentColor);
        }

        @keyframes rotateSlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .rarity-badge:hover {
            opacity: 1;
            transform: scale(1.3) rotate(180deg);
            cursor: pointer;
        }

        /* Кнопка */
        .get-button {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            color: white;
            padding: 24px;
            font-size: 1.4rem;
            font-weight: 600;
            border-radius: 70px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
            margin-bottom: 25px;
            text-transform: uppercase;
            box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.5);
        }

        .oracle.theme-cyberpunk .get-button {
            background: rgba(0, 255, 255, 0.15);
            border-color: rgba(0, 255, 255, 0.5);
            color: #a0ffff;
            letter-spacing: 5px;
            text-shadow: 0 0 15px #00ffff;
        }

        .oracle.theme-picmi .get-button {
            background: rgba(255, 200, 210, 0.2);
            border-color: rgba(255, 220, 180, 0.6);
            color: #fff0f0;
            text-shadow: 0 0 15px #ffb6c1;
        }

        .oracle.theme-dark .get-button {
            background: rgba(200, 200, 220, 0.08);
            border-color: rgba(200, 200, 220, 0.2);
            color: #e0e0f0;
            text-shadow: 0 0 15px #8080a0;
        }

        .oracle.theme-ocean .get-button {
            background: rgba(135, 206, 235, 0.2);
            border-color: rgba(173, 216, 230, 0.6);
            color: #d0f0ff;
            text-shadow: 0 0 15px #87ceeb;
            font-style: italic;
        }

        .get-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s ease;
        }

        .get-button:hover::before {
            left: 100%;
        }

        .get-button:hover:not(:disabled) {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 25px 45px -10px rgba(0, 0, 0, 0.7);
        }

        .get-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: scale(0.98);
        }

        /* НОВЫЙ ЭЛЕМЕНТ: Детектор настроения */
        .mood-detector {
            margin-top: 25px;
            margin-bottom: 25px;
            padding: 20px 25px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 60px;
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .mood-detector:hover {
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .mood-detector:active {
            transform: scale(0.98);
        }

        .mood-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .mood-title {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mood-title span {
            font-size: 1.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .mood-indicator {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            animation: spin 10s infinite linear;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .mood-result {
            font-size: 1.3rem;
            font-weight: 500;
            text-align: center;
            padding: 10px 0;
            transition: all 0.3s ease;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .mood-emoji {
            font-size: 2rem;
            animation: bounce 1s infinite;
        }

        .mood-tag {
            padding: 5px 15px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.1);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .mood-footer {
            display: flex;
            justify-content: flex-end;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        /* Стили для детектора под каждую тему */
        .oracle.theme-cyberpunk .mood-title {
            color: #a0ffff;
            text-shadow: 0 0 10px #00ffff;
        }

        .oracle.theme-picmi .mood-title {
            color: #fff0f0;
            text-shadow: 0 0 10px #ffb6c1;
        }

        .oracle.theme-dark .mood-title {
            color: #e0e0f0;
            text-shadow: 0 0 10px #8080a0;
        }

            text-shadow: 0 0 10px #87ceeb;
        }

        /* Переключатель тем */
        .theme-switcher {
            display: flex;
            justify-content: center;
            gap: 35px;
            margin-top: 30px;
            position: relative;
            padding: 25px 0;
        }

        .theme-switcher::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.4), transparent);
            z-index: 0;
        }

        .theme-option {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .theme-option:hover {
            transform: translateY(-10px);
        }

        .theme-dot {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid transparent;
            transition: all 0.4s ease;
            position: relative;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
        }

        .theme-dot::after {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            border-radius: 50%;
            border: 2px solid transparent;
            transition: all 0.4s ease;
        }

        .theme-dot::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .theme-option.active .theme-dot {
            transform: scale(1.3);
            border-color: white;
            box-shadow: 0 0 50px currentColor;
        }

        .theme-option.active .theme-dot::after {
            border-color: rgba(255, 255, 255, 0.6);
            animation: ringPulse 2s infinite;
        }

        .theme-option.active .theme-dot::before {
            opacity: 1;
            animation: ringPulse 2s infinite 0.5s;
        }

        @keyframes ringPulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        .theme-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(-5px);
            font-weight: 600;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .theme-option:hover .theme-label {
            opacity: 1;
            transform: translateY(0);
            color: white;
        }

        .theme-option.active .theme-label {
            opacity: 1;
            color: white;
            transform: translateY(0);
            text-shadow: 0 0 15px currentColor;
        }

        .theme-option[data-theme="cyberpunk"] .theme-dot { 
            background: linear-gradient(135deg, #00ffff, #ff00ff, #00ffff);
            background-size: 200% 200%;
            animation: gradientRotate 4s infinite;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.8);
        }

        .theme-option[data-theme="picmi"] .theme-dot { 
            background: linear-gradient(135deg, #ffb6c1, #ffdab9, #ffb6c1);
            background-size: 200% 200%;
            animation: gradientRotate 4s infinite;
            box-shadow: 0 0 40px rgba(255, 200, 210, 0.8);
        }

        .theme-option[data-theme="dark"] .theme-dot { 
            background: linear-gradient(135deg, #6a6a80, #4a4a60, #6a6a80);
            background-size: 200% 200%;
            animation: gradientRotate 5s infinite;
            box-shadow: 0 0 40px rgba(90, 90, 112, 0.8);
        }

        .theme-option[data-theme="ocean"] .theme-dot { 
            background: linear-gradient(135deg, #87ceeb, #add8e6, #87ceeb);
            background-size: 200% 200%;
            animation: gradientRotate 4s infinite;
            box-shadow: 0 0 40px rgba(135, 206, 235, 0.8);
        }

        @keyframes gradientRotate {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        /* Уведомление */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(150px);
            background: rgba(20, 20, 35, 0.95);
            backdrop-filter: blur(20px);
            color: white;
            padding: 18px 36px;
            border-radius: 70px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            font-size: 1.1rem;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1000;
            white-space: nowrap;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Адаптивность */
        @media (max-width: 500px) {
            .oracle { padding: 24px; }
            .card-front, .card-back { min-height: 320px; padding: 32px 24px; }
            .card-back p { font-size: 1.3rem; }

            .theme-dot { width: 50px; height: 50px; }

        }

            75% { transform: translate(20px, 20px) scale(1.1); opacity: 0.5; }
            100% { transform: translate(0, 0) scale(1); opacity: 0.3; }

            "«Гора кажется огромной, пока ты не начал на неё взбираться. Но каждый шаг приближает тебя к вершине.» — Неизвестный автор 🏔️",
            "«Жизнь — это не зебра из чёрных и белых полос, а шахматная доска. Всё зависит от твоего хода.» — Неизвестный автор ♟️"
        ];

        // Состояние
        let viewedMessages = JSON.parse(localStorage.getItem('viewedMessages')) || [];
        let lastMessageDate = localStorage.getItem('lastMessageDate') || null;
        let currentMessage = null;

        // Элементы DOM
        const oracle = document.getElementById('oracle');
        const card = document.getElementById('motivationCard');
        const messageText = document.getElementById('messageText');
        const rarityEmoji = document.getElementById('rarityEmoji');
        const getMessageBtn = document.getElementById('getMessageBtn');
        const dateEl = document.getElementById('currentDate');
        const uniqueCountEl = document.getElementById('uniqueCount');
        const totalCountEl = document.getElementById('totalCount');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const toast = document.getElementById('toast');
        const bgOrb1 = document.getElementById('bgOrb1');
        const bgOrb2 = document.getElementById('bgOrb2');
        const body = document.body;

        // Элементы для детектора настроения
        const moodResult = document.getElementById('moodResult');
        const moodIndicator = document.getElementById('moodIndicator');
        const moodTime = document.getElementById('moodTime');

        // Обновление даты
        function updateDate() {
            const now = new Date();
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            dateEl.textContent = now.toLocaleDateString('ru-RU', options);
        }
        updateDate();

        // Обновление статистики
        function updateStats() {
            const unique = viewedMessages.length;
            const total = messages.length;
            const percent = Math.round((unique / total) * 100);
            
            uniqueCountEl.textContent = unique;
            totalCountEl.textContent = total;
            progressFill.style.width = percent + '%';
            progressPercent.textContent = percent + '%';
        }

        // Показать уведомление
        function showToast(text) {
            toast.textContent = text;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Проверка на сегодня
        function canShowToday() {
            const today = new Date().toDateString();
            return lastMessageDate !== today;
        }

        // Получение уникального сообщения
        function getUniqueMessage() {
            const availableMessages = messages.filter(msg => !viewedMessages.includes(msg));
            
            if (availableMessages.length === 0) {
                viewedMessages = [];
                return messages[Math.floor(Math.random() * messages.length)];
            }
            
            return availableMessages[Math.floor(Math.random() * availableMessages.length)];
        }

        // Получение сообщения дня
        function getDailyMessage() {
            if (!canShowToday()) {
                showToast('❌ Сегодня уже получал(а). До завтра!');
                return;
            }

            getMessageBtn.style.transform = 'scale(0.98)';
            setTimeout(() => getMessageBtn.style.transform = '', 150);

            const message = getUniqueMessage();
            currentMessage = message;
            messageText.textContent = message;
            
            const emojis = ['✨', '💎', '⭐', '🔥', '💫', '⚡'];
            rarityEmoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            
            card.classList.remove('flipped');
            
            lastMessageDate = new Date().toDateString();
            
            if (!viewedMessages.includes(message)) {
                viewedMessages.push(message);
            }
            
            localStorage.setItem('viewedMessages', JSON.stringify(viewedMessages));
            localStorage.setItem('lastMessageDate', lastMessageDate);
            
            updateStats();
            showToast('✨ Пророчество получено');
            
            getMessageBtn.disabled = true;
            
            // Сбрасываем детектор настроения при получении нового сообщения
            moodResult.innerHTML = 'Нажми, чтобы узнать своё настроение!';
            moodIndicator.textContent = '🎯';
            moodTime.textContent = 'основано на текущем сообщении';
        }

        // Переворот карточки
        window.flipCard = function() {
            card.classList.toggle('flipped');
        };

        // НОВАЯ ФУНКЦИЯ: Анализ настроения
        window.analyzeMood = function() {
            if (!currentMessage) {
                moodResult.innerHTML = '❌ Сначала получи пророчество!';
                moodIndicator.textContent = '😴';
                moodTime.textContent = 'нет сообщения для анализа';
                
                // Анимация ошибки
                const detector = document.getElementById('moodDetector');
                detector.style.transform = 'scale(0.95)';
                setTimeout(() => detector.style.transform = '', 200);
                return;
            }

            // Анимация нажатия
            const detector = document.getElementById('moodDetector');
            detector.style.transform = 'scale(0.98)';
            setTimeout(() => detector.style.transform = '', 150);

            // Меняем индикатор
            moodIndicator.textContent = '⚡';
            setTimeout(() => {
                moodIndicator.textContent = '🔮';
            }, 200);

            // Анализируем текст сообщения
            const text = currentMessage.toLowerCase();
            
            // Определяем настроение на основе ключевых слов
            let mood = '';
            let emoji = '';
            let tag = '';

            if (text.includes('еб') || text.includes('хуй') || text.includes('пизд') || text.includes('бля')) {
                mood = 'АГРЕССИВНО-МОТИВИРОВАННЫЙ';
                emoji = '🤬🔥';
                tag = '#порву_всех';
            } else if (text.includes('кот') || text.includes('мем') || text.includes('смеш')) {
                mood = 'МЕМНО-ПОЗИТИВНЫЙ';
                emoji = '😸🎭';
                tag = '#кек';
            } else if (text.includes('устал') || text.includes('лень') || text.includes('спать')) {
                mood = 'ФИЛОСОФСКИ-УСТАЛЫЙ';
                emoji = '😴🧠';
                tag = '#подумаю_завтра';
            } else if (text.includes('мечт') || text.includes('цель') || text.includes('успех')) {
                mood = 'ЦЕЛЕУСТРЕМЛЁННЫЙ';
                emoji = '🎯🚀';
                tag = '#всё_получится';
            } else if (text.includes('сил') || text.includes('энерг') || text.includes('огонь')) {
                mood = 'ЭНЕРГИЧНЫЙ';
                emoji = '⚡💪';
                tag = '#полный_заряд';
            } else if (text.includes('жизн') || text.includes('счаст') || text.includes('любов')) {
                mood = 'ГАРМОНИЧНЫЙ';
                emoji = '☮️🕊️';
                tag = '#дзен';
            } else if (text.includes('страх') || text.includes('боишь')) {
                mood = 'ПРЕОДОЛЕВАЮЩИЙ';
                emoji = '🦁✨';
                tag = '#не_боюсь';
            } else if (text.includes('герой') || text.includes('побед')) {
                mood = 'ГЕРОИЧЕСКИЙ';
                emoji = '🦸🏆';
                tag = '#я_легенда';
            } else {
                // Рандомное настроение, если ничего не подошло
                const randomMoods = [
                    { mood: 'ЗАГАДОЧНЫЙ', emoji: '🔮✨', tag: '#мистика' },
                    { mood: 'КОСМИЧЕСКИЙ', emoji: '🚀🌌', tag: '#галактика' },
                    { mood: 'ПРОСВЕТЛЁННЫЙ', emoji: '🧘‍♂️🌟', tag: '#просветление' },
                    { mood: 'БУНТАРСКИЙ', emoji: '🤘⚡', tag: '#рок_н_ролл' },
                    { mood: 'ФИЛОСОФСКИЙ', emoji: '🤔📚', tag: '#мысли_вслух' }
                ];
                const random = randomMoods[Math.floor(Math.random() * randomMoods.length)];
                mood = random.mood;
                emoji = random.emoji;
                tag = random.tag;
            }

            // Добавляем немного случайности для разнообразия
            const intensifiers = ['', '🔥', '💯', '⚡', '✨'];
            const randomIntensifier = intensifiers[Math.floor(Math.random() * intensifiers.length)];

            // Обновляем результат с анимацией
            moodResult.innerHTML = `
                <span class="mood-emoji">${emoji}</span>
                <span>${mood} ${randomIntensifier}</span>
            `;
            
            // Обновляем тег
            moodTime.textContent = tag;

            // Показываем уведомление
            showToast(`🔮 Твоё настроение: ${mood}`);

            // Добавляем случайный цветной эффект
            const hue = Math.random() * 360;
            moodIndicator.style.animation = 'spin 0.5s linear';
            setTimeout(() => {
                moodIndicator.style.animation = 'spin 10s infinite linear';
            }, 500);
        };

        // Смена темы с сохранением
        window.setTheme = function(theme) {
            document.querySelectorAll('.theme-option').forEach(option => {
                option.classList.remove('active');
            });
            
            const activeOption = document.querySelector(`.theme-option[data-theme="${theme}"]`);
            if (activeOption) {
                activeOption.classList.add('active');
            }
            
            oracle.classList.remove('theme-cyberpunk', 'theme-picmi', 'theme-dark', 'theme-ocean');
            oracle.classList.add(`theme-${theme}`);
            
            body.classList.remove('theme-cyberpunk-bg', 'theme-picmi-bg', 'theme-dark-bg', 'theme-ocean-bg');
            body.classList.add(`theme-${theme}-bg`);
            
            localStorage.setItem('selectedTheme', theme);
        };

        // Загрузка сохранённой темы
        function loadSavedTheme() {
            const savedTheme = localStorage.getItem('selectedTheme');
            if (savedTheme) {
                setTheme(savedTheme);
            } else {
                setTheme('cyberpunk');
            }
        }

        // Создание частиц
        function createParticles() {
            const particlesCount = 40;
            for (let i = 0; i < particlesCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.animationDuration = (5 + Math.random() * 10) + 's';
                document.body.appendChild(particle);
            }
        }

        // Добавляем стиль для частиц
        const style = document.createElement('style');
        style.textContent = `
            @keyframes floatParticle {
                0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
                25% { transform: translate(30px, -30px) scale(1.2); opacity: 0.6; }
                50% { transform: translate(-20px, 20px) scale(0.8); opacity: 0.4; }
                75% { transform: translate(20px, 20px) scale(1.1); opacity: 0.5; }
                100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            }
            .particle {
                animation: floatParticle var(--duration) infinite alternate;
            }
        `;
        document.head.appendChild(style);

        // Инициализация
        function init() {
            if (!canShowToday() && lastMessageDate && viewedMessages.length > 0) {
                messageText.textContent = viewedMessages[viewedMessages.length - 1];
                currentMessage = viewedMessages[viewedMessages.length - 1];
                getMessageBtn.disabled = true;
                showToast('📅 Сегодня уже смотрели');
            }
            updateStats();
            loadSavedTheme();
            createParticles();
        }
        
        init();
    </script>
</body>
</html>
