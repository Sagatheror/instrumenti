<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Comic+Neue:wght@400;700&family=Rubik+Glitch&family=Roboto:wght@300;400;700&family=Playfair+Display:wght@700&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.5s ease, color 0.3s ease, border-color 0.5s ease, box-shadow 0.5s ease;
        }

        body {
            min-height: 100vh;
            font-family: 'Roboto', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            margin: 0;
            position: relative;
            overflow-x: hidden;
        }

        /* ========== ОБЩИЕ СТИЛИ ========== */
        .theme-switch {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            padding: 10px 15px;
            border-radius: 60px;
            z-index: 1000;
            backdrop-filter: blur(10px);
            flex-wrap: wrap;
            justify-content: center;
            max-width: 95%;
        }

        .theme-btn {
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            white-space: nowrap;
        }

        .theme-btn:hover {
            transform: scale(1.05);
        }

        .card-wrapper {
            width: 100%;
            max-width: 680px;
            z-index: 30;
            margin-top: 100px;
        }

        .flip-card {
            display: block;
            width: 100%;
            aspect-ratio: 3 / 4;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease, filter 0.3s ease;
            border-radius: 40px;
        }

        .flip-card:hover {
            transform: scale(1.02) translateY(-8px);
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 1s cubic-bezier(0.25, 1.2, 0.5, 1);
            transform-style: preserve-3d;
            border-radius: 40px;
        }

        .flip-card:hover .flip-card-inner {
            transform: rotateY(180deg) scale(0.97);
        }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            border-radius: 20px;
        }

        .flip-card-back {
            transform: rotateY(180deg);
        }

        .bg-emoji {
            position: absolute;
            font-size: 5rem;
            opacity: 0.15;
            user-select: none;
            pointer-events: none;
            z-index: 0;
            animation: float 20s infinite alternate ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(30px, -20px) rotate(15deg) scale(1.2); }
        }

        .daily-message {
            margin-top: 40px;
            text-align: center;
            max-width: 700px;
            z-index: 25;
            transition: all 0.3s ease;
        }

        .stats-badge {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 12px 20px;
            z-index: 50;
            transition: all 0.3s ease;
        }

        .footer-left {
            position: fixed;
            bottom: 18px;
            left: 26px;
            padding: 12px 25px;
            z-index: 40;
            transition: all 0.3s ease;
        }

        footer {
            display: none;
            position: fixed;
            bottom: 18px;
            right: 26px;
            padding: 12px 25px;
            z-index: 40;
            transition: all 0.3s ease;
        }

        #messageText, #emojiDeco {
            transition: opacity 0.5s ease;
            width: 100%;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid currentColor;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== ТЕМА 1: CYBERPUNK ========== */
        body.cyberpunk {
            background: #0a0c0f;
            background-image: 
                linear-gradient(45deg, #00ff4110 0px, #00ff4110 2px, transparent 2px, transparent 8px),
                linear-gradient(135deg, #ff00c810 0px, #ff00c810 2px, transparent 2px, transparent 8px);
            background-size: 30px 30px;
            color: #00ffaa;
        }

        body.cyberpunk .theme-switch {
            background: #14181f;
            border: 3px solid #00ffaa;
            box-shadow: 0 0 20px #00ffaa, inset 0 0 10px #00ffaa33;
        }

        body.cyberpunk .theme-btn {
            background: #1a1f2a;
            color: #00ffaa;
            border: 2px solid #ff00c8;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            text-transform: uppercase;
            text-shadow: 0 0 5px #00ffaa;
        }

        body.cyberpunk .theme-btn.active {
            background: #00ffaa;
            color: #0a0c0f;
            border-color: #ff00c8;
            box-shadow: 0 0 20px #00ffaa;
        }

        body.cyberpunk .flip-card {
            filter: drop-shadow(0 0 15px #00ffaa) drop-shadow(0 0 30px #ff00c8);
        }

        body.cyberpunk .flip-card-inner {
            box-shadow: 0 0 0 4px #00ffaa, 0 0 0 8px #ff00c8, 0 20px 40px black;
        }

        body.cyberpunk .flip-card-front {
            background: #0f1219;
            background-image: 
                repeating-linear-gradient(45deg, #00ffaa10 0px, #00ffaa10 4px, #ff00c810 4px, #ff00c810 8px);
            border: 4px solid #00ffaa;
            border-radius: 40px;
        }

        body.cyberpunk .flip-card-back {
            background: #10141c;
            background-image: 
                radial-gradient(circle at 30% 50%, #00ffaa20 0%, transparent 50%),
                radial-gradient(circle at 70% 50%, #ff00c820 0%, transparent 50%);
            border: 4px solid #ff00c8;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            line-height: 1.6;
            color: #00ffaa;
            text-shadow: 2px 2px 0 #ff00c8;
            border-radius: 40px;
        }

        body.cyberpunk .message {
            font-family: 'Rubik Glitch', cursive;
            font-size: clamp(1.8rem, 8vw, 3rem);
            color: #00ffaa;
            text-shadow: 
                3px 3px 0 #ff00c8,
                6px 6px 0 #0a0c0f,
                0 0 20px #00ffaa;
            letter-spacing: 4px;
            margin-bottom: 1rem;
            padding: 1rem;
        }

        body.cyberpunk .emoji-deco {
            font-size: 3.5rem;
            filter: drop-shadow(0 0 15px #00ffaa) drop-shadow(0 0 30px #ff00c8);
            background: #0f1219;
            border: 3px solid #00ffaa;
            border-radius: 0;
            padding: 1rem 2rem;
            clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
        }

        body.cyberpunk .daily-message {
            background: #0f1219;
            border: 3px solid #00ffaa;
            color: #00ffaa;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            padding: 1.5rem 2rem;
            text-transform: uppercase;
            box-shadow: 0 0 30px #ff00c8, inset 0 0 20px #00ffaa33;
            clip-path: polygon(0 0, 100% 0, 98% 100%, 2% 100%);
        }

        body.cyberpunk .stats-badge,
        body.cyberpunk .footer-left,
        body.cyberpunk footer {
            background: #0f1219;
            border: 3px solid #ff00c8;
            color: #00ffaa;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            text-shadow: 0 0 5px #00ffaa;
            box-shadow: 0 0 20px #00ffaa;
        }

        /* ========== ТЕМА 2: ПИКМИ ========== */
        body.pikmi {
            background: linear-gradient(135deg, #ffd1e6 0%, #ffe6b3 50%, #c4e6ff 100%);
            background-attachment: fixed;
            color: #8b5f8b;
        }

        body.pikmi .theme-switch {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 4px solid #ffb3c6;
            box-shadow: 0 10px 30px rgba(255, 150, 200, 0.3);
            border-radius: 60px;
        }

        body.pikmi .theme-btn {
            background: white;
            color: #ff8cb0;
            border: 3px solid #ffb3c6;
            font-family: 'Comic Neue', cursive;
            font-weight: 700;
            font-size: 16px;
            border-radius: 40px;
            box-shadow: 0 5px 0 #ff8cb0;
        }

        body.pikmi .theme-btn.active {
            background: #ff8cb0;
            color: white;
            border-color: #ff5c8d;
            transform: translateY(2px);
            box-shadow: 0 3px 0 #ff5c8d;
        }

        body.pikmi .flip-card {
            filter: drop-shadow(0 15px 25px rgba(255, 140, 180, 0.4));
        }

        body.pikmi .flip-card-inner {
            box-shadow: 0 20px 40px rgba(255, 140, 180, 0.3), 0 0 0 8px white, 0 0 0 12px #ffb3c6;
            border-radius: 70px;
        }

        body.pikmi .flip-card-front {
            background: #fff5e6;
            background-image: 
                repeating-linear-gradient(45deg, #ffd9e6 0px, #ffd9e6 8px, #ffe6f0 8px, #ffe6f0 16px);
            border: 8px solid #ffb3c6;
            border-radius: 60px;
        }

        body.pikmi .flip-card-back {
            background: #fff9f0;
            background-image: 
                radial-gradient(circle at 20% 30%, #ffe6f0 10%, transparent 30%),
                radial-gradient(circle at 80% 70%, #ffe0e6 10%, transparent 30%);
            border: 8px solid #ffc1d4;
            border-radius: 60px;
            font-family: 'Comic Neue', cursive;
            color: #7a4d7a;
        }

        body.pikmi .message {
            font-family: 'Comic Neue', cursive;
            font-weight: 700;
            font-size: clamp(2.4rem, 9vw, 3.8rem);
            color: #a555a5;
            text-shadow: 4px 4px 0 #ffb3c6, 6px 6px 0 white;
            margin-bottom: 1rem;
            padding: 0.5rem;
        }

        body.pikmi .emoji-deco {
            font-size: 4.5rem;
            filter: drop-shadow(0 8px 12px #ff8cb0);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            border: 5px solid #ffb3c6;
            border-radius: 100px;
            padding: 1rem 2.5rem;
            box-shadow: 0 10px 0 #ff8cb0;
        }

        body.pikmi .daily-message {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 5px solid #ffb3c6;
            border-radius: 80px;
            color: #b36bb3;
            font-family: 'Comic Neue', cursive;
            font-weight: 700;
            font-size: 1.3rem;
            padding: 1.2rem 2.5rem;
            box-shadow: 0 10px 0 #ff8cb0, 0 20px 30px rgba(255, 140, 180, 0.3);
        }

        body.pikmi .stats-badge,
        body.pikmi .footer-left,
        body.pikmi footer {
            background: white;
            border: 4px solid #ffb3c6;
            border-radius: 60px;
            color: #ff8cb0;
            font-family: 'Comic Neue', cursive;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 0 5px 0 #ff8cb0;
        }

        /* ========== ТЕМА 3: WATCH DOGS ========== */
        body.watchdogs {
            background: #1a1e24;
            background-image: 
                linear-gradient(rgba(0, 255, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 0, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #00ff9d;
            font-family: 'Roboto', monospace;
        }

        body.watchdogs .theme-switch {
            background: #0f1319;
            border: 2px solid #00ff9d;
            box-shadow: 0 0 20px #00ff9d33;
        }

        body.watchdogs .theme-btn {
            background: #1a212a;
            color: #00ff9d;
            border: 2px solid #00cc88;
            font-family: 'Roboto', monospace;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 12px;
        }

        body.watchdogs .theme-btn.active {
            background: #00ff9d;
            color: #0a0f14;
            border-color: #00ff9d;
            box-shadow: 0 0 20px #00ff9d;
        }

        body.watchdogs .flip-card {
            filter: drop-shadow(0 0 20px #00ff9d33);
        }

        body.watchdogs .flip-card-inner {
            box-shadow: 0 0 0 3px #00ff9d, 0 0 0 6px #0f1319, 0 0 0 9px #00cc88;
            border-radius: 20px;
        }

        body.watchdogs .flip-card-front {
            background: #0f1319;
            background-image: 
                repeating-linear-gradient(0deg, #00ff9d10 0px, #00ff9d10 2px, transparent 2px, transparent 8px),
                repeating-linear-gradient(90deg, #00ff9d10 0px, #00ff9d10 2px, transparent 2px, transparent 8px);
            border: 2px solid #00ff9d;
        }

        body.watchdogs .flip-card-back {
            background: #0c1016;
            background-image: 
                radial-gradient(circle at 30% 40%, #00ff9d15 0%, transparent 40%),
                radial-gradient(circle at 70% 60%, #00ff9d15 0%, transparent 40%);
            border: 2px solid #00cc88;
            font-family: 'Roboto', monospace;
            color: #b0ffd0;
            text-shadow: 0 0 5px #00ff9d;
        }

        body.watchdogs .message {
            font-family: 'Roboto', monospace;
            font-weight: 700;
            font-size: clamp(2rem, 8vw, 3.5rem);
            color: #00ff9d;
            text-shadow: 
                0 0 10px #00ff9d,
                0 0 20px #00cc88;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            text-transform: uppercase;
            border-bottom: 2px solid #00ff9d33;
            padding-bottom: 1rem;
        }

        body.watchdogs .emoji-deco {
            font-size: 4rem;
            filter: drop-shadow(0 0 10px #00ff9d);
            background: #0f1319;
            border: 2px solid #00ff9d;
            padding: 1rem 2rem;
            font-family: 'Roboto', monospace;
        }

        body.watchdogs .daily-message {
            background: #0f1319;
            border: 2px solid #00ff9d;
            color: #00ff9d;
            font-family: 'Roboto', monospace;
            font-size: 1rem;
            padding: 1.2rem 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 30px #00ff9d33, inset 0 0 20px #00ff9d22;
        }

        body.watchdogs .stats-badge,
        body.watchdogs .footer-left,
        body.watchdogs footer {
            background: #0f1319;
            border: 2px solid #00ff9d;
            color: #00ff9d;
            font-family: 'Roboto', monospace;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 15px #00ff9d66;
        }

        body.watchdogs .bg-emoji {
            filter: drop-shadow(0 0 10px #00ff9d);
            opacity: 0.2;
        }

        /* ========== ТЕМА 4: МИНИМАЛИЗМ ========== */
        body.minimal {
            background: #f5f5f5;
            background-image: linear-gradient(#e0e0e0 1px, transparent 1px);
            background-size: 100% 40px;
            color: #333333;
        }

        body.minimal .theme-switch {
            background: #ffffff;
            border: 2px solid #cccccc;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        body.minimal .theme-btn {
            background: transparent;
            color: #666666;
            border: 2px solid #dddddd;
            font-family: 'Roboto', sans-serif;
            font-weight: 300;
            font-size: 14px;
            letter-spacing: 1px;
        }

        body.minimal .theme-btn.active {
            background: #333333;
            color: #ffffff;
            border-color: #333333;
        }

        body.minimal .flip-card {
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        body.minimal .flip-card-inner {
            box-shadow: 0 10px 30px rgba(0,0,0,0.05), 0 0 0 2px #333333;
            border-radius: 30px;
        }

        body.minimal .flip-card-front {
            background: #ffffff;
            border: 1px solid #eeeeee;
            border-radius: 30px;
        }

        body.minimal .flip-card-back {
            background: #ffffff;
            border: 1px solid #333333;
            font-family: 'Roboto', sans-serif;
            color: #333333;
            border-radius: 30px;
        }

        body.minimal .message {
            font-family: 'Roboto', sans-serif;
            font-weight: 300;
            font-size: clamp(2.5rem, 9vw, 4rem);
            color: #333333;
            letter-spacing: -1px;
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        body.minimal .emoji-deco {
            font-size: 4rem;
            background: #fafafa;
            border: 1px solid #e0e0e0;
            padding: 1rem 2rem;
            color: #666666;
        }

        body.minimal .daily-message {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            color: #666666;
            font-family: 'Roboto', sans-serif;
            font-weight: 300;
            font-size: 1.2rem;
            padding: 1.2rem 2.5rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }

        body.minimal .stats-badge,
        body.minimal .footer-left,
        body.minimal footer {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            color: #666666;
            font-family: 'Roboto', sans-serif;
            font-weight: 300;
            font-size: 0.9rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        body.minimal .bg-emoji {
            opacity: 0.1;
            filter: grayscale(100%);
        }

        /* ========== ТЕМА 5: ВИНТАЖ ========== */
        body.vintage {
            background: #e8d9c0;
            background-image: 
                repeating-linear-gradient(45deg, #d4bc9a22 0px, #d4bc9a22 20px, #c9ad8222 20px, #c9ad8222 40px);
            color: #5d3a1a;
        }

        body.vintage .theme-switch {
            background: #f2e3ce;
            border: 4px solid #b48c5c;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-radius: 40px 40px 40px 40px;
        }

        body.vintage .theme-btn {
            background: #f2e3ce;
            color: #7b4f2e;
            border: 3px solid #b48c5c;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 16px;
            border-radius: 30px;
            box-shadow: inset 0 -3px 0 #8b6b41;
        }

        body.vintage .theme-btn.active {
            background: #b48c5c;
            color: #f2e3ce;
            border-color: #5d3a1a;
            box-shadow: inset 0 -2px 0 #3f2b14;
        }

        body.vintage .flip-card {
            filter: drop-shadow(0 15px 20px rgba(93, 58, 26, 0.3));
        }

        body.vintage .flip-card-inner {
            box-shadow: 0 20px 30px rgba(0,0,0,0.2), 0 0 0 8px #d4b28c, 0 0 0 12px #b48c5c;
            border-radius: 40px 40px 40px 40px;
        }

        body.vintage .flip-card-front {
            background: #f2e3ce;
            background-image: 
                repeating-linear-gradient(45deg, #e2cdb0 0px, #e2cdb0 4px, #ecdbbc 4px, #ecdbbc 8px);
            border: 4px solid #b48c5c;
            border-radius: 30px;
        }

        body.vintage .flip-card-back {
            background: #faf0e1;
            background-image: 
                radial-gradient(circle at 30% 40%, #e2cdb0 5%, transparent 30%),
                radial-gradient(circle at 70% 60%, #d4b28c 5%, transparent 30%);
            border: 4px solid #d4b28c;
            border-radius: 30px;
            font-family: 'Playfair Display', serif;
            color: #5d3a1a;
        }

        body.vintage .message {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: clamp(2.2rem, 9vw, 3.5rem);
            color: #5d3a1a;
            text-shadow: 2px 2px 0 #d4b28c;
            margin-bottom: 1rem;
            padding: 0.5rem;
            font-style: italic;
        }

        body.vintage .emoji-deco {
            font-size: 4rem;
            background: #f2e3ce;
            border: 3px solid #b48c5c;
            border-radius: 100px;
            padding: 1rem 2rem;
            box-shadow: inset 0 -5px 0 #8b6b41;
            font-family: 'Playfair Display', serif;
        }

        body.vintage .daily-message {
            background: #f2e3ce;
            border: 4px solid #b48c5c;
            border-radius: 60px;
            color: #5d3a1a;
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            font-size: 1.2rem;
            padding: 1.2rem 2.5rem;
            box-shadow: inset 0 -5px 0 #8b6b41, 0 10px 20px rgba(0,0,0,0.1);
        }

        body.vintage .stats-badge,
        body.vintage .footer-left,
        body.vintage footer {
            background: #f2e3ce;
            border: 3px solid #b48c5c;
            border-radius: 40px;
            color: #5d3a1a;
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            font-size: 1rem;
            box-shadow: inset 0 -3px 0 #8b6b41, 0 5px 10px rgba(0,0,0,0.1);
        }

        body.vintage .bg-emoji {
            filter: sepia(100%) saturate(300%);
            opacity: 0.15;
        }
        /* ========== ТЕМА 6: ОБЫЧНЫЙ ========== */
body.ordinary {
    background: #f0e6d8;
    background-image: radial-gradient(circle at 10% 20%, rgba(180, 148, 106, 0.1) 0%, transparent 30%);
    color: #2c1e12;
    font-family: 'Segoe UI', 'Roboto', sans-serif;
}

body.ordinary .theme-switch {
    background: #e8d9c4;
    border: 4px solid #b4946a;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    border-radius: 50px;
}

body.ordinary .theme-btn {
    background: #f5e7d3;
    color: #5f4632;
    border: 3px solid #b4946a;

                const stored = localStorage.getItem(STORAGE_INDEX_KEY);
                return stored ? parseInt(stored, 10) : null;

                localStorage.setItem(STORAGE_DATE_KEY, getTodayString());

            function updateCardDisplay() {
                showLoadingState();
                
                setTimeout(() => {
                    const today = getTodayString();
                    const storedDate = getStoredDate();
                    const storedIndex = getStoredIndex();

                    let cardIndex;
                    let isNewDay = (storedDate !== today);

                    if (!isNewDay && storedIndex !== null && storedIndex >= 0 && storedIndex < finalCards.length) {
                        cardIndex = storedIndex;
                        dailyMsgDiv.innerHTML = '🌙 Та же карта, новый взгляд';
                    } else {
                        cardIndex = Math.floor(Math.random() * finalCards.length);
                        saveTodayIndex(cardIndex);
                        dailyMsgDiv.innerHTML = getThemeMessage();
                    }

                    const card = finalCards[cardIndex] || { msg: 'Ты крут!', emoji: '😎✨' };
                    
                    msgDiv.style.opacity = '0';
                    emojiDiv.style.opacity = '0';
                    
                    setTimeout(() => {
                        msgDiv.innerText = card.msg;
                        emojiDiv.innerText = card.emoji;
                        msgDiv.style.opacity = '1';
                        emojiDiv.style.opacity = '1';
                    }, 300);
                }, 500);
            }

            // Проверка нового дня
            function checkForNewDay() {
                const today = getTodayString();
                if (localStorage.getItem(STORAGE_DATE_KEY) !== today) {
                    updateCardDisplay();
                }
            }

            // Инициализация
            updateCardDisplay();
            setInterval(checkForNewDay, 60000);

            // Скрытое обновление (Ctrl+R)
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'r') {
                    e.preventDefault();
                    localStorage.removeItem(STORAGE_DATE_KEY);
                    localStorage.removeItem(STORAGE_INDEX_KEY);
                    updateCardDisplay();
                }
            });
