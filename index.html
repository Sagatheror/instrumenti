<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Центр инструментов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #05050F;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            color: #EFF6FF;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .ambient-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(circle at 50% 50%, rgba(45,212,191,0.08) 0%, transparent 70%),
                        radial-gradient(circle at 80% 20%, rgba(139,92,246,0.06) 0%, transparent 60%);
            animation: ambientPulse 12s ease-in-out infinite alternate;
        }

        @keyframes ambientPulse {
            0% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .nexus-container {
            position: relative;
            z-index: 5;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .holo-header {
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            background: rgba(5, 5, 15, 0.3);
            border-bottom: 1px solid rgba(45, 212, 191, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.05);
            z-index: 20;
            position: relative;
        }

        .brand {
            display: flex;
            align-items: baseline;
            gap: 0.8rem;
        }

        .brand-glow {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #FFFFFF, #7DD3FC, #2DD4BF, #38BDF8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(45, 212, 191, 0.4);
            animation: textPulse 3s ease-in-out infinite;
        }

        @keyframes textPulse {
            0%, 100% { opacity: 0.9; text-shadow: 0 0 20px rgba(45,212,191,0.3); }
            50% { opacity: 1; text-shadow: 0 0 35px rgba(45,212,191,0.6); }
        }

        .brand-badge {
            font-size: 0.7rem;
            background: rgba(45, 212, 191, 0.15);
            border: 1px solid rgba(45, 212, 191, 0.5);
            border-radius: 40px;
            padding: 0.2rem 0.8rem;
            font-weight: 500;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
            position: relative;
            overflow: hidden;
        }

        .brand-badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(45,212,191,0.3), transparent);
            animation: shine 4s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20%, 100% { left: 100%; }
        }

        .status-pulse {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 60px;
            padding: 0.4rem 1.2rem;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(45, 212, 191, 0.3);
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background: #2DD4BF;
            border-radius: 50%;
            box-shadow: 0 0 12px #2DD4BF;
            animation: pulse-anim 2s infinite;
        }

        .pulse-text {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 1px;
            color: #A5F3FC;
        }

        @keyframes pulse-anim {
            0% { opacity: 0.4; transform: scale(0.8); box-shadow: 0 0 0 0 rgba(45,212,191,0.7);}
            100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 0 8px rgba(45,212,191,0);}
        }

        .orbit-stage {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 1rem;
        }

        .core-view {
            width: 85%;
            max-width: 1300px;
            height: 85%;
            background: rgba(8, 12, 25, 0.45);
            backdrop-filter: blur(24px);
            border-radius: 48px;
            border: 1px solid rgba(45, 212, 191, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 
                        0 0 0 1px rgba(45,212,191,0.1) inset,
                        0 0 40px rgba(45,212,191,0.1);
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            overflow: hidden;
            z-index: 15;
        }

        .core-view::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, rgba(45,212,191,0.2), transparent, rgba(139,92,246,0.2));
            border-radius: 50px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .core-view:hover::before {
            opacity: 1;
        }

        .frame-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: 48px;
            overflow: hidden;
        }

        .content-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #0A0A18;
            transition: opacity 0.3s ease;
        }

        .welcome-nebula {
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 30%, rgba(45,212,191,0.08), rgba(5,5,15,0.95));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow-y: auto;
        }

        .quantum-title {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 800;
            background: linear-gradient(135deg, #F0F9FF, #5EEAD4, #38BDF8, #818CF8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
            animation: titleWave 3s ease-in-out infinite;
        }

        @keyframes titleWave {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .quantum-desc {
            font-size: 1.1rem;
            max-width: 550px;
            color: #CBD5E1;
            margin-bottom: 2rem;
            backdrop-filter: blur(4px);
        }

        .orbital-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.2rem;
            margin-top: 2rem;
            max-width: 800px;
        }

        .neuro-card {
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(45,212,191,0.3);
            border-radius: 32px;
            padding: 0.9rem 1.6rem;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 1, 0.3, 1);
            box-shadow: 0 0 15px rgba(45,212,191,0);
            position: relative;
            overflow: hidden;
        }

        .neuro-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(45,212,191,0.2), transparent);
            transition: left 0.5s;
        }

        .neuro-card:hover::before {
            left: 100%;
        }

        .neuro-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: #2DD4BF;
            box-shadow: 0 0 30px rgba(45,212,191,0.4);
            background: rgba(30, 45, 80, 0.8);
        }

        .neuro-icon {
            font-size: 1.7rem;
            filter: drop-shadow(0 0 8px rgba(45,212,191,0.5));
            transition: 0.3s;
        }

        .neuro-card:hover .neuro-icon {
            transform: scale(1.1);
        }

        .ring-nav {
            position: fixed;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            z-index: 30;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(20px);
            padding: 1.2rem 0.8rem;
            border-radius: 100px;
            border: 1px solid rgba(45, 212, 191, 0.4);
            transition: all 0.4s;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .ring-nav::before {
            content: '';
            position: absolute;
            inset: -1px;
            background: linear-gradient(135deg, rgba(45,212,191,0.3), transparent);
            border-radius: 100px;
            z-index: -1;
            opacity: 0.5;
        }

        .ring-item {
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
            background: rgba(10, 15, 30, 0.7);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
            border: 1px solid rgba(45,212,191,0.2);
            position: relative;
        }

        .ring-item i {
            font-size: 1.5rem;
            color: #94A3B8;
            transition: 0.2s;
        }

        .ring-item.active {
            background: linear-gradient(145deg, #2DD4BF20, #0F172A);
            border-color: #2DD4BF;
            box-shadow: 0 0 25px #2DD4BF, inset 0 0 15px rgba(45,212,191,0.3);
            transform: scale(1.12);
        }

        .ring-item.active i {
            color: #2DD4BF;
            text-shadow: 0 0 12px rgba(45,212,191,0.8);
        }

        .ring-item:hover {
            transform: scale(1.08);
            border-color: #5EEAD4;
            background: rgba(30, 50, 80, 0.8);
        }

        .ring-tooltip {
            position: absolute;
            right: 72px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.75rem;
            white-space: nowrap;
            font-weight: 600;
            letter-spacing: 0.5px;
            pointer-events: none;
            opacity: 0;
            transition: 0.25s;
            border: 1px solid rgba(45,212,191,0.5);
            color: #A5F3FC;
        }

        .ring-item:hover .ring-tooltip {
            opacity: 1;
            transform: translateX(-5px);
        }

        .expansion-toggle {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 40;
            width: 55px;
            height: 55px;
            border-radius: 30px;
            background: rgba(0, 20, 30, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(45,212,191,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .expansion-toggle:hover {
            background: #2DD4BF30;
            transform: scale(1.1) rotate(5deg);
            border-color: #2DD4BF;
            box-shadow: 0 0 20px rgba(45,212,191,0.4);
        }

        body.fullscreen-active .core-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            max-width: none;
            border-radius: 0;
            backdrop-filter: blur(32px);
            z-index: 1000;
        }

        body.fullscreen-active .ring-nav,
        body.fullscreen-active .holo-header,
        body.fullscreen-active .expansion-toggle {
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }

        body.fullscreen-active .exit-fs-btn {
            display: flex !important;
        }

        .exit-fs-btn {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(16px);
            border: 1px solid #2DD4BF;
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            gap: 8px;
            z-index: 1100;
            cursor: pointer;
            display: none;
            align-items: center;
            font-weight: 600;
            transition: 0.2s;
            font-size: 0.9rem;
            color: white;
        }

        .exit-fs-btn:hover {
            background: #2DD4BF20;
            transform: scale(1.02);
        }

        .loader-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border: 3px solid rgba(45,212,191,0.15);
            border-top: 3px solid #2DD4BF;
            border-right: 3px solid #38BDF8;
            border-radius: 50%;
            animation: spin 0.8s infinite linear;
            z-index: 50;
            display: none;
            box-shadow: 0 0 20px rgba(45,212,191,0.3);
        }

        @keyframes spin { 
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @media (max-width: 800px) {
            .ring-nav {
                flex-direction: row;
                bottom: 1.5rem;
                top: auto;
                right: auto;
                left: 50%;
                transform: translateX(-50%);
                border-radius: 60px;
                gap: 0.6rem;
                padding: 0.6rem 1rem;
            }
            .ring-tooltip { display: none; }
            .core-view { width: 95%; height: 80%; }
            .neuro-card { padding: 0.5rem 1rem; }
            .neuro-icon { font-size: 1.2rem; }
            .holo-header { padding: 0.8rem 1rem; }
            .brand-glow { font-size: 1.2rem; }
        }

        @media (max-width: 480px) {
            .neuro-card span { font-size: 0.8rem; }
            .orbit-stage { padding: 0.5rem; }
            .quantum-title { font-size: 1.6rem; }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0B1120; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #2DD4BF, #38BDF8); border-radius: 2px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
</head>
<body>

    <canvas id="particle-canvas"></canvas>
    <div class="ambient-glow"></div>

    <div class="nexus-container">
        <div class="holo-header">
            <div class="brand">
            </div>
            <div class="status-pulse">
                <div class="pulse-dot"></div>
                <span class="pulse-text">СИНХРОНИЗАЦИЯ</span>
            </div>
        </div>

        <div class="orbit-stage">
            <div class="core-view" id="coreView">
                <div class="frame-wrapper" id="frameWrapper">
                    <div id="welcomeScreen" class="welcome-nebula">
                        <div class="quantum-title">Центр инструментов</div>
                        <div class="quantum-desc">Используйте любой инструмент нажав на кнопки ниже или на боковой панели</div>
                        <div class="orbital-grid" id="quickAccessGrid"></div>
                    </div>
                    <iframe id="dynamicFrame" class="content-iframe" style="display: none;"></iframe>
                    <div id="globalLoader" class="loader-ring"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="ring-nav" id="ringNav"></div>
    <div class="expansion-toggle" id="fullscreenBtn">
        <i class="fas fa-expand-alt" style="font-size: 1.5rem; color: #2DD4BF;"></i>
    </div>
    <div class="exit-fs-btn" id="exitFsBtn">
        <i class="fas fa-compress"></i> <span>Выйти из полноэкранного режима</span>
    </div>

    <script>
        const MODULES = {
    welcome: { title: "ЯДРО", icon: "fas fa-atom", url: null, isWelcome: true },
    page1: { title: "ГРАФИК", icon: "fas fa-chart-line", url: "https://sagatheror.github.io/instrumenti/new-interface.html" },
    page2: { title: "ОПИСАНИЕ", icon: "fas fa-file-alt", url: "https://sagatheror.github.io/instrumenti/description-new.html" },
    page5: { title: "ЗАПЯТЫЕ 1С", icon: "fas fa-code", url: "https://sagatheror.github.io/instrumenti/zapyatie.html" },
    page6: { title: "CSV АНАЛИЗ", icon: "fas fa-chart-simple", url: "https://sagatheror.github.io/instrumenti/csvchecked.html" },
    page7: { title: "ФОРМА ОТКЛЮЧЕНИЯ", icon: "fas fa-file-signature", url: "https://sagatheror.github.io/instrumenti/formaotklyucheniya.html" },
};

        let activeModule = "welcome";
        let isFullscreen = false;

        const ringNav = document.getElementById("ringNav");
        const quickGrid = document.getElementById("quickAccessGrid");
        const welcomeDiv = document.getElementById("welcomeScreen");
        const dynamicFrame = document.getElementById("dynamicFrame");
        const loader = document.getElementById("globalLoader");
        const fullscreenBtn = document.getElementById("fullscreenBtn");
        const exitFsBtn = document.getElementById("exitFsBtn");

        function buildRingNavigation() {
            ringNav.innerHTML = "";
            const order = ["page1", "page2", "page5", "page6", "page7", "page3", "page4"];
            
            const homeItem = document.createElement("div");
            homeItem.className = "ring-item";
            if (activeModule === "welcome") homeItem.classList.add("active");
            homeItem.innerHTML = `<i class="fas fa-dharmachakra"></i><span class="ring-tooltip">ГЛАВНАЯ</span>`;
            homeItem.onclick = () => loadModule("welcome");
            ringNav.appendChild(homeItem);
            
            for (let key of order) {
                const mod = MODULES[key];
                if (!mod) continue;
                const item = document.createElement("div");
                item.className = "ring-item";
                if (activeModule === key) item.classList.add("active");
                item.innerHTML = `<i class="${mod.icon}"></i><span class="ring-tooltip">${mod.title}</span>`;
                item.onclick = () => loadModule(key);
                ringNav.appendChild(item);
            }
        }

        function buildQuickAccess() {
            quickGrid.innerHTML = "";
            const quickModules = ["page1", "page2", "page5", "page6", "page7", "page3", "page4"];
            for (let key of quickModules) {
                const mod = MODULES[key];
                if (!mod) continue;
                const card = document.createElement("div");
                card.className = "neuro-card";
                card.innerHTML = `<div class="neuro-icon"><i class="${mod.icon}"></i></div><span style="font-weight:600;">${mod.title}</span>`;
                card.onclick = () => loadModule(key);
                quickGrid.appendChild(card);
            }
        }

        function loadModule(moduleId) {
            if (activeModule === moduleId && moduleId !== "welcome") return;
            activeModule = moduleId;
            
            document.querySelectorAll(".ring-item").forEach(item => item.classList.remove("active"));
            const rings = document.querySelectorAll(".ring-item");
            if (moduleId === "welcome") {
                rings[0]?.classList.add("active");
            } else {
                const orderMap = { page1:1, page2:2, page5:3, page6:4, page7:5, page3:6, page4:7 };
                const idx = orderMap[moduleId];
                if (idx !== undefined && rings[idx]) rings[idx].classList.add("active");
            }

            if (moduleId === "welcome") {
                dynamicFrame.style.display = "none";
                welcomeDiv.style.display = "flex";
                return;
            }

            const targetModule = MODULES[moduleId];
            if (!targetModule?.url) return;

            welcomeDiv.style.display = "none";
            dynamicFrame.style.display = "block";
            loader.style.display = "block";
            dynamicFrame.style.opacity = "0.4";

            dynamicFrame.onload = () => {
                loader.style.display = "none";
                dynamicFrame.style.opacity = "1";
                dynamicFrame.style.animation = "fadeInScale 0.4s ease";
            };
            dynamicFrame.onerror = () => {
                loader.style.display = "none";
                dynamicFrame.style.opacity = "1";
                showToast("Ошибка загрузки модуля", true);
            };
            dynamicFrame.src = targetModule.url;
        }

        function showToast(msg, isError = false) {
            const toast = document.createElement("div");
            toast.innerText = msg;
            toast.style.position = "fixed";
            toast.style.bottom = "30px";
            toast.style.left = "50%";
            toast.style.transform = "translateX(-50%)";
            toast.style.background = isError ? "rgba(239,68,68,0.9)" : "rgba(15, 23, 42, 0.9)";
            toast.style.backdropFilter = "blur(16px)";
            toast.style.border = `1px solid ${isError ? "#EF4444" : "#2DD4BF"}`;
            toast.style.padding = "0.7rem 1.5rem";
            toast.style.borderRadius = "60px";
            toast.style.fontWeight = "500";
            toast.style.zIndex = "2000";
            toast.style.fontSize = "0.85rem";
            toast.style.color = "white";
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2400);
        }

        function toggleFullscreenMode() {
            if (!isFullscreen) {
                document.body.classList.add("fullscreen-active");
                isFullscreen = true;
                exitFsBtn.style.display = "flex";
            } else {
                document.body.classList.remove("fullscreen-active");
                isFullscreen = false;
                exitFsBtn.style.display = "none";
            }
        }

        function initParticleField() {
            const canvas = document.getElementById("particle-canvas");
            const ctx = canvas.getContext("2d");
            let width = window.innerWidth;
            let height = window.innerHeight;
            let particles = [];
            const PARTICLE_COUNT = 180;

            class FlowParticle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * 0.25;
                    this.vy = (Math.random() - 0.5) * 0.2;
                    this.size = Math.random() * 2 + 0.8;
                    this.alpha = Math.random() * 0.5 + 0.2;
                    this.color = `hsla(${160 + Math.random() * 40}, 70%, 60%, ${this.alpha})`;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0) this.x = width;
                    if (this.x > width) this.x = 0;
                    if (this.y < 0) this.y = height;
                    if (this.y > height) this.y = 0;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x - this.vx * 4, this.y - this.vy * 4);
                    ctx.strokeStyle = `rgba(45, 212, 191, 0.15)`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
            for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new FlowParticle());

            function drawConnections() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 90) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(45, 212, 191, ${0.06 * (1 - dist/90)})`;
                            ctx.lineWidth = 0.6;
                            ctx.stroke();
                        }
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                for (let p of particles) {
                    p.update();
                    p.draw();
                }
                drawConnections();
                requestAnimationFrame(animate);
            }
            
            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }
            
            window.addEventListener("resize", () => {
                resizeCanvas();
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new FlowParticle());
            });
            resizeCanvas();
            animate();
        }

        function addCssAnimations() {
            const styleSheet = document.createElement("style");
            styleSheet.textContent = `
                @keyframes fadeInScale {
                    0% { opacity: 0; transform: scale(0.96); }
                    100% { opacity: 1; transform: scale(1); }
                }
                .welcome-nebula {
                    animation: fadeInScale 0.6s ease-out;
                }
            `;
            document.head.appendChild(styleSheet);
        }

        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape" && isFullscreen) toggleFullscreenMode();
        });

        fullscreenBtn.onclick = toggleFullscreenMode;
        exitFsBtn.onclick = toggleFullscreenMode;

        function init() {
            buildRingNavigation();
            buildQuickAccess();
            initParticleField();
            addCssAnimations();
            loadModule("welcome");
        }

        init();
    </script>
</body>
</html>
