<script>
    const SOURCES = {
        dl: {
            name: "Деловые линии",
            url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRV2S7Q1yJQKFpyRPQOS5-m0NUEhnR_QGN7acgJuxXLenHcwOyZPe_uzUjhev4VLfZt4jCuaD1-8-Mv/pub?gid=1650468959&single=true&output=csv",
            active: true
        },
        brig: {
            name: "Бригадиры",
            url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRV2S7Q1yJQKFpyRPQOS5-m0NUEhnR_QGN7acgJuxXLenHcwOyZPe_uzUjhev4VLfZt4jCuaD1-8-Mv/pub?gid=509205910&single=true&output=csv",
            active: false
        }
    };
    let currentSourceKey = 'dl';
    let activeCharts = [];

    const empPalette = {
        "Кардашин": { primary: "#4f46e5", light: "#e0e7ff", icon: "fas fa-user-tie" },
        "Бурнос":   { primary: "#10b981", light: "#d1fae5", icon: "fas fa-user-check" },
        "Килин":    { primary: "#f59e0b", light: "#fef3c7", icon: "fas fa-user-cog" },
        "Мудров":   { primary: "#ef4444", light: "#fee2e2", icon: "fas fa-user-graduate" },
        "Алиджон":  { primary: "#8b5cf6", light: "#ede9fe", icon: "fas fa-user-friends" }
    };

    function parseCSV(text) {
        const rows = text.split(/\r?\n/);
        return rows.map(row => {
            let inQuote = false;
            let cell = '';
            const out = [];
            for (let ch of row) {
                if (ch === '"') { inQuote = !inQuote; }
                else if (ch === ',' && !inQuote) {
                    out.push(cell.trim());
                    cell = '';
                } else { cell += ch; }
            }
            out.push(cell.trim());
            return out;
        });
    }

    function destroyCharts() {
        activeCharts.forEach(ch => { if (ch && typeof ch.destroy === 'function') ch.destroy(); });
        activeCharts = [];
    }

    function formatMoney(val) { return Number(val).toLocaleString('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

    function extractShortAccount(full) {
        if (!full) return '';
        const match = full.match(/SCHETA-?\s*(\d+)/i);
        if (match) return `SCHETA-${match[1]}`;
        const num = full.match(/\d{4,}/);
        if (num) return `Счет ${num[0]}`;
        return full.length > 22 ? full.slice(0,20)+'...' : full;
    }

    function renderDL(dataRows) {
        let depositCell = (dataRows[0] && dataRows[0][5]) ? dataRows[0][5] : '—';
        let balanceCell = (dataRows[251] && dataRows[251][2]) ? dataRows[251][2] : '—';
        const accountsRaw = [];
        for (let i = 1; i < Math.min(dataRows.length, 250); i++) {
            const row = dataRows[i];
            if (row && row.length >= 3 && (row[0] || row[1] || row[2])) {
                accountsRaw.push({ account: row[0]||'', date: row[1]||'', amount: row[2]||'' });
            }
        }
        let totalSum = 0;
        accountsRaw.forEach(a => { const n = parseFloat(a.amount.replace(/[^\d.-]/g, '')) || 0; totalSum += n; });
        const kpis = [
            { title: "Депозит", value: depositCell, icon: "fa-piggy-bank", cls: "" },
            { title: "Остаток на счете", value: balanceCell, icon: "fa-wallet", cls: "" },
            { title: "Сумма счетов", value: formatMoney(totalSum), icon: "fa-file-invoice-dollar", cls: "" },
            { title: "Кол-во счетов", value: accountsRaw.length, icon: "fa-receipt", cls: "" }
        ];

        let kpiHtml = `<div class="kpi-grid">` + kpis.map(k => `
            <div class="kpi-card">
                <div class="kpi-title"><i class="fas ${k.icon}"></i> ${k.title}</div>
