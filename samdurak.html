<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дурак - Карточная игра</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --surface2: #0f3460;
            --gold: #d4a574;
            --gold2: #e8c9a0;
            --red: #e74c3c;
            --green: #2ecc71;
            --blue: #3498db;
            --text: #e0d5c1;
            --text2: #b8a890;
            --card-w: 80px;
            --card-h: 115px;
            --card-radius: 10px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a3e 0%, #0a0a18 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* LOADER */
        #loader-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #0a0a14;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 0.5s, visibility 0.5s;
        }
        #loader-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #ffffff15;
            border-top-color: #c44dff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text {
            margin-top: 20px;
            color: #c44dff;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulseText 1.5s ease-in-out infinite;
        }
        @keyframes pulseText { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        
        /* MAIN MENU */
        #main-menu {
            max-width: 520px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
            display: none;
        }
        #main-menu.active { display: block; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .game-title {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ff6b9d, #c44dff, #4dc9f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .game-subtitle { color: var(--text2); font-size: 1rem; margin-bottom: 30px; letter-spacing: 3px; }
        .menu-card {
            background: var(--surface);
            border-radius: 20px;
            padding: 30px 25px;
            box-shadow: var(--shadow);
            border: 1px solid #ffffff0a;
        }
        .input-group { margin-bottom: 18px; text-align: left; }
        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text2);
            letter-spacing: 1px;
        }
        .input-group input {
            width: 100%;
            padding: 13px 16px;
            border-radius: 12px;
            border: 2px solid #ffffff15;
            background: #0d1b36;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }
        .input-group input:focus { border-color: #c44dff; box-shadow: 0 0 20px #c44dff22; }
        .radio-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .radio-option { flex: 1; min-width: 70px; }
        .radio-option input { display: none; }
        .radio-option label {
            display: block;
            padding: 11px 14px;
            text-align: center;
            border-radius: 10px;
            border: 2px solid #ffffff15;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 0.9rem;
            background: #0d1b36;
        }
        .radio-option input:checked + label {
            border-color: #c44dff;
            background: #c44dff20;
            color: #fff;
            box-shadow: 0 0 16px #c44dff30;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            text-transform: uppercase;
            width: 100%;
            margin-top: 6px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #c44dff, #7b2ff7);
            color: #fff;
            box-shadow: 0 6px 24px #7b2ff740;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 32px #7b2ff760; }
        .btn-secondary {
            background: transparent;
            border: 2px solid #ffffff20;
            color: #fff;
        }
        .btn-secondary:hover { border-color: #c44dff; background: #c44dff10; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        
        /* LOBBY */
        #lobby-screen { max-width: 700px; margin: 0 auto; padding: 30px 20px; display: none; }
        #lobby-screen.active { display: block; animation: fadeInUp 0.4s ease; }
        .lobby-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .room-code {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: #ffffff10;
            padding: 8px 20px;
            border-radius: 12px;
            color: #4dc9f6;
        }
        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .player-slot {
            background: var(--surface);
            border-radius: 16px;
            padding: 20px 15px;
            text-align: center;
            border: 2px dashed #ffffff15;
            transition: all 0.3s;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .player-slot.filled {
            border-color: #2ecc7150;
            border-style: solid;
            background: #2ecc7108;
        }
        .player-slot .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #c44dff, #4dc9f6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
            color: #fff;
        }
        .player-slot .player-name { font-weight: 600; font-size: 0.9rem; }
        .player-slot .you-badge {
            font-size: 0.7rem;
            background: #c44dff40;
            padding: 2px 8px;
            border-radius: 8px;
            color: #c44dff;
        }
        
        /* GAME SCREEN */
        #game-screen {
            display: none;
            height: 100vh;
            flex-direction: column;
            position: relative;
        }
        #game-screen.active { display: flex; animation: fadeInUp 0.4s ease; }
        .game-top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: #00000040;
            gap: 10px;
            flex-wrap: wrap;
            z-index: 10;
        }
        .trump-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .trump-suit-icon { font-size: 1.4rem; }
        .deck-info { font-weight: 700; color: var(--text2); }
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 0;
        }
        .opponents-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 10px;
            flex-wrap: wrap;
        }
        .opponent-area { text-align: center; }
        .opponent-cards {
            display: flex;
            justify-content: center;
            gap: 3px;
            flex-wrap: wrap;
        }
        .opponent-card-back {
            width: 50px;
            height: 72px;
            background: linear-gradient(135deg, #2c3e80, #1a1a4e);
            border-radius: 6px;
            border: 2px solid #ffffff20;
            box-shadow: 0 3px 10px #00000040;
        }
        .opponent-name { font-weight: 700; font-size: 0.85rem; margin-top: 4px; }
        .opponent-status { font-size: 0.7rem; color: #ff6b9d; font-weight: 600; }
        .table-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            min-height: 150px;
            position: relative;
        }
        .table-cards {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        .table-pair {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            position: relative;
        }
        .table-card {
            width: var(--card-w);
            height: var(--card-h);
            border-radius: var(--card-radius);
            box-shadow: 0 4px 16px #00000050;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            animation: cardAppear 0.3s ease-out;
        }
        @keyframes cardAppear {
            from { transform: scale(0.5) translateY(30px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }
        .table-card.attack { border: 2px solid #ff6b6b40; }
        .table-card.defend {
            border: 2px solid #4dc9f640;
            margin-top: -30px;
            animation: defendAppear 0.3s ease-out;
        }
        @keyframes defendAppear {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .my-hand-area {
            padding: 10px 20px 15px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
            z-index: 5;
        }
        .card-in-hand {
            width: var(--card-w);
            height: var(--card-h);
            border-radius: var(--card-radius);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            box-shadow: 0 4px 12px #00000040;
            position: relative;
            border: 2px solid transparent;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.1rem;
            color: #1a1a2e;
            flex-shrink: 0;
        }
        .card-in-hand:hover {
            transform: translateY(-18px);
            box-shadow: 0 14px 28px #00000060;
            z-index: 20;
            border-color: #ffd700;
        }
        .card-in-hand.selected {
            transform: translateY(-22px);
            border-color: #ffd700 !important;
            box-shadow: 0 16px 36px #ffd70040 !important;
            z-index: 25;
        }
        .card-in-hand.playable { animation: playablePulse 1.2s ease-in-out infinite; }
        @keyframes playablePulse {
            0%, 100% { box-shadow: 0 4px 12px #00000040; }
            50% { box-shadow: 0 4px 24px #4dc9f660; }
        }
        @keyframes slideDown {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .card-suit { font-size: 1.6rem; line-height: 1; }
        .card-rank { font-size: 1.3rem; line-height: 1; }
        .card-red { color: #d32f2f; }
        .card-black { color: #1a1a2e; }
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 12px 20px;
            background: #00000040;
            flex-wrap: wrap;
            z-index: 10;
        }
        .action-btn {
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-attack {
            background: linear-gradient(135deg, #ff6b9d, #c44dff);
            color: #fff;
            box-shadow: 0 4px 16px #c44dff40;
        }
        .btn-done {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: #fff;
            box-shadow: 0 4px 16px #2ecc7140;
        }
        .btn-take {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
            box-shadow: 0 4px 16px #e74c3c40;
        }
        .btn-transfer {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: #fff;
            box-shadow: 0 4px 16px #3498db40;
        }
        .btn-disabled {
            opacity: 0.4 !important;
            cursor: not-allowed !important;
            pointer-events: none !important;
        }
        
        /* CHAT */
        .chat-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #c44dff, #7b2ff7);
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 20px #7b2ff750;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .chat-toggle:hover { transform: scale(1.1); }
        .chat-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e74c3c;
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 3px 7px;
            border-radius: 10px;
        }
        #chat-panel {
            position: fixed;
            bottom: 85px;
            right: 20px;
            width: 320px;
            max-height: 400px;
            background: var(--surface);
            border-radius: 16px;
            box-shadow: var(--shadow);
            display: none;
            flex-direction: column;
            z-index: 99;
            overflow: hidden;
        }
        #chat-panel.open { display: flex; }
        .chat-header {
            padding: 12px 16px;
            background: #0d1b36;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-msg {
            padding: 8px 12px;
            border-radius: 12px;
            max-width: 85%;
            word-wrap: break-word;
        }
        .chat-msg.mine {
            background: #c44dff20;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .chat-msg.other {
            background: #ffffff10;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .msg-sender {
            font-size: 0.7rem;
            color: #c44dff;
            font-weight: 600;
            margin-bottom: 2px;
        }
        .msg-time {
            font-size: 0.65rem;
            color: #ffffff40;
            float: right;
            margin-left: 8px;
        }
        .chat-input-row {
            display: flex;
            gap: 8px;
            padding: 10px;
            background: #0d1b36;
        }
        .emoji-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: #ffffff10;
            border: none;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
        }
        #chat-input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 10px;
            border: 2px solid #ffffff15;
            background: #1a1a2e;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }
        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, #c44dff, #7b2ff7);
            border: none;
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
        }
        .emoji-picker {
            display: none;
            padding: 10px;
            background: #0d1b36;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 150px;
            overflow-y: auto;
        }
        .emoji-picker.open { display: flex; }
        .emoji-item {
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px;
            font-size: 1.2rem;
            transition: all 0.2s;
        }
        .emoji-item:hover { background: #ffffff20; transform: scale(1.2); }
        .emoji-categories {
            display: flex;
            gap: 4px;
            padding: 6px 10px;
            flex-wrap: wrap;
            background: #0d1b36;
        }
        .emoji-cat {
            padding: 4px 10px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.75rem;
            background: #ffffff08;
            border: none;
            color: #ccc;
            transition: all 0.3s;
        }
        .emoji-cat.active { background: #c44dff40; color: #fff; }
        
        /* MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: #00000080;
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--surface);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: var(--shadow);
        }
        .modal h2 { margin-bottom: 16px; font-size: 1.5rem; }
        .modal .btn { margin-top: 16px; }
        
        /* RESPONSIVE */
        @media (max-width: 600px) {
            :root {
                --card-w: 58px;
                --card-h: 84px;
            }
            .game-title { font-size: 2rem; }
            .card-in-hand { font-size: 0.85rem; }
            .card-suit { font-size: 1.1rem; }
            .card-rank { font-size: 1rem; }
            #chat-panel {
                width: calc(100% - 40px);
                right: 20px;
                bottom: 85px;
            }
            .opponent-card-back { width: 36px; height: 52px; }
            .table-card { width: 55px; height: 80px; }
            .action-buttons { gap: 8px; padding: 10px; }
            .action-btn { padding: 10px 18px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <!-- LOADER -->
    <div id="loader-screen">
        <div class="loader-spinner"></div>
        <div class="loader-text">Загрузка...</div>
    </div>

    <!-- MAIN MENU -->
    <div id="main-menu">
        <div class="game-title"><i class="fa-solid fa-spade"></i> ДУРАК <i class="fa-solid fa-spade"></i></div>
        <div class="game-subtitle">Карточная игра</div>

        <div class="menu-card" style="margin-bottom: 20px;">
            <h3 style="margin-bottom: 15px; color: var(--gold);">
                <i class="fa-solid fa-house"></i> Доступные комнаты
            </h3>
            <div id="rooms-list" style="max-height: 200px; overflow-y: auto; margin-bottom: 15px;">
                <div style="color: var(--text2); font-size: 0.9rem;">Загрузка списка комнат...</div>
            </div>
            <button class="btn btn-secondary" onclick="refreshRoomsList()" style="margin-bottom: 10px;">
                <i class="fa-solid fa-rotate"></i> Обновить список
            </button>
        </div>

        <div class="menu-card">
            <div class="input-group">
                <label><i class="fa-solid fa-user"></i> Ваше имя</label>
                <input type="text" id="player-name" placeholder="Введите имя..." maxlength="20" autocomplete="off">
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-layer-group"></i> Колода</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" name="deckSize" value="36" id="deck36" checked>
                        <label for="deck36">36 карт</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" name="deckSize" value="52" id="deck52">
                        <label for="deck52">52 карты</label>
                    </div>
                </div>
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-bullseye"></i> Режим</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" name="gameMode" value="podkidnoy" id="modePod" checked>
                        <label for="modePod">Подкидной</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" name="gameMode" value="perevodnoy" id="modePer">
                        <label for="modePer">Переводной</label>
                    </div>
                </div>
            </div>
            <button class="btn btn-primary" onclick="createRoom()">
                <i class="fa-solid fa-gamepad"></i> Создать комнату
            </button>
            <button class="btn btn-secondary" onclick="showJoinModal()" style="margin-top: 8px;">
                <i class="fa-solid fa-link"></i> Войти по коду
            </button>
        </div>
    </div>

    <!-- LOBBY -->
    <div id="lobby-screen">
        <div class="lobby-header">
            <span style="font-weight:700;"><i class="fa-solid fa-house"></i> Лобби</span>
            <span class="room-code" id="lobby-room-code">...</span>
            <span style="color:var(--text2);font-size:0.85rem;" id="lobby-settings"></span>
        </div>
        <div class="players-grid" id="lobby-players"></div>
        <button class="btn btn-primary" id="btn-start-game" onclick="startGame()" disabled>
            <i class="fa-solid fa-hourglass-half"></i> Нужно 2-4 игрока
        </button>
        <button class="btn btn-secondary" onclick="leaveRoom()" style="margin-top:8px;">
            <i class="fa-solid fa-door-open"></i> Выйти
        </button>
    </div>

    <!-- GAME SCREEN -->
