<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дурак - Карточная игра</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/"
    }
}
</script>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --surface2: #0f3460;
            --gold: #d4a574;
            --gold2: #e8c9a0;
            --red: #e74c3c;
            --green: #2ecc71;
            --blue: #3498db;
            --text: #e0d5c1;
            --text2: #b8a890;
            --card-w: 80px;
            --card-h: 115px;
            --card-radius: 10px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            background-image: radial-gradient(ellipse at center, #1a1a3e 0%, #0a0a18 100%);
        }
        /* LOADER */
        .infinity-path-bg {
            fill: none;
            stroke: #2a2a3a;
            stroke-width: 6;
            stroke-linecap: round;
        }
        .infinity-path-snake {
            fill: none;
            stroke: url(#snakeGradient);
            stroke-width: 7;
            stroke-linecap: round;
            stroke-dasharray: 120 380;
            animation: snakeCrawl 1.8s linear infinite;
            filter: drop-shadow(0 0 14px #ff6b9d) drop-shadow(0 0 28px #c44dff);
        }
        .infinity-glow {
            fill: none;
            stroke: url(#snakeGradient);
            stroke-width: 18;
            stroke-linecap: round;
            stroke-dasharray: 80 200;
            animation: snakeCrawl 1.8s linear infinite;
            opacity: 0.35;
            filter: blur(10px);
        }
        @keyframes snakeCrawl {
            0% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: -500; }
        }
        @keyframes gradientShift {
            0%, 100% { stop-color: #ff6b9d; }
            25% { stop-color: #c44dff; }
            50% { stop-color: #4dc9f6; }
            75% { stop-color: #ffb347; }
        }
        .snake-stop1 { animation: gradientShift 3s ease-in-out infinite; }
        .snake-stop2 { animation: gradientShift 3s ease-in-out 0.75s infinite; }
        .snake-stop3 { animation: gradientShift 3s ease-in-out 1.5s infinite; }
      
        @keyframes pulseText {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        /* MAIN MENU */
        #main-menu {
            max-width: 520px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
            display: none;
        }
        #main-menu.active {
            display: block;
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .game-title {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ff6b9d, #c44dff, #4dc9f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .game-subtitle {
            color: var(--text2);
            font-size: 1rem;
            margin-bottom: 30px;
            letter-spacing: 3px;
        }
        .menu-card {
            background: var(--surface);
            border-radius: 20px;
            padding: 30px 25px;
            box-shadow: var(--shadow);
            border: 1px solid #ffffff0a;
        }
        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text2);
            letter-spacing: 1px;
        }
        .input-group input {
            width: 100%;
            padding: 13px 16px;
            border-radius: 12px;
            border: 2px solid #ffffff15;
            background: #0d1b36;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }
        .input-group input:focus {
            border-color: #c44dff;
            box-shadow: 0 0 20px #c44dff22;
        }
        .radio-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .radio-option {
            flex: 1;
            min-width: 70px;
        }
        .radio-option input { display: none; }
        .radio-option label {
            display: block;
            padding: 11px 14px;
            text-align: center;
            border-radius: 10px;
            border: 2px solid #ffffff15;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 0.9rem;
            background: #0d1b36;
        }
        .radio-option input:checked+label {
            border-color: #c44dff;
            background: #c44dff20;
            color: #fff;
            box-shadow: 0 0 16px #c44dff30;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            text-transform: uppercase;
            width: 100%;
            margin-top: 6px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #c44dff, #7b2ff7);
            color: #fff;
            box-shadow: 0 6px 24px #7b2ff740;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 32px #7b2ff760;
        }
        .btn-secondary {
            background: transparent;
            border: 2px solid #ffffff20;
            color: #fff;
        }
        .btn-secondary:hover {
            border-color: #c44dff;
            background: #c44dff10;
        }
        /* LOBBY */
        #lobby-screen {
            max-width: 700px;
            margin: 0 auto;
            padding: 30px 20px;
            display: none;
        }
        #lobby-screen.active {
            display: block;
            animation: fadeInUp 0.4s ease;
        }
        .lobby-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .room-code {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: #ffffff10;
            padding: 8px 20px;
            border-radius: 12px;
            color: #4dc9f6;
        }
        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .player-slot {
            background: var(--surface);
            border-radius: 16px;
            padding: 20px 15px;
            text-align: center;
            border: 2px dashed #ffffff15;
            transition: all 0.3s;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .player-slot.filled {
            border-color: #2ecc7150;
            border-style: solid;
            background: #2ecc7108;
        }
        .player-slot .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #c44dff, #4dc9f6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
            color: #fff;
        }
        .player-slot .player-name { font-weight: 600; font-size: 0.9rem; }
        .player-slot .you-badge {
            font-size: 0.7rem;
            background: #c44dff40;
            padding: 2px 8px;
            border-radius: 8px;
            color: #c44dff;
        }
        /* GAME SCREEN */
        #game-screen {
            display: none;
            height: 100vh;
            flex-direction: column;
            position: relative;
        }
        #game-screen.active {
            display: flex;
            animation: fadeInUp 0.4s ease;
        }
        .game-top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: #00000040;
            gap: 10px;
            flex-wrap: wrap;
            z-index: 10;
        }
        .trump-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .trump-suit-icon {
            font-size: 1.4rem;
            animation: pulseText 2s ease-in-out infinite;
        }
        .deck-info { font-weight: 700; color: var(--text2); }
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 0;
        }
        .opponents-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 10px;
            flex-wrap: wrap;
        }
        .opponent-area { text-align: center; }
        .opponent-cards {
            display: flex;
            justify-content: center;
            gap: 3px;
            flex-wrap: wrap;
        }
        .opponent-card-back {
            width: 50px;
            height: 72px;
            background: linear-gradient(135deg, #2c3e80, #1a1a4e);
            border-radius: 6px;
            border: 2px solid #ffffff20;
            box-shadow: 0 3px 10px #00000040;
            transition: transform 0.3s;
        }
        .opponent-name { font-weight: 700; font-size: 0.85rem; margin-top: 4px; }
        .opponent-status { font-size: 0.7rem; color: #ff6b9d; font-weight: 600; }
        .table-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            min-height: 150px;
            position: relative;
        }
        .table-cards {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        .table-pair {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .table-card-attack, .table-card-defend {
            width: var(--card-w);
            height: var(--card-h);
            border-radius: var(--card-radius);
            box-shadow: 0 4px 16px #00000050;
            transition: all 0.3s;
            cursor: default;
        }
        .table-card-attack { border: 2px solid #ff6b6b40; }
        .table-card-defend {
            border: 2px solid #4dc9f640;
            margin-top: -30px;
        }
        .my-hand-area {
            padding: 10px 20px 15px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
            z-index: 5;
        }
        .card-in-hand {
            width: var(--card-w);
            height: var(--card-h);
            border-radius: var(--card-radius);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            box-shadow: 0 4px 12px #00000040;
            position: relative;
            border: 2px solid transparent;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.1rem;
            color: #1a1a2e;
            flex-shrink: 0;
        }
        .card-in-hand:hover {
            transform: translateY(-18px);
            box-shadow: 0 14px 28px #00000060;
            z-index: 20;
            border-color: #ffd700;
        }
        .card-in-hand.selected {
            transform: translateY(-22px);
            border-color: #ffd700 !important;
            box-shadow: 0 16px 36px #ffd70040 !important;
            z-index: 25;
        }
        .card-in-hand.playable {
            animation: playablePulse 1.2s ease-in-out infinite;
        }
        @keyframes playablePulse {
            0%, 100% { box-shadow: 0 4px 12px #00000040; }
            50% { box-shadow: 0 4px 24px #4dc9f660; }
        }
        .card-suit { font-size: 1.6rem; line-height: 1; }
        .card-rank { font-size: 1.3rem; line-height: 1; }
        .card-red { color: #d32f2f; }
        .card-black { color: #1a1a2e; }
        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            padding: 8px 16px 16px;
            flex-wrap: wrap;
            z-index: 5;
        }
        .action-btn {
            padding: 10px 22px;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .btn-done { background: #2ecc71; color: #fff; }
        .btn-take { background: #e74c3c; color: #fff; }
        .btn-transfer { background: #f39c12; color: #fff; }
        .btn-disabled {
            opacity: 0.4;
            pointer-events: none;
            cursor: not-allowed;
        }
        .btn-attack {
            background: #ffd700;
            color: #1a1a2e;
            box-shadow: 0 4px 12px #ffd70060;
        }
        .btn-attack:hover {
            background: #ffc107;
            box-shadow: 0 8px 20px #ffd70080;
        }
        /* CHAT PANEL */
        .chat-toggle {
            position: fixed;
            right: 16px;
            bottom: 20px;
            z-index: 100;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #c44dff, #7b2ff7);
            border: none;
            color: #fff;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 6px 20px #7b2ff750;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-toggle:hover { transform: scale(1.08); }
        .chat-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #e74c3c;
            color: #fff;
            font-size: 0.7rem;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        #chat-panel {
            position: fixed;
            right: 16px;
            bottom: 80px;
            width: 340px;
            max-height: 480px;
            background: var(--surface);
            border-radius: 20px;
            box-shadow: var(--shadow);
            z-index: 99;
            display: none;
            flex-direction: column;
            border: 1px solid #ffffff10;
            overflow: hidden;
        }
        #chat-panel.open {
            display: flex;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .chat-header {
            padding: 12px 16px;
            background: #ffffff08;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            max-height: 280px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-msg {
            padding: 8px 12px;
            border-radius: 14px;
            font-size: 0.85rem;
            max-width: 85%;
            word-break: break-word;
            animation: fadeInUp 0.2s ease;
        }
        .chat-msg.mine {
            background: #c44dff30;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .chat-msg.other {
            background: #ffffff10;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .chat-msg .msg-sender {
            font-weight: 700;
            font-size: 0.7rem;
            color: #c44dff;
            margin-bottom: 2px;
        }
        .chat-msg .msg-time {
            font-size: 0.65rem;
            color: #888;
            float: right;
            margin-left: 8px;
        }
        .chat-input-row {
            display: flex;
            padding: 10px;
            gap: 8px;
            border-top: 1px solid #ffffff10;
            align-items: center;
        }
        .chat-input-row input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 20px;
            border: 1px solid #ffffff20;
            background: #0d1b36;
            color: #fff;
            outline: none;
            font-size: 0.9rem;
        }
        .emoji-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #ffffff10;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        .emoji-btn:hover { background: #c44dff40; }
        .send-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #c44dff;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
            flex-shrink: 0;
            transition: all 0.3s;
        }
        .send-btn:hover { background: #7b2ff7; }
        .emoji-picker {
            display: none;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px;
            max-height: 180px;
            overflow-y: auto;
            background: #0d1b36;
            border-radius: 12px;
            margin: 0 10px 8px;
        }
        .emoji-picker.open { display: flex; }
        .emoji-item {
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px;
            font-size: 1.2rem;
            transition: all 0.2s;
        }
        .emoji-item:hover { background: #ffffff20; transform: scale(1.2); }
        .emoji-categories {
            display: flex;
            gap: 4px;
            padding: 6px 10px;
            flex-wrap: wrap;
        }
        .emoji-cat {
            padding: 4px 10px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.75rem;
            background: #ffffff08;
            border: none;
            color: #ccc;
            transition: all 0.3s;
        }
        .emoji-cat.active { background: #c44dff40; color: #fff; }
        /* MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: #00000080;
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--surface);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: var(--shadow);
        }
        .modal h2 { margin-bottom: 16px; font-size: 1.5rem; }
        .modal .btn { margin-top: 16px; }
        /* RESPONSIVE */
        @media (max-width: 600px) {
            :root {
                --card-w: 58px;
                --card-h: 84px;
            }
            .game-title { font-size: 2rem; }
            .card-in-hand { font-size: 0.85rem; }
            .card-suit { font-size: 1.1rem; }
            .card-rank { font-size: 1rem; }
            #chat-panel {
                width: 280px;
                right: 8px;
                bottom: 70px;
            }
            .opponent-card-back { width: 36px; height: 52px; }
            .table-card-attack, .table-card-defend {
                width: 55px;
                height: 80px;
            }
        }
        @keyframes cardAppear {
    from { transform: scale(0.5) translateY(30px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
}
.table-card-attack, .table-card-defend {
    animation: cardAppear 0.3s ease-out;
}
@keyframes defendAppear {
    from { transform: translateY(-20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}
.table-card-defend {
    animation: defendAppear 0.3s ease-out;
}
#name-emoji-btn:hover {
    background: #c44dff30;
    border-color: #c44dff;
}
#name-emoji-picker .name-emoji-item {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 8px;
    font-size: 1.2rem;
    transition: all 0.2s;
}
#name-emoji-picker .name-emoji-item:hover {
    background: #ffffff20;
    transform: scale(1.2);
}
#loader-screen {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #0a0a14;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    transition: opacity 0.8s, visibility 0.8s;
}
#loader-screen.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
}
#loader-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}
.loader-text {
    position: relative;
    z-index: 10;
    color: #c44dff;
    font-size: 1.2rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    animation: pulseText 1.5s ease-in-out infinite, textGlow 2s infinite alternate;
    margin-top: 280px;
}
@keyframes textGlow {
    from { text-shadow: 0 0 5px #c44dff; }
    to { text-shadow: 0 0 15px #ff6b9d, 0 0 30px #c44dff; }
}
    </style>
</head>
<body>
    <!-- LOADER -->
    <div id="loader-screen">
    <canvas id="loader-canvas"></canvas>
    <div class="loader-text">Загрузка...</div>
</div>

    <!-- MAIN MENU -->
    <div id="main-menu">
        <div class="game-title">♠ ДУРАК ♠</div>
        <div class="game-subtitle">Карточная игра</div>
        <div class="menu-card">
            <div class="input-group">
    <label>👤 Ваше имя</label>
    <div style="display: flex; gap: 8px; align-items: center;">
        <input type="text" id="player-name" placeholder="Введите имя..." maxlength="20" autocomplete="off" style="flex:1;">

                const updatedPlayers = data.players.filter(p => p.id !== myPlayerId);

                    await roomRef.delete();

        function subscribeToRoom(roomCode) {
            if (unsubscribeRoom) unsubscribeRoom();

                    showView('main-menu');
                    return;

                const data = doc.data();
                if (data.settings) {
                    localDeckSize = data.settings.deckSize;
                    localGameMode = data.settings.mode;
                }
                const me = data.players.find(p => p.id === myPlayerId);
                if (!me && data.status === 'playing') {
                    // Возможно, нас удалили – ничего не делаем

                    updateLobbyUI(data);
                } else if (data.status === 'playing' && data.gameState) {
                    currentGameState = data.gameState;
                    showView('game-screen');

                // ==================== GAME LOGIC ====================
        function createDeck(deckSize) {
            const ranks = deckSize === 52 ? RANKS_52 : RANKS_36;
            const deck = [];
            for (const suit of SUITS) {
                for (const rank of ranks) {
                    deck.push({ suit, rank, id: rank + suit });
                }
            }
            return deck;
        }

        function shuffleDeck(deck) {
            const arr = [...deck];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function getCardValue(card) {
            return RANK_VALUES[card.rank] || 0;
        }

        function isTrump(card, trumpSuit) {
            return card.suit === trumpSuit;
        }

        function canBeatCard(attackCard, defendCard, trumpSuit) {
            if (attackCard.suit === defendCard.suit) {
                return getCardValue(defendCard) > getCardValue(attackCard);
            }
            if (isTrump(defendCard, trumpSuit) && !isTrump(attackCard, trumpSuit)) {
                return true;
            }
            return false;
        }

        function getRanksOnTable(table) {
            const ranks = new Set();
            for (const pair of table) {
                ranks.add(pair.attack.rank);
                if (pair.defend) ranks.add(pair.defend.rank);
            }
            return ranks;
        }

        function initializeGameState(players, settings) {
            const deckSize = settings.deckSize || 36;
            const mode = settings.mode || 'podkidnoy';
            let deck = shuffleDeck(createDeck(deckSize));
            const trumpCard = deck[deck.length - 1];
            const trumpSuit = trumpCard.suit;
            const updatedPlayers = players.map(p => ({ ...p, cards: [] }));
            for (let i = 0; i < 6; i++) {
                for (const p of updatedPlayers) {
                    if (deck.length > 1) {
                        const card = deck.pop();
                        p.cards.push(card);
                    }
                }
            }
            const actualTrump = deck.pop();
            deck.push(actualTrump);

            let firstAttackerIdx = 0;
            let lowestTrumpValue = 999;
            for (let i = 0; i < updatedPlayers.length; i++) {
                for (const card of updatedPlayers[i].cards) {
                    if (card.suit === trumpSuit && getCardValue(card) < lowestTrumpValue) {
                        lowestTrumpValue = getCardValue(card);
                        firstAttackerIdx = i;
                    }
                }
            }
            if (lowestTrumpValue === 999) {
                firstAttackerIdx = Math.floor(Math.random() * updatedPlayers.length);

            const defenderIdx = (firstAttackerIdx + 1) % updatedPlayers.length;

        function findPlayerInGameState(gs, playerId) {

        const defender = gs.players.find(p => p.id === gs.currentDefender);
        if (!defender) return [];
        const maxCanAdd = Math.min(defender.cards.length - table.length, 6 - table.length);
        if (maxCanAdd <= 0) return [];
        return myCards.filter(c => tableRanks.has(c.rank));
    }
}
            return [];
        }

        function getValidDefendCards(gs, attackCard) {

        async function selectCardForAttack(cardId) {
            if (!currentGameState || !currentRoomId) return;
            const gs = currentGameState;
            const validCards = getValidAttackCards(gs);
            const card = getMyCards(gs).find(c => c.id === cardId);
            if (!card || !validCards.find(vc => vc.id === cardId)) return;
            const idx = selectedCards.indexOf(cardId);
            if (idx >= 0) {
                selectedCards.splice(idx, 1);
            } else {
                if (selectedCards.length > 0 && gs.table.length === 0) {
                    const firstCard = getMyCards(gs).find(c => c.id === selectedCards[0]);
                    if (firstCard && firstCard.rank !== card.rank) {
                        selectedCards = [];

                selectedCards.push(cardId);

        async function playAttackCards() {
            if (!currentGameState || !currentRoomId || selectedCards.length === 0) return;
            const gs = currentGameState;
            const canPlay = (gs.currentAttacker === myPlayerId && (gs.phase === 'attack' || gs.phase === 'podkid')) ||
                            (gs.phase === 'podkid' && gs.currentDefender !== myPlayerId);
            if (!canPlay) return;
            if (gs.phase !== 'attack' && gs.phase !== 'podkid') return;
            const myCards = getMyCards(gs);
            const cardsToPlay = selectedCards.map(id => myCards.find(c => c.id === id)).filter(Boolean);
            if (cardsToPlay.length === 0) return;
            if (gs.table.length === 0) {
                const firstRank = cardsToPlay[0].rank;
                if (!cardsToPlay.every(c => c.rank === firstRank)) return;
            }
            const roomRef = db.collection('rooms').doc(currentRoomId);
            try {
                const doc = await roomRef.get();
                if (!doc.exists) return;
                const data = doc.data();
                const serverGs = data.gameState;
                if (!serverGs || serverGs.phase !== gs.phase || serverGs.currentAttacker !== gs.currentAttacker || serverGs.currentDefender !== gs.currentDefender) return;
                const serverMe = serverGs.players.find(p => p.id === myPlayerId);
                if (!serverMe) return;
                let updatedTable = [...serverGs.table];
                let updatedMyCards = [...serverMe.cards];
                for (const card of cardsToPlay) {
                    const cardIdx = updatedMyCards.findIndex(c => c.id === card.id);
                    if (cardIdx >= 0) {
                        updatedMyCards.splice(cardIdx, 1);
                        updatedTable.push({ attack: card, defend: null });
                    }
                }
                const updatedPlayers = serverGs.players.map(p =>
                    p.id === myPlayerId ? { ...p, cards: updatedMyCards } : p
                );
                const newGs = {
                    ...serverGs,
                    table: updatedTable,
                    players: updatedPlayers,
                    phase: 'defend',
                    lastAttacker: myPlayerId,
                    passedPlayers: []
                };
                await roomRef.update({ gameState: newGs, players: updatedPlayers });
                selectedCards = [];
                currentGameState = newGs;
                renderGame({ gameState: newGs, players: updatedPlayers, status: 'playing' });
            } catch (e) {

        async function playDefendCard(attackCardId, defendCardId) {

                const defendCard = serverMe.cards.find(c => c.id === defendCardId);
                const tablePair = serverGs.table.find(p => p.attack.id === attackCardId && !p.defend);
                if (!defendCard || !tablePair || !canBeatCard(tablePair.attack, defendCard, serverGs.trumpSuit)) return;
                const updatedMyCards = serverMe.cards.filter(c => c.id !== defendCardId);
                const updatedTable = serverGs.table.map(p =>
                    p.attack.id === attackCardId ? { ...p, defend: defendCard } : p

                const updatedPlayers = serverGs.players.map(p =>

                const allDefended = updatedTable.every(p => p.defend !== null);
                const newGs = {

                const alreadyPassed = serverGs.passedPlayers || [];
                if (alreadyPassed.includes(myPlayerId)) return;
                const newPassed = [...alreadyPassed, myPlayerId];
                const totalNonDefenders = serverGs.players.filter(p => p.id !== serverGs.currentDefender).length;
                if (newPassed.length >= totalNonDefenders) {

                    const newGs = { ...serverGs, passedPlayers: newPassed };
                    await roomRef.update({ gameState: newGs });
                    currentGameState = newGs;

            } catch (e) {

            if (gs.phase === 'defend' && gs.currentDefender === myPlayerId) {

        function renderEmojiCategories() {
            const catsDiv = document.getElementById('emoji-cats');
            catsDiv.innerHTML = '';
            for (const cat of Object.keys(emojiCategories)) {
                const btn = document.createElement('button');
                btn.className = 'emoji-cat' + (cat === activeEmojiCat ? ' active' : '');
                btn.textContent = cat;
                btn.onclick = () => {
                    activeEmojiCat = cat;

                    renderEmojiPicker();
                };
                catsDiv.appendChild(btn);
            }
        }

        function renderEmojiPicker() {
            const picker = document.getElementById('emoji-picker');
            const emojis = emojiCategories[activeEmojiCat] || [];
            picker.innerHTML = '';
            for (const emoji of emojis) {
                const span = document.createElement('span');
                span.className = 'emoji-item';
                span.textContent = emoji;
                span.onclick = () => {
                    const input = document.getElementById('chat-input');
                    input.value += emoji;
                    input.focus();
                };
                picker.appendChild(span);
            }
        }

        function renderChatMessages(chatArray) {
            const msgsDiv = document.getElementById('chat-messages');
            msgsDiv.innerHTML = '';
            for (const msg of chatArray.slice(-50)) {
                const div = document.createElement('div');
                div.className = 'chat-msg ' + (msg.senderId === myPlayerId ? 'mine' : 'other');
                const time = msg.timestamp ? new Date(msg.timestamp.toDate ? msg.timestamp.toDate() : msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
                div.innerHTML = `
                    ${msg.senderId !== myPlayerId ? `<div class="msg-sender">${escapeHTML(msg.senderName || 'Игрок')}</div>` : ''}
                    <span>${escapeHTML(msg.text)}</span>
                    <span class="msg-time">${time}</span>
                `;
                msgsDiv.appendChild(div);
            }
            msgsDiv.scrollTop = msgsDiv.scrollHeight;
        }

        async function sendChat() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || !currentRoomId || !myPlayerId) return;
            input.value = '';
            const roomRef = db.collection('rooms').doc(currentRoomId);
            try {
                const msg = {
                    senderId: myPlayerId,
                    senderName: myPlayerName,
                    text: text,
                    timestamp: new Date().toISOString()
                };
                await roomRef.update({
                    chat: firebase.firestore.FieldValue.arrayUnion(msg)
                });
            } catch (e) {
                console.error('Send chat error:', e);
            }
            emojiPickerOpen = false;
            document.getElementById('emoji-picker').classList.remove('open');
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;

    <script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- Сцена, камера, рендерер ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a14);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ 
    canvas: document.getElementById('loader-canvas'),
    antialias: true,
    alpha: true
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

// --- Свет ---
const ambientLight = new THREE.AmbientLight(0x404066);
scene.add(ambientLight);
const pointLight = new THREE.PointLight(0xc44dff, 2, 15);
pointLight.position.set(2, 3, 5);
scene.add(pointLight);
const pointLight2 = new THREE.PointLight(0xff6b9d, 1.5, 10);
pointLight2.position.set(-3, -1, 3);
scene.add(pointLight2);

// --- Парящая колода карт ---
const cardGroup = new THREE.Group();
scene.add(cardGroup);

// Создаём текстуру карты (Canvas)
function createCardTexture(suit, rank, color) {
    const canvas = document.createElement('canvas');
    canvas.width = 128;
    canvas.height = 180;
    const ctx = canvas.getContext('2d');
    // Фон карты
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#cccccc';
    ctx.lineWidth = 2;
    ctx.strokeRect(2, 2, canvas.width-4, canvas.height-4);
    // Ранг и масть
    ctx.fillStyle = color;
    ctx.font = 'bold 36px "Segoe UI", system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(rank, canvas.width/2, 70);
    ctx.font = '48px "Segoe UI", system-ui';
    ctx.fillText(suit, canvas.width/2, 135);
    return new THREE.CanvasTexture(canvas);
}

const suits = [
    { suit: '♠', color: '#1a1a2e' },
    { suit: '♥', color: '#d32f2f' },
    { suit: '♦', color: '#d32f2f' },
    { suit: '♣', color: '#1a1a2e' }
];

const cards = [];
const numCards = 6;
for (let i = 0; i < numCards; i++) {
    const { suit, color } = suits[i % suits.length];
    const texture = createCardTexture(suit, '?', color);
    const material = new THREE.MeshStandardMaterial({ 
        map: texture,
        roughness: 0.4,
        metalness: 0.1,
        side: THREE.DoubleSide
    });
    const geometry = new THREE.PlaneGeometry(0.8, 1.1);
    const card = new THREE.Mesh(geometry, material);
    // Располагаем веером с небольшим смещением
    card.position.set((i - numCards/2 + 0.5) * 0.2, 0, i * 0.02);
    card.rotation.y = (i - numCards/2 + 0.5) * 0.15;
    card.rotation.x = -0.1;
    cards.push(card);
    cardGroup.add(card);
}

// --- Магические частицы ---
const particlesGeometry = new THREE.BufferGeometry();
const particlesCount = 200;
const posArray = new Float32Array(particlesCount * 3);
for (let i = 0; i < particlesCount * 3; i += 3) {
    posArray[i] = (Math.random() - 0.5) * 6;
    posArray[i+1] = (Math.random() - 0.5) * 4;
    posArray[i+2] = (Math.random() - 0.5) * 4;
}
particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
const particlesMaterial = new THREE.PointsMaterial({
    size: 0.02,
    color: 0xc44dff,
    blending: THREE.AdditiveBlending,
    transparent: true,
    opacity: 0.8,
    sizeAttenuation: true
});
const particles = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particles);

// --- Анимация ---
const clock = new THREE.Clock();

function animate() {
    const delta = clock.getDelta();
    const time = performance.now() * 0.001;
    
    // Вращаем колоду
    cardGroup.rotation.y += 0.005;
    cardGroup.rotation.x = Math.sin(time * 0.5) * 0.1;
    cardGroup.position.y = Math.sin(time * 1.2) * 0.1;
    
    // Частицы вращаются
    particles.rotation.y += 0.002;
    particles.rotation.x += 0.001;
    
    // Пульсация света
    pointLight.intensity = 2 + Math.sin(time * 3) * 0.5;
    
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}
animate();

// --- Адаптация под размер окна ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
