<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аналитика каталога</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-main: #f8fafc; --bg-white: #ffffff; --text-primary: #1e293b; --text-secondary: #64748b;
            --border: #e2e8f0; --accent: #3b82f6; --accent-light: #eff6ff;
            --success-bg: #dcfce7; --success-text: #166534; --danger-bg: #fee2e2; --danger-text: #991b1b;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05); --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1); --skeleton-base: #e2e8f0;
        }

        [data-theme="dark"] {
            --bg-main: #0f172a; --bg-white: #1e293b; --text-primary: #f1f5f9; --text-secondary: #94a3b8;
            --border: #334155; --accent: #60a5fa; --accent-light: rgba(96, 165, 250, 0.1);
            --success-bg: rgba(16, 185, 129, 0.1); --success-text: #34d399;
            --danger-bg: rgba(239, 68, 68, 0.1); --danger-text: #f87171;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3); --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.5); --skeleton-base: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-primary); height: 100vh; display: flex; overflow: hidden; }
        
        .icon { width: 20px; height: 20px; fill: currentColor; }
        .icon-sm { width: 16px; height: 16px; }
        .icon-lg { width: 24px; height: 24px; }
        
        /* Layout */
        .sidebar { width: 280px; background: var(--bg-white); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; z-index: 10; }
        .sidebar-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 18px; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 10px; }
        .theme-toggle { background: none; border: none; cursor: pointer; color: var(--text-secondary); padding: 8px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .theme-toggle:hover { background: var(--bg-main); color: var(--accent); }
        .sidebar-nav { flex: 1; overflow-y: auto; padding: 16px; }
        .nav-section-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); margin-bottom: 12px; padding-left: 12px; }
        .nav-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-radius: 8px; cursor: pointer; color: var(--text-secondary); font-size: 14px; font-weight: 500; transition: all 0.2s; margin-bottom: 4px; }
        .nav-item:hover { background: var(--bg-main); color: var(--text-primary); }
        .nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
        .nav-badge { background: var(--bg-main); padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; color: var(--text-secondary); }
        .nav-item.active .nav-badge { background: var(--bg-white); color: var(--accent); }
        .sidebar-footer { padding: 16px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
        
        .btn { padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--accent); color: white; box-shadow: var(--shadow-sm); }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: var(--shadow-md); }
        .btn-secondary { background: var(--bg-white); border: 1px solid var(--border); color: var(--text-primary); }
        .btn-secondary:hover { background: var(--bg-main); border-color: var(--text-secondary); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-bar { height: 72px; background: var(--bg-white); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 32px; justify-content: space-between; flex-shrink: 0; }
        .search-container { position: relative; width: 400px; }
        .search-input { width: 100%; padding: 10px 16px 10px 40px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: var(--bg-main); color: var(--text-primary); transition: all 0.2s; }
        .search-input:focus { border-color: var(--accent); background: var(--bg-white); box-shadow: 0 0 0 3px var(--accent-light); }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }
        .stats-row { display: flex; gap: 24px; }
        .stat-item { display: flex; flex-direction: column; align-items: flex-end; }
        .stat-value { font-weight: 700; font-size: 16px; color: var(--text-primary); }
        .stat-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }

        .content-area { flex: 1; overflow-y: auto; padding: 32px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .product-card { background: var(--bg-white); border: 1px solid var(--border); border-radius: 16px; padding: 20px; transition: all 0.2s; cursor: pointer; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .product-card:hover { border-color: var(--accent); box-shadow: var(--shadow-lg); transform: translateY(-4px); }
        .product-card.selected { border-color: var(--accent); background: var(--accent-light); }
        
        .card-image-wrapper { 
            width: 100%; height: 180px; background: var(--bg-main); border-radius: 8px; margin-bottom: 16px; 
            overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; 
        }
        .card-image { width: 100%; height: 100%; object-fit: contain; transition: transform 0.3s; }
        .product-card:hover .card-image { transform: scale(1.05); }
        
        .card-category { display: inline-block; padding: 4px 10px; background: var(--bg-main); border-radius: 6px; font-size: 12px; color: var(--text-secondary); font-weight: 500; margin-bottom: 12px; }
        .card-title { font-size: 16px; font-weight: 600; line-height: 1.4; margin-bottom: 16px; color: var(--text-primary); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex: 1; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .price-tag { font-size: 18px; font-weight: 700; color: var(--text-primary); }
        .price-range { font-size: 14px; color: var(--text-secondary); font-weight: 400; }
        .variant-badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .vb-has { background: var(--success-bg); color: var(--success-text); }
        .vb-none { background: var(--danger-bg); color: var(--danger-text); }

        .skeleton-card { background: var(--bg-white); border: 1px solid var(--border); border-radius: 16px; padding: 20px; height: 320px; display: flex; flex-direction: column; }
        .skeleton { background: var(--skeleton-base); border-radius: 4px; position: relative; overflow: hidden; }
        .skeleton::after { content: ''; position: absolute; top: 0; right: 0; bottom: 0; left: 0; transform: translateX(-100%); background-image: linear-gradient(90deg, rgba(255,255,255,0) 0, rgba(255,255,255,0.2) 20%, rgba(255,255,255,0.5) 60%, rgba(255,255,255,0) 100%); animation: shimmer 2s infinite; }
        @keyframes shimmer { 100% { transform: translateX(100%); } }
        .sk-image { height: 180px; margin-bottom: 16px; border-radius: 8px; }
        .sk-title { height: 20px; width: 80%; margin-bottom: 8px; }
        .sk-text { height: 16px; width: 60%; margin-bottom: 16px; }
        .sk-footer { margin-top: auto; display: flex; justify-content: space-between; }
        .sk-price { height: 24px; width: 80px; }
        .sk-badge { height: 24px; width: 60px; border-radius: 12px; }

        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-secondary); display: flex; flex-direction: column; align-items: center; }
        .empty-icon { margin-bottom: 16px; opacity: 0.3; }
        .empty-title { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }
        .btn-reset { margin-top: 16px; background: var(--bg-main); border: 1px solid var(--border); color: var(--text-primary); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .btn-reset:hover { background: var(--border); }

        .detail-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); z-index: 90; opacity: 0; visibility: hidden; transition: all 0.3s; }
        .detail-overlay.active { opacity: 1; visibility: visible; }
        .detail-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 450px; background: var(--bg-white); box-shadow: -10px 0 30px rgba(0,0,0,0.2); z-index: 100; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; }
        .detail-panel.active { transform: translateX(0); }
        .dp-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: start; }
        .dp-title { font-size: 18px; font-weight: 700; line-height: 1.4; margin-bottom: 8px; color: var(--text-primary); }
        .dp-close { background: none; border: none; cursor: pointer; color: var(--text-secondary); line-height: 1; padding: 4px; border-radius: 4px; }
        .dp-close:hover { background: var(--bg-main); color: var(--danger-text); }
        .dp-body { flex: 1; overflow-y: auto; padding: 24px; }
        .section-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); margin-bottom: 16px; }
        .variant-item { background: var(--bg-main); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; transition: all 0.2s; }
        .variant-item:hover { border-color: var(--accent); background: var(--accent-light); }
        .vi-header { display: flex; justify-content: space-between; align-items: center; }
        .vi-name { font-weight: 600; font-size: 14px; color: var(--text-primary); }
        .vi-price { font-weight: 700; font-size: 16px; color: var(--accent); }
        .dp-footer { padding: 24px; border-top: 1px solid var(--border); }
        .btn-full { width: 100%; padding: 14px; background: var(--text-primary); color: var(--bg-white); border: none; border-radius: 10px; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; display: block; transition: all 0.2s; }
        .btn-full:hover { filter: brightness(1.2); transform: translateY(-2px); box-shadow: var(--shadow-md); }

        .progress-toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--bg-white); padding: 16px 24px; border-radius: 12px; box-shadow: var(--shadow-lg); border: 1px solid var(--border); width: 400px; z-index: 200; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .progress-toast.active { transform: translateX(-50%) translateY(0); }
        .pt-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: var(--text-primary); }
        .pt-bar { height: 6px; background: var(--bg-main); border-radius: 3px; overflow: hidden; }
        .pt-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }

        .notification-container { position: fixed; bottom: 24px; right: 24px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--bg-white); border: 1px solid var(--border); border-left: 4px solid var(--accent); padding: 12px 16px; border-radius: 8px; box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 12px; min-width: 300px; animation: slideInRight 0.3s ease; color: var(--text-primary); }
        .toast.error { border-left-color: var(--danger-text); }
        .toast.success { border-left-color: var(--success-text); }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    maxTokens: 10, tokens: 10, lastRefill: Date.now(),
    canMakeRequest() {
        const now = Date.now();
        const timePassed = now - this.lastRefill;
        const tokensToAdd = Math.floor(timePassed / 6000); 
        if (tokensToAdd > 0) { this.tokens = Math.min(this.maxTokens, this.tokens + tokensToAdd); this.lastRefill = now; }

    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    updateThemeIcon(savedTheme);
}
function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateThemeIcon(next);
}
function updateThemeIcon(theme) {
    const sun = document.getElementById('icon-sun');
    const moon = document.getElementById('icon-moon');
    if (theme === 'dark') { sun.style.display = 'block'; moon.style.display = 'none'; }
    else { sun.style.display = 'none'; moon.style.display = 'block'; }
}
initTheme();

// Toast Notifications
function showToast(message, type = 'info') {
    const container = document.getElementById('notificationContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    let icon = '';
    if (type === 'success') icon = '<svg class="icon" style="color:var(--success-text)" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
    else if (type === 'error') icon = '<svg class="icon" style="color:var(--danger-text)" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>';
    else icon = '<svg class="icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>';
    toast.innerHTML = `${icon}<span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0'; toast.style.transform = 'translateX(100%)';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

async function fetchPage(url) {
    for (let i = 0; i < CORS_PROXIES.length; i++) {
        const idx = (proxyIdx + i) % CORS_PROXIES.length;
        try {
            const r = await fetch(CORS_PROXIES[idx] + encodeURIComponent(url));
            if (r.ok) { proxyIdx = idx; return await r.text(); }
        } catch(e) {}
    }
    throw new Error('Proxies failed');
}

// Helper to parse price string safely
function parsePriceString(str) {
    if (!str) return 0;
    // Remove everything except digits, dots and commas
    let clean = str.replace(/[^\d.,]/g, '');
    // Replace comma with dot
    clean = clean.replace(',', '.');
    
    // Handle cases like "23.000,00" -> "23000.00" or "23000.00"
    // If there are multiple dots, it's likely thousands separator + decimal
    const parts = clean.split('.');
    if (parts.length > 2) {
        // e.g. 23.000.00 -> remove all but last dot
        clean = parts.slice(0, -1).join('') + '.' + parts[parts.length - 1];
    }
    
    let val = parseFloat(clean);
    
    // Fix for "23000.00" being parsed as 23000, but sometimes we get "2300000" if format was weird
    // Heuristic: if value > 100000 and ends with 00 after dot, it might be kopecks included incorrectly
    // But usually parseFloat handles "23000.00" correctly as 23000.
    
    // Specific fix for the issue seen: "23 000,00" -> "23000.00" -> 23000. Correct.
    // Issue was likely "23 0 00" -> "23000" -> correct.
    // Wait, user said 2,300,000. That means input was likely "23 000 00" or similar without decimal point handling.
    
    return isNaN(val) ? 0 : val;
}

// --- IMPROVED PARSER ---
function parseHTML(html, category) {
    const products = [];
    const doc = new DOMParser().parseFromString(html, 'text/html');
    
    // 1. Get all names (Standard and Quick-view types)
    const standardNames = Array.from(doc.querySelectorAll('.im-cc-products-name'));
    const quickViewNames = Array.from(doc.querySelectorAll('b.fs16lh1-5'));
    const allNameNodes = [...standardNames, ...quickViewNames];

    // 2. Collect ALL images globally but FILTER out noise strictly
    const allImages = Array.from(doc.querySelectorAll('img')).filter(img => {
        const src = img.src || '';
        // Must be in images folder
        if (!src.includes('/images/')) return false;
        
        const filename = src.split('/').pop().split('?')[0].toLowerCase();
        
        // STRICT BLACKLIST based on provided HTML analysis
        // Logo: 98989999900066.webp
        // Cart/Sticky: 3433333.webp
        // Palette: 576776.webp
        // Banners: novinka, hit, akciya, mahagon, uspey
        if (filename.startsWith('9898') || filename.startsWith('3433') || 
            filename.includes('novinka') || filename.includes('hit') || 
            filename.includes('akciya') || filename.includes('mahagon') || 
            filename.includes('uspey') || filename === '576776.webp' || filename.includes('palitra')) {
            return false;
        }
        
        // Additional heuristic: exclude purely numeric filenames that aren't product codes
        // Product codes usually have letters or specific patterns, pure numbers like 12345.webp are often system icons
        const nameWithoutExt = filename.split('.')[0];
        if (/^\d+$/.test(nameWithoutExt) && nameWithoutExt.length < 6) return false;

        return true;
    });

    allNameNodes.forEach((nameNode, index) => {
        const name = nameNode.textContent.trim();
        if (!name) return;

        // Image Mapping (by index)
        let imageUrl = null;
        if (allImages[index]) {
            let src = allImages[index].getAttribute('src');
            if (src) {
                if (!src.startsWith('http')) {
                    const cleanSrc = src.startsWith('/') ? src.substring(1) : src;
                    imageUrl = BASE_URL + '/' + cleanSrc;
                } else {
                    imageUrl = src;
                }
            }
        }

        let variants = [];
        let pid = null;
        let url = null;

        // CHECK TYPE A: Standard Product (has ID in DOM)
        let parent = nameNode;
        for (let i = 0; i < 15 && parent; i++) {
            const id = parent.getAttribute?.('id') || '';
            const m = id.match(/product_([a-z0-9]+)/i);
            if (m) { pid = m[1]; break; }
            parent = parent.parentElement;
        }

        if (pid) {
            // It's a standard product, use regex extraction
            variants = extractVariants(html, pid);
            
            // Find URL for standard product
            parent = nameNode;
            for (let i = 0; i < 15 && parent; i++) {
                if (parent.tagName === 'A' && parent.getAttribute('href')) {
                    let h = parent.getAttribute('href');
                    if (h.startsWith('/')) h = BASE_URL + h; else if (!h.startsWith('http')) h = BASE_URL + '/' + h;
                    url = h; break;
                }
                const link = parent.querySelector?.('a[href]');
                if (link) {
                    let h = link.getAttribute('href');
                    if (h && !h.startsWith('javascript')) {
                        if (h.startsWith('/')) h = BASE_URL + h; else if (!h.startsWith('http')) h = BASE_URL + '/' + h;
                        url = h; break;
                    }
                }
                parent = parent.parentElement;
            }
        } 
        // CHECK TYPE B: Quick View / Simple Product (No ID)
        else {
            // Strategy 1: Look for variants in <li> list (like "Azalia")
            let listContainer = nameNode.closest('ul');
            if (listContainer) {
                const items = listContainer.querySelectorAll('li');
                items.forEach(item => {
                    // Look for price in <b> tags inside LI specifically
                    const bolds = item.querySelectorAll('b');
                    let foundPrice = 0;
                    
                    bolds.forEach(b => {
                        const txt = b.textContent.trim();
                        // Only consider it a price if it looks like money (has digits and maybe currency symbol nearby)
                        // Or just pure number logic
                        const val = parsePriceString(txt);
                        if (val > 100) foundPrice = val; // Threshold to avoid catching dimensions
                    });

                    if (foundPrice > 0) {
                        let vName = item.textContent.replace(/\d+[.,]?\d*/g, '').replace(/[₽руб]/gi, '').trim();
                        vName = vName.replace(/^[-–\s]+|[-–\s]+$/g, '');
                        if (!vName || vName.length < 2) vName = `Вариант ${variants.length + 1}`;
                        variants.push({ name: vName, price: foundPrice, suboptions: [] });
                    }
                });
            }

            // Strategy 2: If no list, look for immediate sibling price (like "Zvezda" or "Skamya primireniya")
            if (variants.length === 0) {
                // Find the closest container that holds the description and prices
                // Usually it's a div with class "text-inner" or similar, but let's go up to the cell
                const container = nameNode.closest('[id^="imTextObject"]') || nameNode.parentElement;
                
                if (container) {
                    // Look for the "Prices:" section specifically
                    // The HTML structure is usually: <div>Цены:</div><ul><li>...price...</li></ul>
                    // We need to find the <ul> that comes AFTER the text "Цены"
                    
                    const allUls = container.querySelectorAll('ul');
                    let targetUl = null;
                    
                    // Simple heuristic: take the last <ul> in the container, as prices are usually at the bottom
                    if (allUls.length > 0) {
                        targetUl = allUls[allUls.length - 1];
                    }

                    if (targetUl) {
                        const items = targetUl.querySelectorAll('li');
                        items.forEach(item => {
                            // Get FULL text content of the LI, including all nested spans/bolds
                            // This fixes the issue where "23 0" and "0" and "0" are in separate tags
                            const fullText = item.textContent;
                            
                            // Extract price from full text
                            // Pattern: digits, spaces, dots, commas followed by currency or end of string
                            const priceMatch = fullText.match(/([\d\s.,]+)\s*[₽RUB]/i);
                            
                            if (priceMatch) {
                                const val = parsePriceString(priceMatch[1]);
                                if (val > 1000) { // Threshold for benches
                                    variants.push({ name: 'Цена', price: val, suboptions: [] });
                                }
                            }
                        });
                    }
                }
            }
            
            // Generate Anchor Link for Quick View items
            const catUrl = CATEGORIES.find(c => c.name === category)?.url || '';
            if (catUrl) {
                const anchor = name.replace(/[^a-zA-Z0-9а-яА-Я]/g, '+');
                url = `${BASE_URL}/${catUrl}#${anchor}`;
            }
        }

        // Fallback for variants if nothing found
        if (variants.length === 0 && !pid) {
             let pe = null, p = nameNode;
             for (let i = 0; i < 10 && p; i++) { 
                 pe = p.querySelector?.('.product_fullprice,.product_price,b.fs12lh1-5'); 
                 if (pe) break; 
                 p = p.parentElement; 
             }
             if (pe) {
                 const pm = (pe.textContent.match(/([\d\s]+)/) || [])[1];
                 const v = pm ? parseInt(pm.replace(/\s/g, '')) : 0;
                 if (v > 0) variants.push({ name: 'Цена', price: v, suboptions: [] });
             }
        }

        products.push({ name, variants, category, productId: pid, url, image: imageUrl });
    });
    
    return products;
}

function extractVariants(html, pid) {
    const variants = [];
    const positions = [];
    let pos = 0;
    while ((pos = html.indexOf(pid, pos)) !== -1) { positions.push(pos); pos += pid.length; }
    for (const p of positions) {
        const start = Math.max(0, p - 2000);
        const end = Math.min(html.length, p + 5000);
        const ctx = html.substring(start, end);
        const re1 = /\{[^{}]*?name\s*:\s*'([^']*)'[^{}]*?pricevar\s*:\s*([\d.]+)[^{}]*?\}/g;
        const re2 = /\{[^{}]*?pricevar\s*:\s*([\d.]+)[^{}]*?name\s*:\s*'([^']*)'[^{}]*?\}/g;
        let m;
        while ((m = re1.exec(ctx))) processVariant(variants, m[1], parseFloat(m[2]));
        while ((m = re2.exec(ctx))) processVariant(variants, m[2], parseFloat(m[1]));
    }
    return variants;
}

function processVariant(arr, name, price) {
    if (price <= 0 || name.length > 80 || /[<>\n\r\t]/.test(name) || name.includes("'")) return;
    if (arr.find(v => v.name === name && v.price === price)) return;
    arr.push({ name, price, suboptions: [] });
}

async function toggleParsing() {
    if (isParsing) {
        pauseParsing = !pauseParsing;
        const btnText = document.getElementById('btnText');
        const btnIcon = document.querySelector('#startBtn svg');
        if (pauseParsing) {
            btnText.textContent = "Продолжить";
            btnIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
            showToast("Парсинг приостановлен", "info");
        } else {
            btnText.textContent = "Пауза";
            btnIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            showToast("Парсинг возобновлен", "success");
        }
        return;
    }

    const btn = document.getElementById('startBtn');
    const btnText = document.getElementById('btnText');
    const btnIcon = document.querySelector('#startBtn svg');
    
    isParsing = true;
    pauseParsing = false;
    btnText.textContent = "Пауза";
    btnIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    
    allProducts = [];
    showProgress(true);
    renderSkeletons();

    for (let i = 0; i < CATEGORIES.length; i++) {
        if (!isParsing) break;
        while (pauseParsing && isParsing) await new Promise(r => setTimeout(r, 500));
        if (!isParsing) break;

        const cat = CATEGORIES[i];
        updateProgress(i, CATEGORIES.length, `Загрузка: ${cat.name}`);
        
        if (!RATE_LIMIT.canMakeRequest()) {
            showToast("Лимит запросов. Пауза 10 сек...", "warning");
            await new Promise(r => setTimeout(r, 10000));
        }
        RATE_LIMIT.consume();

        try {
            const html = await fetchPage(`${BASE_URL}/${cat.url}`);
            const products = parseHTML(html, cat.name);
            const seen = new Set();
            products.forEach(p => {
                const k = p.name.toLowerCase().trim();
                if (!seen.has(k) && !allProducts.find(x => x.name.toLowerCase().trim() === k)) {
                    seen.add(k);
                    allProducts.push(p);
                }
            });
        } catch(e) {
            console.error(cat.name, e);
            showToast(`Ошибка загрузки: ${cat.name}`, "error");
        }
        
        const delay = Math.floor(Math.random() * 2000) + 1000;
        await new Promise(r => setTimeout(r, delay));
    }

    isParsing = false;
    pauseParsing = false;
    btnText.textContent = "Запустить парсинг";
    btnIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
    
    updateProgress(CATEGORIES.length, CATEGORIES.length, 'Готово!');
    setTimeout(() => showProgress(false), 1500);
    
    document.getElementById('exportBtn').disabled = false;
    renderAll();
    showToast("Парсинг завершен успешно", "success");
}

function renderAll() {
    renderSidebar();
    renderGrid();
    updateStats();
}

function renderSidebar() {
    const list = document.getElementById('categoryList');
    const counts = {};
    allProducts.forEach(p => { counts[p.category] = (counts[p.category] || 0) + 1; });
    document.getElementById('badgeAll').textContent = allProducts.length;

    list.innerHTML = CATEGORIES.map(c => {
        const count = counts[c.name] || 0;
        if (count === 0) return '';
        const active = currentFilter === c.name ? 'active' : '';
        return `<div class="nav-item ${active}" onclick="filterByCategory('${c.name}', this)">
            <span>${c.name}</span>
            <span class="nav-badge">${count}</span>
        </div>`;
    }).join('');
}

function getFilteredProducts() {
    let list = currentFilter === 'all' ? allProducts : allProducts.filter(p => p.category === currentFilter);
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    if (q) list = list.filter(p => p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q));
    return list;
}

function renderGrid() {
    const filtered = getFilteredProducts();
    const empty = document.getElementById('emptyState');
    const noResults = document.getElementById('noResultsState');
    const grid = document.getElementById('productGrid');

    if (allProducts.length === 0) { 
        empty.style.display = ''; noResults.style.display = 'none'; grid.style.display = 'none'; return; 
    }
    empty.style.display = 'none';
    if (filtered.length === 0) { noResults.style.display = ''; grid.style.display = 'none'; return; } 
    else { noResults.style.display = 'none'; }
    grid.style.display = 'grid';

    grid.innerHTML = filtered.map((p, i) => {
        const prices = p.variants.map(v => v.price);
        const minP = prices.length ? Math.min(...prices) : 0;
        const maxP = prices.length ? Math.max(...prices) : 0;
        const hasV = p.variants.length > 0;
        const realIdx = allProducts.indexOf(p);
        const sel = selectedProductIdx === realIdx ? 'selected' : '';

        const imgHtml = p.image 
            ? `<img src="${p.image}" class="card-image" loading="lazy" alt="${p.name}" onerror="this.parentElement.innerHTML='<div style=\\'color:var(--text-secondary);font-size:12px;\\'>Фото недоступно</div>'">`
            : `<div style="color:var(--text-secondary);font-size:12px;">Нет фото</div>`;

        return `<div class="product-card ${sel}" id="card-${realIdx}" onclick="openDetail(${realIdx})">
            <div class="card-image-wrapper">${imgHtml}</div>
            <div class="card-category">${p.category}</div>
            <div class="card-title">${p.name}</div>
            <div class="card-footer">
                <div>
                    <div class="price-tag">${minP ? minP.toLocaleString('ru-RU') + ' ₽' : '—'}</div>
                    ${maxP && maxP !== minP ? `<div class="price-range">до ${maxP.toLocaleString('ru-RU')} ₽</div>` : ''}
                </div>
                <span class="variant-badge ${hasV ? 'vb-has' : 'vb-none'}">
                    ${hasV ? p.variants.length + ' вар.' : 'Нет вариантов'}
                </span>
            </div>
        </div>`;
    }).join('');
}

function renderSkeletons() {
    const grid = document.getElementById('productGrid');
    const empty = document.getElementById('emptyState');
    const noResults = document.getElementById('noResultsState');
    empty.style.display = 'none'; noResults.style.display = 'none'; grid.style.display = 'grid';
    let html = '';
    for(let i=0; i<8; i++) {
        html += `<div class="skeleton-card">
            <div class="skeleton sk-image"></div>
            <div class="skeleton sk-title"></div>
            <div class="skeleton sk-text"></div>
            <div class="sk-footer">
                <div class="skeleton sk-price"></div>
                <div class="skeleton sk-badge"></div>
            </div>
        </div>`;
    }
    grid.innerHTML = html;
}

function updateStats() {
    const filtered = getFilteredProducts();
    let tv = 0, tp = 0, pc = 0;
    filtered.forEach(p => { tv += p.variants.length; p.variants.forEach(v => { tp += v.price; pc++; }); });
    document.getElementById('statProducts').textContent = filtered.length;
    document.getElementById('statVariants').textContent = tv;
    document.getElementById('statAvg').textContent = pc ? Math.round(tp / pc).toLocaleString('ru-RU') + ' ₽' : '0 ₽';
}

function filterByCategory(name, el) {
    currentFilter = name;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    if (el) el.classList.add('active');
    else document.querySelector('.nav-item')?.classList.add('active');
    closeDetail();
    renderGrid();
    updateStats();
}

function handleSearchInput() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => { renderGrid(); updateStats(); }, 300);
}

function resetFilters() {
    document.getElementById('searchInput').value = '';
    filterByCategory('all', document.querySelector('.nav-item'));
}

function openDetail(idx) {
    if (selectedProductIdx !== null) {
        const prevCard = document.getElementById(`card-${selectedProductIdx}`);
        if (prevCard) prevCard.classList.remove('selected');
    }
    selectedProductIdx = idx;
    const currCard = document.getElementById(`card-${idx}`);
    if (currCard) currCard.classList.add('selected');

    const p = allProducts[idx];
    document.getElementById('dpTitle').textContent = p.name;
    document.getElementById('dpCategory').textContent = p.category;

    const vContainer = document.getElementById('dpVariants');
    if (p.variants.length) {
        vContainer.innerHTML = p.variants.map(v => `
            <div class="variant-item">
                <div class="vi-header">
                    <span class="vi-name">${v.name}</span>
                    <span class="vi-price">${v.price.toLocaleString('ru-RU')} ₽</span>
                </div>
            </div>
        `).join('');
    } else {
        vContainer.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-secondary);font-style:italic;">Цены не найдены</div>';
    }

    const footer = document.getElementById('dpFooter');
    footer.innerHTML = p.url
        ? `<a href="${p.url}" target="_blank" rel="noopener" class="btn-full">Открыть на сайте ↗</a>`
        : `<button class="btn-full" disabled style="opacity:0.5;cursor:not-allowed;">Ссылка недоступна</button>`;

    document.getElementById('detailOverlay').classList.add('active');
    document.getElementById('detailPanel').classList.add('active');
}

function closeDetail() {
    if (selectedProductIdx !== null) {
        const prevCard = document.getElementById(`card-${selectedProductIdx}`);
        if (prevCard) prevCard.classList.remove('selected');
    }
    selectedProductIdx = null;
    document.getElementById('detailOverlay').classList.remove('active');
    document.getElementById('detailPanel').classList.remove('active');
}

function showProgress(show) { document.getElementById('progressToast').classList.toggle('active', show); }
function updateProgress(current, total, text) {
    const pct = Math.round((current / total) * 100);
    document.getElementById('poText').textContent = text;
    document.getElementById('poPercent').textContent = pct + '%';
    document.getElementById('poFill').style.width = pct + '%';
}

function exportData() {
    try {
        const b = new Blob([JSON.stringify({ products: allProducts }, null, 2)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'catalog.json'; a.click();
        showToast("JSON файл сохранен", "success");
    } catch (e) { showToast("Ошибка при экспорте JSON", "error"); }
}

function exportCSV() {
    try {
        let csv = 'Категория;Товар;Ссылка;Вариант;Цена\n';
        allProducts.forEach(p => {
            if (p.variants.length) p.variants.forEach(v => {
                csv += `"${p.category}";"${p.name}";"${p.url||''}";"${v.name}";${v.price}\n`;
            }); else {
                csv += `"${p.category}";"${p.name}";"${p.url||''}";"Нет";0\n`;
            }
        });
        const b = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'catalog.csv'; a.click();
        showToast("CSV файл сохранен", "success");
    } catch (e) { showToast("Ошибка при экспорте CSV", "error"); }
}
