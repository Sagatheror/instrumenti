<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Inter', 'Segoe UI', sans-serif;
    background: white;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    margin: 0;
    position: relative;
    overflow-x: hidden;
  }
  .container {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(20px);
    padding: 40px;
    border-radius: 48px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1) inset;
    max-width: 1400px;
    width: 100%;
    animation: floatIn 0.8s cubic-bezier(0.23, 1, 0.32, 1);
    position: relative;
    border: 1px solid rgba(255,255,255,0.3);
  }

  @keyframes floatIn {
    from {
      opacity: 0;
      transform: translateY(40px) scale(0.95);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  h2 {
    margin: 0 0 8px 0;
    font-size: 3.2em;
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: flex;
    align-items: center;
    gap: 15px;
  }

  h2::after {
    content: '✨';
    font-size: 0.8em;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    color: rgba(0,0,0,0.5);
    margin-bottom: 30px;
    font-size: 1.1em;
    font-weight: 500;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .subtitle span {
    background: rgba(102, 126, 234, 0.1);
    padding: 6px 14px;
    border-radius: 40px;
    font-size: 0.9em;
    color: #4a5568;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.5);
  }

  .input-section {
    background: rgba(0,0,0,0.04);
    backdrop-filter: blur(10px);
    padding: 28px;
    border-radius: 32px;
    margin-bottom: 25px;
    border: 2px solid rgba(255,255,255,0.8);
    transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  }

  .input-section:hover {
    border-color: #667eea;
    background: rgba(0,0,0,0.08);
    transform: translateY(-2px);
    box-shadow: 0 20px 40px rgba(102, 126, 234, 0.15);
  }

  label {
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 600;
    margin-bottom: 18px;
    font-size: 1.2em;
    color: #1a1a2e;
    letter-spacing: -0.01em;
  }

  .premium-badge {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    padding: 6px 16px;
    border-radius: 40px;
    font-size: 0.75em;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3);
  }

  textarea {
    width: 100%;
    height: 200px;
    padding: 20px;
    border-radius: 24px;
    border: 2px solid rgba(255,255,255,0.9);
    background: white;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 1.1em;
    resize: vertical;
    transition: all 0.3s ease;
    line-height: 1.6;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
  }

  textarea:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 6px rgba(102, 126, 234, 0.15), inset 0 2px 10px rgba(0,0,0,0.02);
  }

  .glass-panel {
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    padding: 20px;
    border: 1px solid rgba(255,255,255,0.8);
  }

  .quick-actions {
    display: flex;
    gap: 10px;
    margin: 20px 0 5px;
    flex-wrap: wrap;
  }

  .quick-btn {
    padding: 10px 20px;
    font-size: 0.95em;
    background: white;
    border: 1px solid rgba(0,0,0,0.05);
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.3s ease;
    color: #1a1a2e;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-weight: 500;
    box-shadow: 0 4px 10px rgba(0,0,0,0.02);
  }

  .quick-btn:hover {
    background: #667eea;
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    border-color: transparent;
  }

  .buttons-row {
    display: flex;
    gap: 15px;
    margin: 25px 0;
    flex-wrap: wrap;
  }

  .btn {
    padding: 16px 32px;
    font-size: 1.1em;
    border: none;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    flex: 1 1 auto;
    justify-content: center;
    letter-spacing: -0.01em;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.5s ease;
  }

  .btn:hover::before {
    left: 100%;
  }

  .btn-premium-1 {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
  }

  .btn-premium-2 {
    background: linear-gradient(135deg, #f093fb, #f5576c);
    color: white;
    box-shadow: 0 10px 25px rgba(245, 87, 108, 0.3);
  }

  .btn-premium-3 {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
    box-shadow: 0 10px 25px rgba(79, 172, 254, 0.4);
  }

  .btn-glass {
    background: rgba(255,255,255,0.9);
    color: #1a1a2e;
    border: 1px solid rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
  }

  .btn-glass:hover {
    background: white;
    transform: translateY(-2px);
    box-shadow: 0 20px 30px rgba(0,0,0,0.1);
  }

  .result-section {
    background: linear-gradient(145deg, #f6f9fc, #e6f0fa);
    padding: 28px;
    border-radius: 36px;
    margin-top: 30px;
    border: 1px solid rgba(255,255,255,0.8);
    box-shadow: 0 20px 40px rgba(0,0,0,0.05);
  }

  .result-header {
    font-weight: 700;
    margin-bottom: 20px;
    font-size: 1.4em;
    color: #1a1a2e;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
  }

  .stats-modern {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    padding: 8px 20px;
    border-radius: 40px;
    font-size: 0.9em;
    color: #1a1a2e;
    display: flex;
    align-items: center;
    gap: 15px;
    border: 1px solid rgba(255,255,255,0.8);
    box-shadow: 0 4px 10px rgba(0,0,0,0.02);
  }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-value {
    font-weight: 700;
    color: #667eea;
  }

  .result-display {
    background: white;
    padding: 25px;
    border-radius: 24px;
    min-height: 120px;
    max-height: 350px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 1.2em;
    line-height: 1.6;
    border: 2px solid rgba(255,255,255,0.8);
    box-shadow: inset 0 4px 15px rgba(0,0,0,0.02), 0 10px 20px rgba(0,0,0,0.02);
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .result-display:hover {
    border-color: #667eea;
    box-shadow: inset 0 4px 15px rgba(0,0,0,0.02), 0 15px 30px rgba(102, 126, 234, 0.1);
  }

  .separator-panel {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(20px);
    padding: 25px;
    border-radius: 32px;
    margin: 20px 0;
    display: none;
    border: 1px solid rgba(255,255,255,0.8);
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
  }

  .separator-panel.show {
    display: block;
    animation: slideDown 0.4s ease;
  }

  @keyframes slideDown {
    from {
      opacity: 0;
      transform: translateY(-20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .separator-title {
    font-size: 1.2em;
    font-weight: 600;
    margin-bottom: 15px;
    color: #1a1a2e;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .separator-input-glass {
    display: flex;
    gap: 15px;
    margin: 20px 0;
    flex-wrap: wrap;
  }

  .separator-input-glass input {
    flex: 1;
    padding: 16px 20px;
    border: 2px solid rgba(255,255,255,0.8);
    border-radius: 40px;
    font-size: 1.1em;
    background: white;
    min-width: 250px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.02);
  }

  .separator-input-glass input:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 6px rgba(102, 126, 234, 0.1);
  }

  .presets-modern {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .preset-chip {
    padding: 10px 20px;
    background: white;
    border: 1px solid rgba(0,0,0,0.05);
    border-radius: 40px;
    cursor: pointer;
    font-size: 0.95em;
    font-weight: 500;
    transition: all 0.3s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.02);
  }

  .preset-chip:hover {
    background: #667eea;
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    border-color: transparent;
  }

  .history-panel-modern {
    margin-top: 25px;
    border-top: 2px solid rgba(255,255,255,0.8);
    padding-top: 25px;
  }

  .history-item-modern {
    background: white;
    padding: 15px 20px;
    border-radius: 20px;
    margin-bottom: 10px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid rgba(255,255,255,0.8);
    transition: all 0.3s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.02);
  }

  .history-item-modern:hover {
    transform: translateX(5px);
    border-color: #667eea;
    box-shadow: 0 10px 20px rgba(102, 126, 234, 0.1);
  }

  .history-time {
    color: #718096;
    font-size: 0.85em;
    font-weight: 500;
  }

  .history-preview {
    font-family: 'JetBrains Mono', monospace;
    color: #1a1a2e;
    font-weight: 500;
    max-width: 60%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .history-badge {
    background: #667eea;
    color: white;
    padding: 4px 12px;
    border-radius: 30px;
    font-size: 0.75em;
    font-weight: 600;
  }

  .footer-modern {
    margin-top: 30px;
    font-size: 0.9em;
    color: #718096;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
    padding-top: 20px;
    border-top: 2px solid rgba(255,255,255,0.8);
  }

  .shortcut {
    background: rgba(0,0,0,0.03);
    padding: 6px 14px;
    border-radius: 30px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9em;
    border: 1px solid rgba(255,255,255,0.5);
  }

  .glow-text {
    color: #667eea;
    font-weight: 600;
  }

  @media (max-width: 768px) {
    .container {
      padding: 25px;
      border-radius: 32px;
    }
    
    h2 {
      font-size: 2.4em;
    }
    
    .btn {
      padding: 14px 24px;
    }
  }
</style>
</style>
</head>
<body>

<div class="container">

  <div class="input-section">
    <label>
      <span>📋 Входные данные</span>
      <span class="premium-badge">Поддерживаются любые разделители</span>
    </label>
    <textarea id="inputArea" placeholder="Вставьте числа в любом формате...
123 456 789
321, 654, 987
1000 2000 3000"></textarea>
    
     <div class="quick-actions">
      <button class="quick-btn" onclick="insertExample()">
        <span>📋</span> Пример
      </button>
      <button class="quick-btn" onclick="removeDuplicates()">
        <span>🔄</span> Убрать дубли
      </button>
    </div>
  </div>

  <div class="buttons-row">
    <button class="btn btn-premium-1" onclick="addCommas()">
      <span>➕</span> Только запятые
    </button>
    <button class="btn btn-premium-2" onclick="addCommasAndSpace()">
      <span>➕</span> Запятые + пробел
    </button>
    <button class="btn btn-premium-3" onclick="toggleSeparatorPanel()">
      <span>⚙️</span> Свой формат
    </button>
  </div>

  <div class="separator-panel" id="separatorPanel">
    <div class="separator-title">
      <span>🎨 Настройка разделителя</span>
    </div>
    <div class="separator-input-glass">
      <input type="text" id="customSeparator" placeholder="Введите разделитель..." value=", ">
      <button class="btn btn-premium-1" onclick="addCustomSeparator()" style="padding: 16px 32px;">Применить</button>
    </div>
    <div class="presets-modern">
      <span class="preset-chip" onclick="setSeparator(',')">, запятая</span>
      <span class="preset-chip" onclick="setSeparator(', ')">, + пробел</span>
      <span class="preset-chip" onclick="setSeparator(';')">; точка с запятой</span>
      <span class="preset-chip" onclick="setSeparator(' | ')"> | вертикальная черта</span>
      <span class="preset-chip" onclick="setSeparator(' - ')"> - дефис</span>
      <span class="preset-chip" onclick="setSeparator('\n')">\n новая строка</span>
      <span class="preset-chip" onclick="setSeparator(':')">: двоеточие</span>
    </div>
  </div>

  <div class="buttons-row">
    <button class="btn btn-glass" onclick="copyResult()">
      <span>📋</span> Копировать
    </button>
    <button class="btn btn-glass" onclick="clearAll()">
      <span>🗑️</span> Очистить
    </button>
    <button class="btn btn-glass" onclick="swapInputOutput()">
      <span>🔄</span> В обратную сторону
    </button>
  </div>

  <div class="result-section">
    <div class="result-header">
      <span>Результат обработки</span>
      <span id="stats" class="stats-modern">
        <span class="stat-item"><span class="stat-value" id="countStat">0</span></span>
      </span>
    </div>
    <div id="result" class="result-display" onclick="selectResult()"></div>
    
    <div class="history-panel-modern" id="historyPanel" style="display: none;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <span style="font-weight: 600; font-size: 1.1em;">📜 История</span>
        <button class="quick-btn" onclick="clearHistory()">Очистить</button>
      </div>
      <div id="historyList"></div>
    </div>

    <div class="footer-modern">
      <div>
        <span class="shortcut">CTRL + Enter</span> - обработать
        <span class="shortcut" style="margin-left: 10px;">ESC</span> - очистить
      </div>
      <div>
        <span class="glow-text" onclick="toggleHistory()" style="cursor: pointer;">📜 История</span>
      </div>
    </div>
  </div>
</div>

<script>
  let lastResult = '';
  let history = JSON.parse(localStorage.getItem('numberProcessorHistory')) || [];
  let lastUsedSeparator = ', ';

  function showNotification(message, isError = false) {
    const notification = document.createElement('div');
    notification.className = `notification ${isError ? 'error' : 'success'}`;
    notification.textContent = message;
    notification.style.cssText = `
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 16px 28px;
      border-radius: 40px;
      background: ${isError ? 'linear-gradient(135deg, #f093fb, #f5576c)' : 'linear-gradient(135deg, #84fab0, #8fd3f4)'};
      color: ${isError ? 'white' : '#1e7e34'};
      font-weight: 600;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      animation: slideIn 0.3s ease;
      z-index: 1000;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
    `;
    document.body.appendChild(notification);

    setTimeout(() => {
      notification.remove();
    }, 3000);
  }

  function extractNumbers(inputText) {
    if (!inputText.trim()) return [];
    
    const numbers = inputText.split(/[\s,;]+/).filter(s => s.trim() !== '');
    
    const nonNumeric = numbers.filter(n => isNaN(n) || n === '');
    if (nonNumeric.length > 0) {
      showNotification(`Найдено ${nonNumeric.length} нечисловых значений`, true);
    }
    
    return numbers;
  }

  function updateStats(numbers) {
    const statsElement = document.getElementById('stats');
    if (numbers && numbers.length > 0) {
      const numericValues = numbers.map(n => parseFloat(n)).filter(n => !isNaN(n));
      const sum = numericValues.reduce((a, b) => a + b, 0).toFixed(2);
      statsElement.innerHTML = `
        <span>Всего: ${numbers.length}</span>
      `;
    } else {
      statsElement.innerHTML = '';
    }
  }

  function formatResult(numbers, prefix = ',', suffix = '') {
    if (numbers.length === 0) return '';
    
    return numbers.map((num, index) => {
      if (index === 0) return num;
      return prefix + num + suffix;
    }).join('');
  }

  function addToHistory(result, operation) {
    const timestamp = new Date().toLocaleTimeString();
    const preview = result.length > 40 ? result.substring(0, 40) + '...' : result;
    
    history.unshift({
      timestamp,
      result,
      preview,
      operation
    });
    
    if (history.length > 10) history.pop();
    localStorage.setItem('numberProcessorHistory', JSON.stringify(history));
    updateHistoryDisplay();
  }

  function updateHistoryDisplay() {
    const historyList = document.getElementById('historyList');
    if (history.length === 0) {
      historyList.innerHTML = '<div style="color: #718096; text-align: center; padding: 20px;">История пока пуста</div>';
      return;
    }

    historyList.innerHTML = history.map((item, index) => `
      <div class="history-item-modern" onclick="restoreFromHistory(${index})">
        <span class="history-time">${item.timestamp}</span>
        <span class="history-preview">${item.preview}</span>
        <span class="history-badge">${item.operation || 'обработка'}</span>
      </div>
    `).join('');
  }

  function restoreFromHistory(index) {
    if (history[index]) {
      document.getElementById('result').innerText = history[index].result;
      lastResult = history[index].result;
      showNotification('Восстановлено из истории');
    }
  }

  function clearHistory() {
    history = [];
    localStorage.removeItem('numberProcessorHistory');
    updateHistoryDisplay();
    showNotification('🗑️ История очищена');
  }

  function toggleHistory() {
    const panel = document.getElementById('historyPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    if (panel.style.display === 'block') {
      updateHistoryDisplay();
    }
  }

  function selectResult() {
    const result = document.getElementById('result');
    const range = document.createRange();
    range.selectNodeContents(result);
    const selection = window.getSelection();
    selection.removeAllRanges();
    selection.addRange(range);
  }

  function toggleSeparatorPanel() {
    const panel = document.getElementById('separatorPanel');
    panel.classList.toggle('show');
  }

  function setSeparator(separator) {
    document.getElementById('customSeparator').value = separator;
    lastUsedSeparator = separator;
  }

  function processNumbers(operation) {
    const inputText = document.getElementById('inputArea').value;
    if (!inputText.trim()) {
      showNotification('Введите данные для обработки', true);
      return null;
    }

    const numbers = extractNumbers(inputText);
    updateStats(numbers);
    return numbers;
  }

  function addCommas() {
    const numbers = processNumbers();
    if (!numbers) return;
    
    const resultString = formatResult(numbers, ',', '');
    document.getElementById('result').innerText = resultString;
    lastResult = resultString;
    addToHistory(resultString, 'Только запятые');
    showNotification(`✅ Обработано ${numbers.length} чисел`);
  }

  function addCommasAndSpace() {
    const numbers = processNumbers();
    if (!numbers) return;
    
    const resultString = formatResult(numbers, ', ', '');
    document.getElementById('result').innerText = resultString;
    lastResult = resultString;
    addToHistory(resultString, 'Запятые с пробелом');
    showNotification(`✅ Обработано ${numbers.length} чисел`);
  }

  function addCustomSeparator() {
    const separator = document.getElementById('customSeparator').value;
    if (!separator) {
      showNotification('Введите разделитель', true);
      return;
    }
    
    const numbers = processNumbers();
    if (!numbers) return;
    
    const resultString = formatResult(numbers, separator, '');
    document.getElementById('result').innerText = resultString;
    lastResult = resultString;
    lastUsedSeparator = separator;
    addToHistory(resultString, `Разделитель: ${separator}`);
    showNotification(`✅ Использован разделитель: ${separator}`);
  }

  function insertExample() {
    document.getElementById('inputArea').value = '123\n456\n789\n321\n654\n987';
    showNotification('Пример вставлен');
    updateStats(extractNumbers(document.getElementById('inputArea').value));
  }

  function removeDuplicates() {
    const numbers = processNumbers();
    if (!numbers) return;

    const uniqueNumbers = [...new Set(numbers)];
    document.getElementById('inputArea').value = uniqueNumbers.join('\n');
    updateStats(uniqueNumbers);
    showNotification(`Удалено дубликатов: ${numbers.length - uniqueNumbers.length}`);
  }

  function sortNumbers() {
    const numbers = processNumbers();
    if (!numbers) return;

    const sortedNumbers = numbers.sort((a, b) => {
      const numA = parseFloat(a);
      const numB = parseFloat(b);
      if (!isNaN(numA) && !isNaN(numB)) {
        return numA - numB;
      }
      return a.localeCompare(b);
    });
    
    document.getElementById('inputArea').value = sortedNumbers.join('\n');
    updateStats(sortedNumbers);
    showNotification('Числа отсортированы');
  }

  function filterNumbers() {
    const numbers = processNumbers();
    if (!numbers) return;

    const min = prompt('Минимальное значение (оставьте пустым для пропуска):');
    const max = prompt('Максимальное значение (оставьте пустым для пропуска):');
    
    const filtered = numbers.filter(num => {
      const val = parseFloat(num);
      if (isNaN(val)) return true;
      if (min !== null && min !== '' && val < parseFloat(min)) return false;
      if (max !== null && max !== '' && val > parseFloat(max)) return false;
      return true;
    });

    document.getElementById('inputArea').value = filtered.join('\n');
    updateStats(filtered);
    showNotification(`Осталось чисел: ${filtered.length}`);
  }

  function calculateSum() {
    const numbers = processNumbers();
    if (!numbers) return;

    const sum = numbers.reduce((acc, num) => {
      const val = parseFloat(num);
      return acc + (isNaN(val) ? 0 : val);
    }, 0);

    showNotification(`Сумма всех чисел: ${sum.toFixed(2)}`);
  }

  function copyResult() {
    if (!lastResult) {
      showNotification('Нет результата для копирования', true);
      return;
    }

    navigator.clipboard.writeText(lastResult).then(() => {
      showNotification('✅ Скопировано в буфер обмена!');
    }).catch(() => {
      const textArea = document.createElement('textarea');
      textArea.value = lastResult;
      document.body.appendChild(textArea);
      textArea.select();
      
      try {
        document.execCommand('copy');
        showNotification('✅ Скопировано в буфер обмена!');
      } catch (err) {
        showNotification('❌ Ошибка копирования', true);
      }
      
      document.body.removeChild(textArea);
    });
  }

  function clearAll() {
    document.getElementById('inputArea').value = '';
    document.getElementById('result').innerText = '';
    document.getElementById('stats').innerHTML = '';
    lastResult = '';
    showNotification('Все поля очищены');
  }

  function swapInputOutput() {
    if (!lastResult) {
      showNotification('Нет результата для переноса', true);
      return;
    }
    
    document.getElementById('inputArea').value = lastResult;
    updateStats(extractNumbers(lastResult));
    showNotification('Результат перенесён в исходные данные');
  }

  document.getElementById('inputArea').addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.key === 'Enter') {
      e.preventDefault();
      addCommas();
    }
    if (e.key === 'Escape') {
      clearAll();
    }
  });

  document.getElementById('inputArea').addEventListener('input', function() {
    const numbers = extractNumbers(this.value);
    updateStats(numbers);
  });

  document.getElementById('inputArea').addEventListener('dragover', (e) => {
    e.preventDefault();
    e.target.style.borderColor = '#667eea';
  });

  document.getElementById('inputArea').addEventListener('dragleave', (e) => {
    e.preventDefault();
    e.target.style.borderColor = '#e9ecef';
  });

  document.getElementById('inputArea').addEventListener('drop', (e) => {
    e.preventDefault();
    e.target.style.borderColor = '#e9ecef';
    
    const files = e.dataTransfer.files;
    if (files.length > 0) {
      const file = files[0];
      const reader = new FileReader();
      
      reader.onload = (event) => {
        document.getElementById('inputArea').value = event.target.result;
        showNotification('Файл загружен');
        updateStats(extractNumbers(event.target.result));
      };
      
      reader.readAsText(file);
    }
  });

  updateHistoryDisplay();
</script>

</body>
</html>
