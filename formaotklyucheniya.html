<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>Форма добавления данных</title>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      --container-bg: rgba(255, 255, 255, 0.85);
      --text-primary: #2d3748;
      --text-secondary: #718096;
      --text-label: #4a5568;
      --border-color: rgba(102, 126, 234, 0.2);
      --input-bg: rgba(255, 255, 255, 0.9);
      --hint-color: #a0aec0;
      --code-tag-bg: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
      --code-tag-border: rgba(102, 126, 234, 0.3);
      --code-tag-color: #5a67d8;
      --success-bg: rgba(72, 187, 120, 0.15);
      --success-color: #276749;
      --success-border: rgba(72, 187, 120, 0.3);
      --error-bg: rgba(245, 101, 101, 0.15);
      --error-color: #c53030;
      --error-border: rgba(245, 101, 101, 0.3);
      --loading-bg: rgba(236, 201, 75, 0.15);
      --loading-color: #975a16;
      --loading-border: rgba(236, 201, 75, 0.3);
      --shadow: 0 25px 80px rgba(102, 126, 234, 0.25), 0 10px 30px rgba(0, 0, 0, 0.1);
      --tooltip-bg: rgba(45, 55, 72, 0.95);
      --tooltip-color: #fff;
      --glass-blur: blur(20px);
      --glow-color: rgba(102, 126, 234, 0.4);
    }

    [data-theme="dark"] {
      --bg-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      --container-bg: rgba(30, 30, 46, 0.85);
      --text-primary: #e2e8f0;
      --text-secondary: #a0aec0;
      --text-label: #cbd5e0;
      --border-color: rgba(102, 126, 234, 0.25);
      --input-bg: rgba(42, 42, 58, 0.8);
      --hint-color: #718096;
      --code-tag-bg: linear-gradient(135deg, rgba(102, 126, 234, 0.25) 0%, rgba(118, 75, 162, 0.25) 100%);
      --code-tag-border: rgba(102, 126, 234, 0.4);
      --code-tag-color: #a0b0ff;
      --success-bg: rgba(72, 187, 120, 0.2);
      --success-color: #9ae6b4;
      --success-border: rgba(72, 187, 120, 0.4);
      --error-bg: rgba(245, 101, 101, 0.2);
      --error-color: #feb2b2;
      --error-border: rgba(245, 101, 101, 0.4);
      --loading-bg: rgba(236, 201, 75, 0.2);
      --loading-color: #fefcbf;
      --loading-border: rgba(236, 201, 75, 0.4);
      --shadow: 0 25px 80px rgba(0, 0, 0, 0.5), 0 10px 30px rgba(102, 126, 234, 0.15);
      --tooltip-bg: rgba(58, 58, 74, 0.95);
      --tooltip-color: #e2e8f0;
      --glass-blur: blur(20px);
      --glow-color: rgba(102, 126, 234, 0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-gradient);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 0.5s ease;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 70% 70%, rgba(102, 126, 234, 0.15) 0%, transparent 50%);
      animation: float 20s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    
    @keyframes float {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(30px, -30px) rotate(120deg); }
      66% { transform: translate(-20px, 20px) rotate(240deg); }
    }
    .container {
      background: var(--container-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-radius: 24px;
      padding: 48px;
      width: 100%;
      max-width: 580px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      z-index: 1;
      overflow: hidden;
    }
    .container::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(102, 126, 234, 0.08) 0%, transparent 70%);
      animation: rotate 30s linear infinite;
      pointer-events: none;
      z-index: -1;
    }
    
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 16px;
    }
    h1 {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-primary);
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      transition: color 0.3s ease;
      text-shadow: 0 2px 10px rgba(102, 126, 234, 0.1);
    }
    h1 svg { 
      flex-shrink: 0;
      filter: drop-shadow(0 2px 8px rgba(102, 126, 234, 0.3));
      transition: transform 0.3s ease;
    }
    h1:hover svg {
      transform: scale(1.1) rotate(-5deg);
    }
    .theme-toggle {
      background: rgba(102, 126, 234, 0.1);
      border: 2px solid var(--border-color);
      cursor: pointer;
      padding: 10px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      width: 44px;
      height: 44px;
      position: relative;
      overflow: hidden;
    }
    .theme-toggle::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .theme-toggle:hover {
      border-color: rgba(102, 126, 234, 0.5);
      box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
      transform: scale(1.05);
    }
    .theme-toggle:hover::before {
      opacity: 1;
    }
    .theme-toggle svg { 
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      z-index: 1;
    }
    .theme-toggle:hover svg { 
      transform: rotate(180deg) scale(1.1);
    }
    .sun-icon { display: block; }
    .moon-icon { display: none; }
    [data-theme="dark"] .sun-icon { display: none; }
    [data-theme="dark"] .moon-icon { display: block; }
    .subtitle { 
      text-align: center; 
      color: var(--text-secondary); 
      margin-bottom: 32px; 
      font-size: 15px;
      font-weight: 400;
      opacity: 0.9;
      transition: color 0.3s ease;
      line-height: 1.5;
    }
    .form-group { 
      margin-bottom: 28px;
      position: relative;
    }
    label {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text-label);
      font-size: 14px;
      transition: all 0.3s ease;
      letter-spacing: 0.3px;
    }
    label svg { 
      margin-right: 8px; 
      flex-shrink: 0;
      transition: all 0.3s ease;
    }
    label:hover svg {
      transform: scale(1.15);
      filter: drop-shadow(0 2px 6px rgba(102, 126, 234, 0.4));
    }
    label .required { 
      color: #e53e3e; 
      margin-left: 3px;
      font-weight: 700;
    }
    textarea, input[type="text"], input[type="date"] {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      outline: none;
      background: var(--input-bg);
      color: var(--text-primary);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    textarea:focus, input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15), 0 4px 20px rgba(102, 126, 234, 0.2);
      background: rgba(255, 255, 255, 0.95);
      transform: translateY(-1px);
    }
    [data-theme="dark"] textarea:focus, 
    [data-theme="dark"] input:focus {
      background: rgba(42, 42, 58, 0.95);
    }
    textarea { 
      resize: vertical; 
      min-height: 130px;
      line-height: 1.6;
    }
    .hint {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--hint-color);
      margin-top: 6px;
      transition: color 0.3s ease;
      opacity: 0.8;
    }
    .hint svg { 
      flex-shrink: 0;
      opacity: 0.7;
    }
    .step-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      width: 24px;
      height: 24px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      margin-right: 8px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
      transition: all 0.3s ease;
    }
    label:hover .step-number {
      transform: scale(1.1) rotate(-5deg);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .codes-preview {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      min-height: 0;
    }
    .codes-preview:empty { display: none; }
    .code-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--code-tag-bg);
      border: 1.5px solid var(--code-tag-border);
      color: var(--code-tag-color);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      animation: tagAppear 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      cursor: default;
    }
    .code-tag:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
      border-color: rgba(102, 126, 234, 0.5);
    }
    .code-tag.duplicate {
      background: linear-gradient(135deg, rgba(229, 62, 62, 0.15) 0%, rgba(192, 57, 43, 0.15) 100%);
      border-color: rgba(229, 62, 62, 0.4);
      color: #e53e3e;
      animation: shake 0.5s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-3px); }
      75% { transform: translateX(3px); }
    }
    .code-tag svg { 
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }
    .code-tag:hover svg {
      transform: scale(1.2);
    }
    .codes-ellipsis {
      color: var(--hint-color);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 8px;
      transition: color 0.3s ease;
      opacity: 0.7;
    }
    @keyframes tagAppear {
      from { 
        opacity: 0; 
        transform: scale(0.8) translateY(10px); 
      }
      to { 
        opacity: 1; 
        transform: scale(1) translateY(0); 
      }
    }
    .duplicate-warning {
      margin-top: 10px;
      padding: 10px 14px;
      background: rgba(236, 201, 75, 0.15);
      border: 1.5px solid rgba(236, 201, 75, 0.3);
      border-radius: 10px;
      font-size: 13px;
      color: #975a16;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: warningSlide 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    [data-theme="dark"] .duplicate-warning {
      background: rgba(236, 201, 75, 0.2);
      border-color: rgba(236, 201, 75, 0.4);
      color: #fefcbf;
    }
    @keyframes warningSlide {
      from { 
        opacity: 0; 
        transform: translateY(-10px); 
      }
      to { 
        opacity: 1; 
        transform: translateY(0); 
      }
    }
    .button-row {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }
    button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 24px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }
    button:active::before {
      width: 300px;
      height: 300px;
    }
    button svg { 
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }
    button:hover svg {
      transform: scale(1.15);
    }
    #submitBtn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
      flex: 1;
    }
    #submitBtn:hover { 
      transform: translateY(-3px); 
      box-shadow: 0 8px 30px rgba(102, 126, 234, 0.5), 0 4px 15px rgba(118, 75, 162, 0.4);
    }
    #submitBtn:active { 
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    #submitBtn:disabled { 
      opacity: 0.6; 
      cursor: not-allowed; 
      transform: none; 
      box-shadow: none; 
    }
    #clearBtn {
      background: transparent;
      color: var(--text-secondary);
      border: 2px solid var(--border-color);
      flex: 0 0 auto;
      padding: 16px 24px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #clearBtn:hover { 
      background: rgba(229, 62, 62, 0.1); 
      border-color: #e53e3e; 
      color: #e53e3e;
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(229, 62, 62, 0.2);
    }
    #clearBtn:active {
      transform: translateY(0);
    }
    .status {
      margin-top: 20px;
      padding: 16px 20px;
      border-radius: 12px;
      text-align: center;
      font-size: 14px;
      display: none;
      opacity: 0;
      transform: translateY(-10px);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      font-weight: 500;
    }
    .status.show {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      opacity: 1;
      transform: translateY(0);
    }
    .status.success { 
      background: var(--success-bg); 
      color: var(--success-color); 
      border: 1.5px solid var(--success-border);
      box-shadow: 0 4px 20px rgba(72, 187, 120, 0.2);
    }
    .status.error { 
      background: var(--error-bg); 
      color: var(--error-color); 
      border: 1.5px solid var(--error-border);
      box-shadow: 0 4px 20px rgba(245, 101, 101, 0.2);
    }
    .status.loading { 
      background: var(--loading-bg); 
      color: var(--loading-color); 
      border: 1.5px solid var(--loading-border); 
      flex-wrap: wrap;
      box-shadow: 0 4px 20px rgba(236, 201, 75, 0.2);
    }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(102, 126, 234, 0.2);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 10px;
      transition: background 0.3s ease;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
      background-size: 200% 100%;
      animation: loading 2s ease-in-out infinite;
      border-radius: 2px;
    }
    @keyframes loading { 
      0% { width: 0%; background-position: 0% 50%; } 
      50% { width: 70%; background-position: 100% 50%; } 
      100% { width: 100%; background-position: 200% 50%; } 
    }
    .network-status {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1.5px solid transparent;
    }
    .network-status.online {
      background: rgba(72, 187, 120, 0.15);
      color: var(--success-color);
      border-color: rgba(72, 187, 120, 0.3);
    }
    .network-status.offline {
      background: rgba(245, 101, 101, 0.15);
      color: var(--error-color);
      border-color: rgba(245, 101, 101, 0.3);
    }
    .network-status svg { 
      flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .tooltip-container {
      position: relative;
      display: inline-flex;
      align-items: center;
      cursor: help;
    }
    .tooltip-text {
      visibility: hidden;
      opacity: 0;
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%) translateY(5px);
      background: var(--tooltip-bg);
      color: var(--tooltip-color);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
      pointer-events: none;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .tooltip-text::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: var(--tooltip-bg);
    }
    .tooltip-container:hover .tooltip-text {
      visibility: visible;
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    
  </style>
</head>
<body>
  <div class="container">
    <div id="networkStatus" class="network-status online">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
        <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
      <span>Онлайн</span>
    </div>

    <div class="header-row">
      <h1>
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        Форма добавления данных
      </h1>
      <button type="button" id="themeToggle" class="theme-toggle" title="Переключить тему">
        <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
    <p class="subtitle">Заполните все поля для добавления записей в таблицу</p>

    <form id="dataForm">
      <div class="form-group">
        <label>
          <span class="step-number">1</span>
          <span class="tooltip-container">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 18 22 12 16 6"/>
              <polyline points="8 6 2 12 8 18"/>
            </svg>
            <span class="tooltip-text">Пример: Н154106, Н153928 или Н1578001 Н1578002</span>
          </span>
          Коды 1С <span class="required">*</span>
        </label>
        <textarea id="codes1C" name="codes1C" placeholder="Н154106, Н153928, Н153929&#10;или&#10;Н1578001 Н1578002&#10;или&#10;Н145175; Н138337" required></textarea>
        <div id="codesPreview" class="codes-preview"></div>
        <div id="duplicateWarning" class="duplicate-warning" style="display: none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <span id="duplicateText">Найдены дубликаты</span>
        </div>
        <p class="hint">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="16" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
          Разделители: пробел, запятая, точка с запятой, новая строка
        </p>
      </div>

      <div class="form-group">
        <label>
          <span class="step-number">2</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          Планируемая дата отключения <span class="required">*</span>
        </label>
        <input type="date" id="date" name="date" required>
      </div>

      <div class="form-group">
        <label>
          <span class="step-number">3</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
          Поставщик <span class="required">*</span>
        </label>
        <input type="text" id="supplier" name="supplier" list="supplierList" placeholder="Название поставщика" required>
        <datalist id="supplierList"></datalist>
      </div>

      <div class="form-group">
        <label>
          <span class="step-number">4</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 11 12 14 22 4"/>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
          Задача <span class="required">*</span>
        </label>
        <input type="text" id="task" name="task" placeholder="Номер задачи, ссылка или описание" required>
      </div>

      <div class="button-row">
        <button type="submit" id="submitBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
          Отправить
        </button>
        <button type="button" id="clearBtn" title="Очистить форму">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
          Очистить
        </button>
      </div>
    </form>

    <div id="status" class="status"></div>
  </div>

  <script>
    var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzYXSEjr9lxu13R0xtHNa96HV_28vwrJ2j_XMvPBFN8PNOQEhRKn48vBzq9CU3GDjdW/exec';

    function initTheme() {
      var saved = localStorage.getItem('theme');
      if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
      }
    }
    initTheme();

    document.getElementById('themeToggle').addEventListener('click', function() {
      var current = document.documentElement.getAttribute('data-theme');
      var newTheme = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });

    document.getElementById('codes1C').focus();

    var codesTextarea = document.getElementById('codes1C');
    var codesPreview = document.getElementById('codesPreview');
    var duplicateWarning = document.getElementById('duplicateWarning');
    var duplicateText = document.getElementById('duplicateText');
    var MAX_VISIBLE = 6;

    function parseCodes(raw) {
  var matches = raw.match(/[A-Za-zА-Яа-яЁё]+\d*(?:-[A-Za-z]+)?/g);
  if (!matches) return [];
  return matches
    .filter(function(code) {
      if (/\d/.test(code)) return true;
      return code.length >= 7;
    });
}

    function findDuplicates(codes) {
      var seen = {};
      var duplicates = [];
      codes.forEach(function(code) {
        if (seen[code]) {
          if (duplicates.indexOf(code) === -1) duplicates.push(code);
        } else {
          seen[code] = true;
        }
      });
      return duplicates;
    }

    function updateCodesPreview() {
      var raw = codesTextarea.value.trim();
      var codes = parseCodes(raw);
      codesPreview.innerHTML = '';

      if (codes.length === 0) {
        duplicateWarning.style.display = 'none';
        return;
      }

      var duplicates = findDuplicates(codes);
      
      if (duplicates.length > 0) {
        duplicateWarning.style.display = 'flex';
        duplicateText.textContent = 'Найдены дубликаты: ' + duplicates.join(', ');
      } else {
        duplicateWarning.style.display = 'none';
      }

      var visible = codes.slice(0, MAX_VISIBLE);
      var hidden = codes.length - MAX_VISIBLE;

      visible.forEach(function(code) {
        var tag = document.createElement('span');
        tag.className = 'code-tag';
        if (duplicates.indexOf(code) !== -1) {
          tag.classList.add('duplicate');
        }
        tag.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' + code;
        codesPreview.appendChild(tag);
      });

      if (hidden > 0) {
        var ellipsis = document.createElement('span');
        ellipsis.className = 'codes-ellipsis';
        ellipsis.textContent = '...ещё ' + hidden;
        codesPreview.appendChild(ellipsis);
      }

      autoSave();
    }

    codesTextarea.addEventListener('input', updateCodesPreview);

    var saveTimeout;
    function autoSave() {
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(function() {
        var data = {
          codes1C: codesTextarea.value,
          date: document.getElementById('date').value,
          supplier: document.getElementById('supplier').value,
          task: document.getElementById('task').value,
          timestamp: Date.now()
        };
        localStorage.setItem('formDraft', JSON.stringify(data));
      }, 500);
    }

    ['date', 'supplier', 'task'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', autoSave);
    });

    function restoreDraft() {
      var saved = localStorage.getItem('formDraft');
      if (saved) {
        try {
          var data = JSON.parse(saved);
          if (data.codes1C) codesTextarea.value = data.codes1C;
          if (data.date) document.getElementById('date').value = data.date;
          if (data.supplier) document.getElementById('supplier').value = data.supplier;
          if (data.task) document.getElementById('task').value = data.task;
          updateCodesPreview();
        } catch (e) {}
      }
    }
    restoreDraft();

    function clearDraft() {
      localStorage.removeItem('formDraft');
    }

    function saveSupplierTemplate(supplier) {
      var templates = JSON.parse(localStorage.getItem('supplierTemplates') || '[]');
      templates = templates.filter(function(s) { return s !== supplier; });
      templates.unshift(supplier);
      templates = templates.slice(0, 10);
      localStorage.setItem('supplierTemplates', JSON.stringify(templates));
      updateSupplierDatalist();
    }

    function updateSupplierDatalist() {
      var templates = JSON.parse(localStorage.getItem('supplierTemplates') || '[]');
      var datalist = document.getElementById('supplierList');
      datalist.innerHTML = templates.map(function(s) { return '<option value="' + s + '">'; }).join('');
    }
    updateSupplierDatalist();

    document.getElementById('clearBtn').addEventListener('click', function() {
      var hasData = codesTextarea.value || document.getElementById('date').value || 
                    document.getElementById('supplier').value || document.getElementById('task').value;
      
      if (hasData && !confirm('Очистить все поля формы?')) {
        return;
      }
      
      document.getElementById('dataForm').reset();
      codesPreview.innerHTML = '';
      duplicateWarning.style.display = 'none';
      clearDraft();
    });

    function updateNetworkStatus() {
      var status = document.getElementById('networkStatus');
      var queue = JSON.parse(localStorage.getItem('offlineQueue') || '[]');
      
      if (navigator.onLine) {
        status.className = 'network-status online';
        status.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg><span>Онлайн' + (queue.length > 0 ? ' (очередь: ' + queue.length + ')' : '') + '</span>';
      } else {
        status.className = 'network-status offline';
        status.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.58 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg><span>Оффлайн' + (queue.length > 0 ? ' (в очереди: ' + queue.length + ')' : '') + '</span>';
      }
    }
    updateNetworkStatus();

    window.addEventListener('online', function() {
      updateNetworkStatus();
      processOfflineQueue();
    });
    window.addEventListener('offline', updateNetworkStatus);

    function addToOfflineQueue(payload) {
      var queue = JSON.parse(localStorage.getItem('offlineQueue') || '[]');
      queue.push({ payload: payload, timestamp: Date.now() });
      localStorage.setItem('offlineQueue', JSON.stringify(queue));
      updateNetworkStatus();
    }

    function processOfflineQueue() {
      var queue = JSON.parse(localStorage.getItem('offlineQueue') || '[]');
      if (queue.length === 0 || !navigator.onLine) return;
      
      var item = queue.shift();
      localStorage.setItem('offlineQueue', JSON.stringify(queue));
      updateNetworkStatus();
      
      sendPayload(item.payload, function(success) {
        if (success) {
          processOfflineQueue();
        } else {
          queue.unshift(item);
          localStorage.setItem('offlineQueue', JSON.stringify(queue));
          updateNetworkStatus();
        }
      });
    }

    function sendPayload(payload, callback) {
      var xhr = new XMLHttpRequest();
      xhr.open('POST', SCRIPT_URL, true);
      xhr.setRequestHeader('Content-Type', 'text/plain;charset=UTF-8');
      
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          var success = (xhr.status === 0 || xhr.status === 200);
          if (success) {
            try {
              var response = JSON.parse(xhr.responseText);
              success = response.status !== 'error';
            } catch (err) {
              success = true;
            }
          }
          if (callback) callback(success);
        }
      };
      
      xhr.onerror = function() {
        if (callback) callback(false);
      };
      
      xhr.send(payload);
    }

    document.getElementById('dataForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      var statusDiv = document.getElementById('status');
      var submitBtn = document.getElementById('submitBtn');
      
      var codes1CRaw = document.getElementById('codes1C').value.trim();
      var date = document.getElementById('date').value;
      var supplier = document.getElementById('supplier').value.trim();
      var task = document.getElementById('task').value.trim();
      
      if (!codes1CRaw || !date || !supplier || !task) {
        showStatus('error', 'Заполните все поля!',
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>');
        return;
      }
      
      var codes = codes1CRaw.split(/[\s,;\n\r\t]+/).filter(function(code) {
        return code.trim() !== '';
      });
      
      if (codes.length > 50) {
        if (!confirm('Вы собираетесь отправить ' + codes.length + ' кодов. Продолжить?')) {
          return;
        }
      }
      
      var dateParts = date.split('-');
      var formattedDate = dateParts[2] + '.' + dateParts[1] + '.' + dateParts[0];
      
      var payload = JSON.stringify({
        codes: codes,
        date: formattedDate,
        supplier: supplier,
        task: task
      });
      
      if (!navigator.onLine) {
        addToOfflineQueue(payload);
        showStatus('loading', 'Данные сохранены в очередь. Отправим при подключении к интернету.',
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>');
        document.getElementById('dataForm').reset();
        codesPreview.innerHTML = '';
        duplicateWarning.style.display = 'none';
        clearDraft();
        return;
      }
      
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Отправка ' + codes.length + ' кодов...';
      showStatus('loading', 'Отправка данных, подождите...',
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>');
      
      sendPayload(payload, function(success) {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Отправить';
        
        if (success) {
          saveSupplierTemplate(supplier);
          showStatus('success', '✅ Данные отправлены!',
            '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>');
          document.getElementById('dataForm').reset();
          codesPreview.innerHTML = '';
          duplicateWarning.style.display = 'none';
          clearDraft();
        } else {
          showStatus('error', '❌ Ошибка соединения. Попробуйте ещё раз.',
            '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>');
        }
      });
    });
    
    function showStatus(type, message, iconSvg) {
      var statusDiv = document.getElementById('status');
      statusDiv.className = 'status';
      statusDiv.innerHTML = iconSvg + '<span>' + message + '</span>';
      
      if (type === 'loading') {
        statusDiv.innerHTML += '<div class="progress-bar"><div class="progress-bar-fill"></div></div>';
      }
      
      setTimeout(function() {
        statusDiv.classList.add('show', type);
      }, 10);
    }

    var today = new Date().toISOString().split('T')[0];
    document.getElementById('date').setAttribute('min', today);

    if (navigator.onLine) {
      processOfflineQueue();
    }
  </script>
</body>
</html>
