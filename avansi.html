        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const results = [];
            RANGES.forEach((range, index) => {
                const deposits = [];
                const getCol = (r) => r.match(/[A-Z]+/)[0].charCodeAt(0) - 65;
                const getRow = (r) => parseInt(r.match(/\d+/)[0]) - 1;
                const vCol = getCol(range.val);
                const dCol = getCol(range.dep);
                const rCol = getCol(range.rest);
                const vStart = getRow(range.val);
                const vEnd = getRow(range.val.split(':')[1]);
                const rRow = getRow(range.rest);
                
                for (let i = vStart; i <= vEnd; i++) {
                    if (i < lines.length) {
                        const cols = lines[i].split(',');
                        const amount = parseNum(cols[dCol]);
                        const label = cols[vCol] || '';
                        const yearMatch = label.match(/(2024|2025|2026)/);
                        const year = yearMatch ? yearMatch[0] : null;
                        if (amount !== null) {
                            deposits.push({ amount, year });
                        }
                    }
                }
                
                let rest = null;
                if (rRow < lines.length) {
                    rest = parseNum(lines[rRow].split(',')[rCol]);
                }
                
                const total = deposits.reduce((s, d) => s + d.amount, 0);
                if (deposits.length > 0 || rest !== null) {
                    results.push({
                        id: range.name,
                        name: range.name,
                        deposits: deposits,
                        total: total,
                        avg: deposits.length ? total / deposits.length : 0,
                        count: deposits.length,
                        rest: rest,
                        colorIndex: index
                    });
                }
            });
            return results.filter(r => r.rest !== 0 && r.rest !== null);
        }

        function parseBillsCSV(text) {
    const lines = text.trim().split('\n');
    const billsBySupplier = {};
    
    function columnLetterToIndex(letter) {
        let index = 0;
        for (let i = 0; i < letter.length; i++) {
            index = index * 26 + (letter.charCodeAt(i) - 65 + 1);
        }
        return index - 1;
    }
    
    function parseCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;
        
        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            
            if (char === '"') {
                inQuotes = !inQuotes;
            } else if (char === ',' && !inQuotes) {
                result.push(current);
                current = '';
            } else {
                current += char;
            }
        }
        result.push(current);
        
        return result.map(cell => {
            if (cell.startsWith('"') && cell.endsWith('"')) {
                return cell.slice(1, -1);
            }
            return cell;
        });
    }
    
    for (const [supplier, ranges] of Object.entries(BILLS_RANGES)) {
        console.log(`\n=== Processing ${supplier} ===`);
        
        const bills = [];
        
        const getCol = (range) => {
            const match = range.match(/^([A-Z]+)/);
            return match ? columnLetterToIndex(match[1]) : 0;
        };
        
        const getStartRow = (range) => {
            const match = range.match(/(\d+):/);
            return match ? parseInt(match[1]) - 1 : 0;
        };
        
        const getEndRow = (range) => {
            const match = range.match(/:([A-Z]+)(\d+)/);
            return match ? parseInt(match[2]) - 1 : 0;
        };
        
        const numbersCol = getCol(ranges.numbers);

        const startRow = getStartRow(ranges.numbers);

        for (let i = startRow; i <= endRow && i < lines.length; i++) {

            let date = cols[datesCol] ? cols[datesCol].trim() : '';
            let amount = parseNum(cols[amountsCol]);

            if (billNumber && amount !== null) {
                const looksLikeDate = billNumber.match(/^\d{1,2}[\.\/\-]\d{1,2}[\.\/\-]\d{4}$/);

                } else if (billNumber && !date && amount !== null && !billNumber.match(/^\d{1,2}[\.\/\-]\d{1,2}[\.\/\-]\d{4}$/)) {
                    console.log(`  → Using bill number from number column, no date`);
                    bills.push({
                        number: billNumber,

}
function parseOverpaymentsCSV(text) {
    const lines = text.trim().split('\n');
    const bills = [];
    let total = null;
    let rest = null;

    const numberCol = 26;
    const amountCol = 27;

    if (lines.length < 25) {
        console.warn('Недостаточно строк в CSV переплат, lines.length =', lines.length);
        return null;
    }

    for (let i = 2; i <= 22; i++) {
        const cols = lines[i].split(',');
        const number = cols[numberCol]?.trim();
        const amount = parseNum(cols[amountCol]);
        if (number && amount !== null) {
            bills.push({ number, amount });
        }
    }

    const totalCols = lines[23].split(',');
    total = parseNum(totalCols[amountCol]);

    const restCols = lines[24].split(',');
    rest = parseNum(restCols[amountCol]);

    return { bills, total, rest };
}
        function parseNum(str) {
    if (!str || str.trim() === '') return null;
    
    let clean = str.trim();

    if (clean.includes(',')) {
        const decimalPattern = /,\d{1,2}$/;
        if (decimalPattern.test(clean)) {
            clean = clean.replace(',', '.');
        } else {
            clean = clean.replace(/,/g, '');
        }
    }
    
    clean = clean.replace(/\s/g, '');

    const match = clean.match(/-?\d+(?:\.\d+)?/);
    if (!match) return null;
    
    const num = parseFloat(match[0]);
    return isNaN(num) ? null : num;
}

            }, 20);
        }
    });

function formatDate(dateString) {
    if (!dateString || dateString.trim() === '') return '-';
    
    try {
        dateString = dateString.trim();
        
        const dateMatch = dateString.match(/^(\d{1,2})[\.\/\-](\d{1,2})[\.\/\-](\d{4})$/);
        
        if (dateMatch) {
            const day = parseInt(dateMatch[1], 10);
            const month = parseInt(dateMatch[2], 10) - 1;
            const year = parseInt(dateMatch[3], 10);
            
            const date = new Date(year, month, day);
            
            if (date.getFullYear() === year && 
                date.getMonth() === month && 
                date.getDate() === day) {
                return date.toLocaleDateString('ru-RU', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric'
                });
            }
        }
        
        const date = new Date(dateString);
        if (!isNaN(date.getTime())) {
            return date.toLocaleDateString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });
        }
        
        return dateString;
    } catch (e) {
        console.warn('Ошибка форматирования даты:', dateString, e);
        return dateString;
    }
}

function parseDateForSorting(dateString) {
    if (!dateString) return new Date(0);
    
    dateString = dateString.trim();
    
    const dateMatch = dateString.match(/^(\d{1,2})[\.\/\-](\d{1,2})[\.\/\-](\d{4})$/);
    
    if (dateMatch) {
        const day = parseInt(dateMatch[1], 10);
        const month = parseInt(dateMatch[2], 10) - 1;
        const year = parseInt(dateMatch[3], 10);
        return new Date(year, month, day);
    }
    
    const date = new Date(dateString);
    if (!isNaN(date.getTime())) {
        return date;
    }
    
    return new Date(0);
}

function getRussianWordForm(number, forms) {
    number = Math.abs(number) % 100;
    const remainder = number % 10;
    
    if (number > 10 && number < 20) return forms[2];
    if (remainder > 1 && remainder < 5) return forms[1];
    if (remainder === 1) return forms[0];
    return forms[2];
}

                supplierContainer.innerHTML += `
                    <div style="text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid #e2e8f0; font-size: 11px; color: #94a3b8;">

        const fileName = `Отчет_поставщики_${new Date().toISOString().slice(0,10)}.pdf`;
        pdf.save(fileName);
        showToast('PDF успешно сгенерирован', 'success');
    } catch (error) {
        console.error('Ошибка при генерации PDF:', error);
        showToast('Ошибка при генерации PDF: ' + error.message, 'error');
    } finally {
        showLoader(false);
    }
}

function fmtNoCurrency(num) {
    return new Intl.NumberFormat('ru-RU').format(num);
}
document.addEventListener('DOMContentLoaded', function() {
    const statCards = document.querySelectorAll('.stat-card');
    
    statCards.forEach(card => {
        card.addEventListener('mouseenter', function() {
            this.style.animation = 'none';
            setTimeout(() => {
                this.style.animation = 'cardFloat 3s ease-in-out infinite alternate';
            }, 10);
        });
    });
    function animateValue(element, start, end, duration) {
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            const value = Math.floor(progress * (end - start) + start);
            element.textContent = new Intl.NumberFormat('ru-RU').format(value);
            if (progress < 1) {
                window.requestAnimationFrame(step);
            }
        };

function parseDateSafe(dateStr) {
    if (!dateStr || typeof dateStr !== 'string') return null;
    dateStr = dateStr.trim();
    const ruMatch = dateStr.match(/^(\d{1,2})[\.\-\/](\d{1,2})[\.\-\/](\d{4})$/);
    if (ruMatch) {
        const day = parseInt(ruMatch[1], 10);
        const month = parseInt(ruMatch[2], 10) - 1;
        const year = parseInt(ruMatch[3], 10);
        const d = new Date(year, month, day);
        if (d.getFullYear() === year && d.getMonth() === month && d.getDate() === day) {
            return d;
        }
    }
    const isoMatch = dateStr.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (isoMatch) {
        const d = new Date(dateStr);
        if (!isNaN(d.getTime())) return d;
    }
    const d = new Date(dateStr);
    return isNaN(d.getTime()) ? null : d;
}

    let monthsToZero = null;
    let depletionDate = null;

    if (hasBills && supplier.rest > 0) {
        const datedBills = bills.filter(b => b.date);
        if (datedBills.length > 0) {
            const parsed = datedBills
                .map(b => ({ ...b, parsedDate: parseDateSafe(b.date) }))
                .filter(b => b.parsedDate);

            if (parsed.length > 0) {
                parsed.sort((a, b) => a.parsedDate - b.parsedDate);
                const firstDate = parsed[0].parsedDate;
                const lastDate = parsed[parsed.length - 1].parsedDate;
                const totalAmount = parsed.reduce((sum, b) => sum + (b.amount || 0), 0);
                const months = Math.max(1, (lastDate - firstDate) / (1000 * 60 * 60 * 24 * 30.44));

function openHeatmapModal(year, month) {
    if (!year) year = new Date().getFullYear();
    if (month === undefined) month = new Date().getMonth();

    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const daysInMonth = lastDay.getDate();
    const startDayOfWeek = firstDay.getDay();

    const dailyData = {};

    for (const [supplierName, bills] of Object.entries(billsData)) {
        bills.forEach(bill => {
            if (bill.amount) {
                const d = parseDateSafe(bill.date);
                if (d && d.getFullYear() === year && d.getMonth() === month) {
                    const day = d.getDate();
                    if (!dailyData[day]) {
                        dailyData[day] = { total: 0, suppliers: [] };
                    }
                    dailyData[day].total += bill.amount;
                    dailyData[day].suppliers.push({ name: supplierName, amount: bill.amount });
                }
            }
        });
    }

    const maxAmount = Math.max(...Object.values(dailyData).map(d => d.total), 1);

    const modal = document.getElementById('heatmapModal');
    const inner = document.getElementById('heatmapInner');
    const dayNames = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];

    let gridHTML = '<div class="heatmap-grid">';
    for (let i = 0; i < 7; i++) {
        gridHTML += `<div style="text-align:center; font-size:0.75rem; color:var(--text-muted); padding:5px 0;">${dayNames[i]}</div>`;
    }
    for (let i = 0; i < startDayOfWeek; i++) {
        gridHTML += '<div class="heatmap-day" style="background:transparent;"></div>';
    }

    for (let day = 1; day <= daysInMonth; day++) {
        const data = dailyData[day];
        const amount = data ? data.total : 0;
        const intensity = amount / maxAmount;
        const hue = 120 - intensity * 120;
        const saturation = 70;
        const lightness = 50 - intensity * 20;
        const bgColor = amount > 0 ? `hsl(${hue}, ${saturation}%, ${lightness}%)` : '#f1f5f9';

        let tooltipContent = '';
        if (data && data.suppliers.length > 0) {
            const sortedSuppliers = [...data.suppliers].sort((a, b) => b.amount - a.amount);
            const supplierLines = sortedSuppliers.map(s => 
                `<div style="display:flex; justify-content:space-between; gap:8px; font-size:0.7rem;">
                    <span>${s.name}</span>
                    <span style="font-weight:600;">${fmt(s.amount)}</span>
                </div>`
            ).join('');
            tooltipContent = `
                <div style="margin-bottom:4px; font-weight:600; font-size:0.75rem;">${day}.${month+1}.${year} — ${fmt(amount)}</div>
                ${supplierLines}
            `;
        }

        gridHTML += `
            <div class="heatmap-day ${amount > 0 ? 'has-bills' : ''}" style="background:${bgColor};">
                ${day}
                ${amount > 0 ? `<span class="heatmap-tooltip">${tooltipContent}</span>` : ''}
            </div>
        `;
    }
    gridHTML += '</div>';

    const prevMonth = month === 0 ? 11 : month - 1;
    const prevYear = month === 0 ? year - 1 : year;
    const nextMonth = month === 11 ? 0 : month + 1;
    const nextYear = month === 11 ? year + 1 : year;

    inner.innerHTML = `
        <div class="modal-section">
            <div class="modal-section-title" style="justify-content:space-between;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18"/><path d="M8 2v4"/><path d="M16 2v4"/>
                    </svg>
                    ${firstDay.toLocaleDateString('ru-RU', {month:'long', year:'numeric'})}
                </div>
                <div style="display:flex; gap:5px;">
                    <button class="btn btn-ghost" onclick="openHeatmapModal(${prevYear}, ${prevMonth})" style="padding:5px 10px;">←</button>
                    <button class="btn btn-ghost" onclick="openHeatmapModal(${nextYear}, ${nextMonth})" style="padding:5px 10px;">→</button>
                </div>
            </div>
            ${gridHTML}
            <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:15px; font-size:0.8rem;">
                <span><span style="display:inline-block; width:12px;height:12px;background:#10b981;border-radius:3px;"></span> Мало</span>
                <span><span style="display:inline-block; width:12px;height:12px;background:#f59e0b;border-radius:3px;"></span> Средне</span>
                <span><span style="display:inline-block; width:12px;height:12px;background:#ef4444;border-radius:3px;"></span> Много</span>
            </div>
        </div>
    `;

    modal.classList.add('active');
}
function closeHeatmapModal() {
    document.getElementById('heatmapModal').classList.remove('active');
}
    </script>
</body>
</html>
